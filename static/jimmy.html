<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy's Edge Agent — The Window</title>
<style>
  :root {
    --bg: #0d0d14;
    --card-bg: #161622;
    --card-border: #1e1e30;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: #7c6cf7;
    --green: #00d68f;
    --red: #ff5555;
    --yellow: #ffd93d;
    --orange: #ff9f43;
    --pill-bg: #1a1a2e;
    --pill-active: #6c5ce7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 0 0 100px;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--bg) 80%, transparent);
    padding: 20px 16px 12px;
  }

  .header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    text-align: center;
    margin-bottom: 12px;
  }

  .header h1 .sport-label { color: var(--accent-glow); }
  .header h1 .date-label { color: var(--text-dim); font-weight: 400; font-size: 0.85rem; }

  .pills {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    justify-content: center;
    flex-wrap: wrap;
    padding-bottom: 4px;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--pill-bg);
    color: var(--text-dim);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--pill-active); color: #fff; border-color: var(--accent); }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  .loading .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .games-container { padding: 0 12px; max-width: 800px; margin: 0 auto; }

  /* Landing page */
  .landing {
    text-align: center;
    padding: 60px 20px 40px;
    max-width: 600px;
    margin: 0 auto;
  }
  .landing h2 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--text);
  }
  .landing .subtitle {
    font-size: 0.95rem;
    color: var(--accent-glow);
    margin-bottom: 30px;
    font-weight: 500;
  }
  .landing .what-we-do {
    text-align: left;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 30px;
  }
  .landing .what-we-do h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .landing .what-we-do ul {
    list-style: none;
    padding: 0;
  }
  .landing .what-we-do li {
    font-size: 0.88rem;
    color: var(--text);
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    line-height: 1.5;
  }
  .landing .what-we-do li:last-child { border-bottom: none; }
  .landing .what-we-do li::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
  }
  .landing .tonight {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 20px;
  }
  .landing .tonight strong { color: var(--text); }
  .landing-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .landing-btn {
    padding: 14px 28px;
    border-radius: 10px;
    border: 1px solid var(--accent);
    background: rgba(108, 92, 231, 0.12);
    color: var(--accent-glow);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .landing-btn:hover {
    background: var(--accent);
    color: #fff;
    transform: translateY(-1px);
  }

  /* Re-analyze button */
  .reanalyze-bar {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .reanalyze-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: rgba(108, 92, 231, 0.1);
    color: var(--accent-glow);
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .reanalyze-btn:hover { background: var(--accent); color: #fff; }
  .reanalyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .reanalyze-btn.small {
    padding: 4px 10px;
    font-size: 0.65rem;
    border-radius: 6px;
  }

  /* Grade legend */
  .grade-legend {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 0.7rem;
    color: var(--text-dim);
    line-height: 1.6;
    text-align: center;
  }
  .grade-legend .gl-a { color: var(--green); font-weight: 700; }
  .grade-legend .gl-b { color: var(--yellow); font-weight: 700; }
  .grade-legend .gl-c { color: var(--orange); font-weight: 700; }
  .grade-legend .gl-d { color: var(--red); font-weight: 700; }

  /* Game cards */
  .game-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .game-card:hover { border-color: var(--accent); }
  .game-card.pick-locked { border-color: #10B981; }

  /* Lock Pick UI */
  .pick-panel {
    display: none;
    padding: 14px 0 6px;
    border-top: 1px solid rgba(96,165,250,0.15);
    margin-top: 12px;
    animation: pickSlide 0.25s ease;
  }
  .pick-panel.open { display: block; }
  @keyframes pickSlide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  .pick-type-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .pick-type-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 8px;
    border: 1px solid #2a2a40;
    background: rgba(96,165,250,0.06);
    color: var(--text-dim);
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .pick-type-btn:hover { border-color: #60A5FA; color: var(--text); }
  .pick-type-btn.active { background: rgba(96,165,250,0.18); border-color: #60A5FA; color: #60A5FA; }

  .pick-side-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .pick-side-btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 8px;
    border: 1px solid #2a2a40;
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.3;
  }
  .pick-side-btn:hover { border-color: #60A5FA; }
  .pick-side-btn.active { border-color: #60A5FA; box-shadow: 0 0 12px rgba(96,165,250,0.25); background: rgba(96,165,250,0.12); color: #60A5FA; }

  .pick-reasoning {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #2a2a40;
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-size: 0.8rem;
    font-family: inherit;
    resize: none;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .pick-reasoning:focus { outline: none; border-color: #60A5FA; }
  .pick-reasoning::placeholder { color: var(--text-dim); }

  .pick-lock-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #60A5FA, #3B82F6);
    color: #fff;
    font-size: 0.85rem;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .pick-lock-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(96,165,250,0.3); }
  .pick-lock-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .pick-locked-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 6px;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.3);
    color: #10B981;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-top: 10px;
  }

  .game-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .matchup-info { flex: 1; }

  .matchup-teams {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.4;
  }

  .matchup-meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .grade-badge {
    font-size: 1.6rem;
    font-weight: 800;
    min-width: 50px;
    text-align: center;
    line-height: 1;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(108, 92, 231, 0.15);
  }

  .grade-A { color: var(--green); background: rgba(0, 214, 143, 0.12); }
  .grade-B { color: var(--yellow); background: rgba(255, 217, 61, 0.12); }
  .grade-C { color: var(--orange); background: rgba(255, 159, 67, 0.12); }
  .grade-D, .grade-F { color: var(--red); background: rgba(255, 85, 85, 0.12); }
  .grade-INCOMPLETE { color: var(--text-dim); background: rgba(136, 136, 160, 0.1); font-size: 0.8rem; }

  .lines-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .line-chip {
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    font-weight: 500;
  }

  .line-chip .val { color: var(--text); font-weight: 700; }

  .edge-pick-row {
    background: rgba(108, 92, 231, 0.08);
    border: 1px solid rgba(108, 92, 231, 0.2);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }

  .edge-pick-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-glow);
    margin-bottom: 4px;
    font-weight: 700;
  }

  .edge-pick-text {
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.4;
  }

  .edge-pick-reasoning {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 600;
  }

  /* Analysis text */
  .analysis-block {
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .analysis-block .ab-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-glow);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .analysis-block .ab-edge {
    color: var(--text);
    font-weight: 600;
    font-size: 0.82rem;
    margin-bottom: 6px;
  }
  .analysis-block strong { color: var(--text); }
  .analysis-block .ab-row {
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .analysis-block .ab-row:last-child { border-bottom: none; }

  .gotcha-text {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .gotcha-text ul { padding-left: 16px; margin: 0; }
  .gotcha-text li { margin-bottom: 3px; }
  .gotcha-text strong { color: var(--text); }

  .flags-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .flag-tag {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .flag-SHARP { background: rgba(0,214,143,0.15); color: var(--green); }
  .flag-TRAP { background: rgba(255,85,85,0.15); color: var(--red); }
  .flag-B2B { background: rgba(255,159,67,0.15); color: var(--orange); }
  .flag-UPSET { background: rgba(255,217,61,0.15); color: var(--yellow); }
  .flag-PASS { background: rgba(136,136,160,0.12); color: var(--text-dim); }
  .flag-BEST { background: rgba(0,214,143,0.2); color: var(--green); }
  .flag-REST { background: rgba(108,92,231,0.15); color: var(--accent-glow); }
  .flag-INJURY { background: rgba(255,85,85,0.12); color: var(--red); }
  .flag-INCOMPLETE { background: rgba(136,136,160,0.1); color: var(--text-dim); }
  .flag-default { background: rgba(255,255,255,0.06); color: var(--text-dim); }

  .screener-section {
    margin-top: 8px;
    border-top: 1px solid var(--card-border);
    padding-top: 8px;
  }

  .screener-hit {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 0.75rem;
  }

  .screener-player { font-weight: 600; }
  .screener-stat { color: var(--text-dim); }
  .screener-verdict { color: var(--green); font-weight: 700; font-size: 0.7rem; }

  .peter-zone {
    font-size: 0.78rem;
    color: var(--text);
    line-height: 1.5;
    background: rgba(108, 92, 231, 0.06);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    margin-top: 8px;
    border-radius: 0 6px 6px 0;
  }

  .footer {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 0.7rem;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .icon { font-size: 2rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  .global-gotcha {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }

  .global-gotcha .section-label { color: var(--accent-glow); }

  /* Multi-book line comparison */
  .books-section {
    margin-top: 10px;
    border-top: 1px solid var(--card-border);
    padding-top: 10px;
  }
  .books-toggle {
    font-size: 0.7rem;
    color: var(--accent-glow);
    cursor: pointer;
    font-weight: 600;
    padding: 4px 0;
    user-select: none;
  }
  .books-toggle:hover { text-decoration: underline; }
  .books-detail { display: none; margin-top: 8px; }
  .books-detail.open { display: block; }
  .books-market {
    margin-bottom: 10px;
  }
  .books-market-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-glow);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .books-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 6px;
    font-size: 0.72rem;
    border-radius: 4px;
    margin-bottom: 2px;
  }
  .books-row.best { background: rgba(0, 214, 143, 0.08); }
  .books-row.worst { background: rgba(255, 85, 85, 0.06); }
  .books-row .book-name {
    color: var(--text-dim);
    min-width: 90px;
    font-weight: 500;
  }
  .books-row .book-line {
    color: var(--text);
    font-weight: 700;
    min-width: 80px;
  }
  .books-row .book-odds {
    color: var(--text-dim);
    font-weight: 600;
    min-width: 60px;
    text-align: right;
  }
  .books-row .best-tag {
    font-size: 0.55rem;
    color: var(--green);
    font-weight: 800;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .books-row .worst-tag {
    font-size: 0.55rem;
    color: var(--red);
    font-weight: 800;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .books-gap {
    font-size: 0.68rem;
    color: var(--yellow);
    font-weight: 600;
    padding: 2px 0;
    margin-top: 2px;
  }
  .books-gap.disagree { color: var(--orange); }

  /* Card top row with re-analyze */
  .card-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* === AGENT PANEL === */
  .agent-panel {
    background: var(--card-bg);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    position: relative;
  }
  .agent-panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .agent-panel-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); animation: agent-pulse 2s infinite;
  }
  @keyframes agent-pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .agent-panel-title {
    font-size: 0.85rem; font-weight: 800; color: var(--accent-glow);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .agent-panel-badge {
    margin-left: auto;
    padding: 3px 10px; border-radius: 10px;
    background: rgba(108,92,231,0.15);
    color: var(--accent-glow); font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* Analyze My Way button */
  .analyze-my-way {
    display: block; width: 100%; padding: 14px; margin: 10px 0;
    border-radius: 10px; border: none;
    background: linear-gradient(135deg, #6c5ce7, #7c6cf7);
    color: #fff; font-family: inherit; font-size: 0.85rem; font-weight: 800;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .analyze-my-way:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,92,231,0.3); }
  .analyze-my-way:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .analyze-my-way.running { animation: amw-shimmer 1.5s infinite; }
  @keyframes amw-shimmer { 0%,100%{opacity:1;} 50%{opacity:0.7;} }

  /* Matrix panel */
  .matrix-panel {
    margin-top: 12px;
    border-top: 1px solid var(--card-border);
    padding-top: 12px;
  }
  .matrix-panel-toggle {
    font-size: 0.72rem; color: var(--accent-glow);
    cursor: pointer; font-weight: 700; user-select: none;
  }
  .matrix-panel-toggle:hover { text-decoration: underline; }
  .matrix-panel-body { display: none; margin-top: 10px; }
  .matrix-panel-body.open { display: block; }
  .matrix-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px; border-radius: 6px; margin-bottom: 3px;
    font-size: 0.72rem; background: rgba(255,255,255,0.03);
  }
  .matrix-row .m-key { flex: 1; font-weight: 600; color: var(--text); }
  .matrix-row .m-weight {
    font-weight: 800; color: var(--accent-glow);
    min-width: 28px; text-align: center;
  }
  .matrix-row .m-tag {
    font-size: 0.55rem; font-weight: 700; padding: 1px 6px;
    border-radius: 4px; margin-left: 6px; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .m-tag-override { color: var(--yellow); background: rgba(255,217,61,0.12); }
  .m-tag-custom { color: var(--green); background: rgba(0,214,143,0.12); }
  .matrix-excluded-row {
    padding: 4px 8px; margin-bottom: 3px; font-size: 0.7rem;
    color: var(--red); text-decoration: line-through; opacity: 0.6;
  }

  /* Jimmy results comparison */
  .dj-result-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px; border-radius: 6px; font-size: 0.65rem;

async function loadSport(sport) {
  const container = document.getElementById('gamesContainer');
  const loading = document.getElementById('loadingState');
  const footer = document.getElementById('footer');

  container.innerHTML = '';
  footer.style.display = 'none';
  loading.style.display = 'block';
  document.getElementById('loadingText').textContent = 'Loading slate...';

  try {
    // Fetch analysis, screener, odds, arbs, and agent matrix in parallel
    const [analysisResp, screenerResp, oddsResp, arbResp, matrixResp] = await Promise.all([
      fetch(`/api/analysis/${sport}?cached_only=true`).then(r => r.json()).catch(() => null),
      fetch(`/api/screener/${sport}`).then(r => r.json()).catch(() => null),
      fetch(`/api/odds/${sport}`).then(r => r.json()).catch(() => null),
      fetch(`/api/arb-scan`).then(r => r.json()).catch(() => null),
      agentProfile ? fetch(`/api/agent/${AGENT_USER_ID}/matrix/${sport}`).then(r => r.json()).catch(() => null) : Promise.resolve(null)
    ]);
    if (matrixResp) agentMatrix[sport] = matrixResp;

    loading.style.display = 'none';

    const analysis = analysisResp || { games: [] };
    const screener = screenerResp || { screener: [] };
    const odds = oddsResp || { games: [] };

    // Cache for re-analyze
    analysisCache[sport] = analysis;
    screenerCache[sport] = screener;
    oddsCache[sport] = odds;

    // Show ALL analysis games (the analysis IS the demo — Jimmy needs to see the full system)
    // Only fall back to odds-only upcoming games when no analysis exists
    const now = Date.now();
    const allOddsGames = odds.games || [];
    const upcomingOddsGames = allOddsGames.filter(g => {
      const ct = g.commence_time || g.commence || g.time || '';
      if (!ct) return true;
      return new Date(ct).getTime() > now;
    });

    let games;
    const analysisGames = analysis.games || [];

    // Build from odds (upcoming games), then MERGE analysis data onto matching games
    if (upcomingOddsGames.length > 0) {
      games = upcomingOddsGames.map(og => {
        const oddsMatchup = `${og.away} @ ${og.home}`;
        // Find matching analysis game by team name overlap
        let matched = null;
        const ogTeams = [og.away, og.home].map(t => (t || '').toLowerCase().split(/\s+/).filter(w => w.length > 1));
        for (const ag of analysisGames) {
          const am = (ag.matchup || '').toLowerCase();
          const found = ogTeams.some(teamWords => teamWords.some(w => am.includes(w)));
          if (found) { matched = ag; break; }
        }
        // Merge: use odds for lines/books, analysis for grade/matrix/edge
        return {
          matchup: oddsMatchup,
          away: og.away || '',
          home: og.home || '',
          grade: matched ? matched.grade : 'TBD',
          composite_score: matched ? matched.composite_score : null,
          matrix_scores: matched ? matched.matrix_scores : {},
          edge_question: matched ? matched.edge_question : '',
          edge_summary: matched ? matched.edge_summary : '',
          edge_pick: matched ? matched.edge_pick : {},
          injury_impact: matched ? matched.injury_impact : '',
          rest_schedule: matched ? matched.rest_schedule : '',
          trends: matched ? (matched.trends || []) : [],
          tags: matched ? (matched.tags || []) : [],
          flags: matched ? (matched.flags || []) : [],
          peter_zone: matched ? matched.peter_zone : '',
          analyzed_by: matched ? (matched.analyzed_by || matched._thinker || '') : '',
          player_props: matched ? matched.player_props : [],
          spread: og.home_spread || null,
          total: og.total || null,
          away_ml: og.away_ml || null,
          home_ml: og.home_ml || null,
          commence_time: og.commence_time || og.commence || og.time || '',
          all_bookmakers: og.all_bookmakers || [],
        };
      });
    } else if (analysisGames.length > 0) {
      // No odds games but analysis exists — show analysis
      games = analysisGames;
    } else {
      games = [];
    }

    if (games.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">&#128203;</div><p>No ${SPORT_LABELS[sport]} games or analysis available.</p><p style="margin-top:8px;font-size:0.75rem;">NCAAB lines appear morning of game day. NBA analysis runs at 4 PM PST.</p></div>`;
      return;
    }

    // Build screener lookup: matchup string -> hits
    const screenerByGame = buildScreenerMap(screener.screener || [], games);

    // Build odds lookup: matchup -> odds game data (with all_bookmakers)
    // When games came from odds directly, use the game itself as the odds source
    let oddsByGame;
    if (analysisGames.length > 0) {
      oddsByGame = buildOddsMap(allOddsGames, games);
    } else {
      // Games ARE from odds — map each to its matching odds game directly
      oddsByGame = {};
      games.forEach((g, i) => {
        oddsByGame[g.matchup] = upcomingOddsGames[i] || g;
      });
    }

    // Render
    let html = '';

    // Re-analyze bar
    html += `<div class="reanalyze-bar">
      <button class="reanalyze-btn" id="reanalyzeSlateBtn" onclick="reanalyzeSlate('${sport}')">RE-ANALYZE SLATE</button>
    </div>`;

    // Default matrix card — how this sport is graded
    html += renderDefaultMatrixCard(sport);

    // Agent panel
    if (agentProfile) {
      html += renderAgentPanel(sport);
    }

    // Grade legend
    html += `<div class="grade-legend">
      <span class="gl-a">A</span> = Strong edge, book is wrong
      &nbsp;|&nbsp; <span class="gl-b">B</span> = Lean, slight edge
      &nbsp;|&nbsp; <span class="gl-c">C</span> = No edge, fair line
      &nbsp;|&nbsp; <span class="gl-d">D/F</span> = Trap, stay away
    </div>`;

    // Global gotcha
    if (analysis.gotcha) {
      html += `<div class="global-gotcha"><div class="section-label">Tonight's Intel</div><div class="gotcha-text">${analysis.gotcha}</div></div>`;
    }

    // Arbitrage opportunities
    const arbs = (arbResp && arbResp.arbs) ? arbResp.arbs : [];
    if (arbs.length > 0) {
      html += `<div class="global-gotcha" style="border-color:rgba(0,214,143,0.3);background:rgba(0,214,143,0.04);">
        <div class="section-label" style="color:var(--green);">ARBITRAGE OPPORTUNITIES (${arbs.length})</div>`;
      arbs.slice(0, 5).forEach(a => {
        html += `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.75rem;">
          <div style="font-weight:700;">${esc(a.matchup || a.game || '')}</div>
          <div style="color:var(--text-dim);margin-top:2px;">${esc(a.type || '')} — ${esc(a.book1 || a.best_book || '')} vs ${esc(a.book2 || a.worst_book || '')} — <span style="color:var(--green);font-weight:700;">Profit: ${a.profit_pct || a.profit || '?'}%</span></div>
        </div>`;
      });
      html += `</div>`;
    }

    // Top Edges summary (before game cards)
    html += renderTopEdges(games);

    // Sort toggle
    html += `<div class="reanalyze-bar">
      <div class="sort-toggle">
        <button class="sort-toggle-btn ${currentSortMode === 'edge' ? 'active' : ''}" onclick="setSortMode('edge')">By Edge</button>
        <button class="sort-toggle-btn ${currentSortMode === 'time' ? 'active' : ''}" onclick="setSortMode('time')">By Time</button>
      </div>
    </div>`;

    // Sort games based on current mode
    if (currentSortMode === 'edge') {
      games.sort((a, b) => (parseFloat(b.composite_score) || 0) - (parseFloat(a.composite_score) || 0));
    } else {
      // Sort by game time ascending
      games.sort((a, b) => {
        const tA = a.commence_time || a.commence || a.time || '';
        const tB = b.commence_time || b.commence || b.time || '';
        if (!tA && !tB) return 0;
        if (!tA) return 1;
        if (!tB) return -1;
        return new Date(tA).getTime() - new Date(tB).getTime();
      });
    }

    games.forEach((game, idx) => {
      html += renderGameCard(game, screenerByGame[game.matchup] || [], oddsByGame[game.matchup] || null, idx);
    });

    container.innerHTML = html;

    // Footer
    const ts = analysis.generated_at || analysis.fetched_at || '';
    document.getElementById('lastAnalyzed').textContent = ts ? `Last analyzed: ${ts}` : '';
    footer.style.display = 'block';

  } catch (err) {
    loading.style.display = 'none';
    container.innerHTML = `<div class="empty-state"><p>Failed to load data. Try again later.</p></div>`;
    console.error(err);
  }
}

async function reanalyzeSlate(sport) {
  const btn = document.getElementById('reanalyzeSlateBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'ANALYZING...'; }
  const loading = document.getElementById('loadingState');
  loading.style.display = 'block';
  document.getElementById('loadingText').textContent = 'Running AI analysis... this may take 1-2 minutes';

  try {
    await fetch(`/api/analysis/${sport}?force=true&model=gpt-4.1-mini`);
    await loadSport(sport);
  } catch (err) {
    console.error('Re-analyze failed:', err);
  } finally {
    loading.style.display = 'none';
    if (btn) { btn.disabled = false; btn.textContent = 'RE-ANALYZE SLATE'; }
  }
}

async function reanalyzeGame(sport, awayTeam, homeTeam) {
  const btn = event && event.target;
  if (btn) { btn.disabled = true; btn.textContent = 'ANALYZING...'; }
  try {
    const resp = await fetch('/api/ev/card', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sport, away_team: awayTeam, home_team: homeTeam })
    });
    if (!resp.ok) throw new Error('EV card request failed');
    const evResult = await resp.json();
    // Show result in an alert-style overlay on the game card
    const summary = [];
    if (evResult.spread_call) summary.push('SPREAD: ' + evResult.spread_call.pick + ' — ' + evResult.spread_call.reasoning);
    if (evResult.trap_check) summary.push('TRAP CHECK: ' + evResult.trap_check);
    if (evResult.book_discrepancy) summary.push('DISCREPANCY: ' + evResult.book_discrepancy);
    if (evResult.top_props && evResult.top_props.length) {
      summary.push('PROPS: ' + evResult.top_props.map(p => p.player + ' ' + p.prop + ' (' + p.verdict + ')').join(', '));
    }
    if (evResult.error) summary.push('ERROR: ' + evResult.error);
    alert(awayTeam + ' @ ' + homeTeam + '\n\n' + (summary.length ? summary.join('\n\n') : 'No EV data returned.'));
  } catch (err) {
    console.error('Re-analyze game failed:', err);
    alert('Re-analyze failed for ' + awayTeam + ' @ ' + homeTeam + '. Check console.');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'RE-ANALYZE'; }
  }
}

function buildOddsMap(oddsGames, analysisGames) {
  const map = {};
  analysisGames.forEach(g => { map[g.matchup] = null; });

  oddsGames.forEach(og => {
    const ogKey = `${og.away} @ ${og.home}`.toLowerCase();
    for (const ag of analysisGames) {
      const agKey = (ag.matchup || '').toLowerCase();
      // Match by team name overlap
      const ogTeams = ogKey.replace('@', ' ').split(/\s+/).filter(t => t.length > 1);
      const agTeams = agKey.replace('@', ' ').split(/\s+/).filter(t => t.length > 1);
      const overlap = ogTeams.some(t => agTeams.some(h => h.includes(t) || t.includes(h)));
      if (overlap && !map[ag.matchup]) {
        map[ag.matchup] = og;
        break;
      }
    }
  });
  return map;
}

function buildScreenerMap(screenerHits, games) {
  const map = {};
  games.forEach(g => { map[g.matchup] = []; });

  screenerHits.forEach(hit => {
    const hitMatchup = (hit.matchup || '').toLowerCase();
    for (const g of games) {
      const gm = (g.matchup || '').toLowerCase();
      const gTeams = gm.replace('@', ' ').split(/\s+/).filter(t => t.length > 1);
      const hTeams = hitMatchup.replace('@', ' ').replace('vs', ' ').split(/\s+/).filter(t => t.length > 1);
      const overlap = gTeams.some(t => hTeams.some(h => h.includes(t) || t.includes(h)));
      if (overlap) {
        if (!map[g.matchup]) map[g.matchup] = [];
        map[g.matchup].push(hit);
        break;
      }
    }
  });
  return map;
}

function edgeBadgeHtml(compositeScore) {
  if (compositeScore === null || compositeScore === undefined) return '';
  const score = parseFloat(compositeScore) || 0;
  const cls = score >= 7 ? 'edge-high' : score >= 5 ? 'edge-mid' : 'edge-low';
  return `<div class="edge-badge ${cls}">EDGE ${score.toFixed(1)}</div>`;
}

function renderTopEdges(games) {
  // Filter games that have a composite_score, sort descending, take top 3
  const scored = games.filter(g => g.composite_score !== null && g.composite_score !== undefined);
  if (scored.length === 0) return '';
  scored.sort((a, b) => (parseFloat(b.composite_score) || 0) - (parseFloat(a.composite_score) || 0));
  const top3 = scored.slice(0, 3);

  let html = `<div class="top-edges"><div class="te-header">TOP EDGES</div>`;
  top3.forEach((g, i) => {
    const score = parseFloat(g.composite_score) || 0;
    const cls = score >= 7 ? 'edge-high' : score >= 5 ? 'edge-mid' : 'edge-low';
    const pick = g.edge_pick || {};
    const reason = pick.bet_type ? `${pick.bet_type}${pick.team ? ' — ' + pick.team : ''}` : (g.grade ? 'Grade: ' + g.grade : '');
    html += `<div class="te-item">
      <span class="te-rank">#${i + 1}</span>
      <span class="te-matchup">${esc(g.matchup || '?')}</span>
      <span class="te-reason">${esc(reason)}</span>
      <div class="edge-badge ${cls}">EDGE ${score.toFixed(1)}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// Sort mode state
let currentSortMode = 'edge'; // 'edge' or 'time'

function setSortMode(mode) {
  currentSortMode = mode;
  if (currentSport) loadSport(currentSport);
}

function gradeClass(grade) {
  if (!grade) return '';
  const g = grade.replace(/[+-]/g, '');
  if (g === 'A') return 'grade-A';
  if (g === 'B') return 'grade-B';
  if (g === 'C') return 'grade-C';
  if (g === 'D' || g === 'F') return 'grade-D';
  if (grade === 'INCOMPLETE') return 'grade-INCOMPLETE';
  return '';
}

function flagClass(tag) {
  const t = tag.toUpperCase();
  if (t === 'SHARP') return 'flag-SHARP';
  if (t === 'TRAP') return 'flag-TRAP';
  if (t === 'B2B') return 'flag-B2B';
  if (t === 'UPSET') return 'flag-UPSET';
  if (t === 'PASS') return 'flag-PASS';
  if (t === 'BEST BET' || t === 'BEST') return 'flag-BEST';
  if (t.includes('REST')) return 'flag-REST';
  if (t.includes('INJURY')) return 'flag-INJURY';
  if (t === 'INCOMPLETE') return 'flag-INCOMPLETE';
  return 'flag-default';
}

function bookDisplayName(key) {
  return BOOK_DISPLAY[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function renderMultiBookCard(oddsGame, cardIdx) {
  if (!oddsGame || !oddsGame.all_bookmakers || oddsGame.all_bookmakers.length < 2) {
    return '';
  }

  const books = oddsGame.all_bookmakers;
  const away = oddsGame.away;
  const home = oddsGame.home;
  const toggleId = `booksDetail_${cardIdx}`;

  let html = `<div class="books-section">
    <div class="books-toggle" onclick="toggleBooks('${toggleId}')">&#9660; Compare Lines Across ${books.length} Books</div>
    <div class="books-detail" id="${toggleId}">`;

  // SPREAD comparison
  const spreadData = [];
  books.forEach(bk => {
    const spreads = bk.markets.spreads || [];
    spreads.forEach(s => {
      if (s.name === home) {
        spreadData.push({ book: bk.title || bk.key, team: home, point: s.point, price: s.price });
      }
    });
  });
  if (spreadData.length > 1) {
    // Sort by point (most favorable = most negative for favorite, most positive for dog)
    spreadData.sort((a, b) => a.point - b.point);
    const bestSpread = spreadData[0];
    const worstSpread = spreadData[spreadData.length - 1];
    const gap = Math.abs(worstSpread.point - bestSpread.point);

    html += `<div class="books-market">
      <div class="books-market-title">SPREAD (${esc(home)})</div>`;
    spreadData.forEach((d, i) => {
      const isBest = i === 0;
      const isWorst = i === spreadData.length - 1;
      const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
      const tag = isBest ? '<span class="best-tag">BEST</span>' : (isWorst ? '<span class="worst-tag">WORST</span>' : '');
      html += `<div class="books-row ${cls}">
        <span class="book-name">${esc(bookDisplayName(d.book))}</span>
        <span class="book-line">${esc(home)} ${d.point > 0 ? '+' : ''}${d.point}</span>
        <span class="book-odds">(${d.price > 0 ? '+' : ''}${d.price})</span>
        ${tag}
      </div>`;
    });
    if (gap > 0) {
      html += `<div class="books-gap ${gap >= 1.5 ? 'disagree' : ''}">Gap: ${gap.toFixed(1)} pts${gap >= 1.5 ? ' | BOOKS DISAGREE' : ''}</div>`;
    }
    html += `</div>`;
  }

  // MONEYLINE comparison
  const mlAwayData = [];
  const mlHomeData = [];
  books.forEach(bk => {
    const h2h = bk.markets.h2h || [];
    h2h.forEach(h => {
      if (h.name === away) mlAwayData.push({ book: bk.title || bk.key, team: away, price: h.price });
      if (h.name === home) mlHomeData.push({ book: bk.title || bk.key, team: home, price: h.price });
    });
  });
  if (mlAwayData.length > 1 || mlHomeData.length > 1) {
    html += `<div class="books-market"><div class="books-market-title">MONEYLINE</div>`;

    // Determine who is favorite/dog
    const avgAway = mlAwayData.reduce((s, d) => s + d.price, 0) / (mlAwayData.length || 1);
    const avgHome = mlHomeData.reduce((s, d) => s + d.price, 0) / (mlHomeData.length || 1);
    const dogData = avgAway > avgHome ? mlAwayData : mlHomeData;
    const favData = avgAway > avgHome ? mlHomeData : mlAwayData;
    const dogTeam = avgAway > avgHome ? away : home;
    const favTeam = avgAway > avgHome ? home : away;

    // Show dog lines (higher = better for bettor)
    dogData.sort((a, b) => b.price - a.price);
    favData.sort((a, b) => b.price - a.price); // Less negative = better for fav bettor

    // Merge and show side by side
    const allML = [];
    books.forEach(bk => {
      const h2h = bk.markets.h2h || [];
      let awayP = null, homeP = null;
      h2h.forEach(h => {
        if (h.name === away) awayP = h.price;
        if (h.name === home) homeP = h.price;
      });
      if (awayP !== null && homeP !== null) {
        allML.push({ book: bk.title || bk.key, awayP, homeP, dogP: avgAway > avgHome ? awayP : homeP });
      }
    });
    // Sort by best dog odds
    allML.sort((a, b) => b.dogP - a.dogP);

    allML.forEach((d, i) => {
      const isBest = i === 0;
      const isWorst = i === allML.length - 1;
      const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
      const tag = isBest ? '<span class="best-tag">BEST DOG</span>' : (isWorst ? '<span class="worst-tag">WORST</span>' : '');
      html += `<div class="books-row ${cls}">
        <span class="book-name">${esc(bookDisplayName(d.book))}</span>
        <span class="book-line">${esc(away)} ${d.awayP > 0 ? '+' : ''}${d.awayP} / ${esc(home)} ${d.homeP > 0 ? '+' : ''}${d.homeP}</span>
        ${tag}
      </div>`;
    });

    if (allML.length >= 2) {
      const bestDog = allML[0].dogP;
      const worstDog = allML[allML.length - 1].dogP;
      const gap = Math.abs(bestDog - worstDog);
      if (gap > 0) {
        html += `<div class="books-gap">Gap: ${gap} cents</div>`;
      }
    }
    html += `</div>`;
  }

  // TOTAL comparison
  const totalData = [];
  books.forEach(bk => {
    const totals = bk.markets.totals || [];
    let overP = null, underP = null, point = null;
    totals.forEach(t => {
      if (t.name === 'Over') { overP = t.price; point = t.point; }
      if (t.name === 'Under') { underP = t.price; }
    });
    if (point !== null) {
      totalData.push({ book: bk.title || bk.key, point, overP, underP });
    }
  });
  if (totalData.length > 1) {
    totalData.sort((a, b) => a.point - b.point);
    const low = totalData[0].point;
    const high = totalData[totalData.length - 1].point;
    const gap = high - low;

    html += `<div class="books-market"><div class="books-market-title">TOTAL (O/U)</div>`;
    totalData.forEach((d, i) => {
      const isBest = i === 0;
      const isWorst = i === totalData.length - 1;
      const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
      const tag = isBest ? '<span class="best-tag">LOW</span>' : (isWorst && gap > 0 ? '<span class="worst-tag">HIGH</span>' : '');
      html += `<div class="books-row ${cls}">
        <span class="book-name">${esc(bookDisplayName(d.book))}</span>
        <span class="book-line">O/U ${d.point}</span>
        <span class="book-odds">O(${d.overP > 0 ? '+' : ''}${d.overP}) U(${d.underP > 0 ? '+' : ''}${d.underP})</span>
        ${tag}
      </div>`;
    });
    if (gap > 0) {
      html += `<div class="books-gap ${gap >= 2 ? 'disagree' : ''}">Gap: ${gap.toFixed(1)} pts${gap >= 2 ? ' | BOOKS DISAGREE' : ''}</div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function toggleBooks(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function renderGameCard(game, screenerHits, oddsGame, cardIdx) {
  const matchup = game.matchup || '?';
  const grade = game.grade || 'TBD';
  const awayName = game.away || matchup.split(' @ ')[0] || '';
  const homeName = game.home || matchup.split(' @ ')[1] || '';
  const evKey = (awayName + '_at_' + homeName).replace(/\s+/g, '_');
  _djGameDataMap[evKey] = game;
  const tags = game.tags || [];
  const edgePick = game.edge_pick || {};
  const flags = game.flags || [];
  const peterZone = game.peter_zone || '';
  const edgeSummary = game.edge_summary || '';
  const injuryImpact = game.injury_impact || '';
  const restSchedule = game.rest_schedule || '';
  const edgeQuestion = game.edge_question || '';
  const trends = game.trends || [];

  // Format game time
  const ct = game.commence_time || game.commence || game.time || '';
  let timeStr = '';
  if (ct) {
    const d = new Date(ct);
    timeStr = d.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Los_Angeles' }) + ' PST';
  }

  // Basic lines for header
  const spread = game.spread || game.home_spread || '';
  const total = game.total || '';
  const awayMl = game.away_ml || '';
  const homeMl = game.home_ml || '';
  const lineStr = [
    spread ? `Spread: ${spread > 0 ? '+' : ''}${spread}` : '',
    total ? `Total: ${total}` : '',
    (awayMl && homeMl) ? `ML: ${awayMl > 0 ? '+' : ''}${awayMl}/${homeMl > 0 ? '+' : ''}${homeMl}` : ''
  ].filter(Boolean).join(' | ');

  const isLocked = !!_lockedPicks[evKey];
  let html = `<div class="game-card${isLocked ? ' pick-locked' : ''}">`;

  // Top row: matchup + grade + re-analyze (clickable for pick panel)
  html += `<div class="game-top" onclick="togglePickPanel('${evKey}')" style="cursor:pointer;">
    <div class="matchup-info">
      <div class="matchup-teams">${esc(matchup)}${isLocked ? ' <span class="pick-locked-badge" style="margin-left:8px;margin-top:0;font-size:0.65rem;padding:3px 8px;">LOCKED: ' + esc(_lockedPicks[evKey]) + '</span>' : ''}</div>
      <div class="matchup-meta">${timeStr ? esc(timeStr) : ''}${lineStr ? ' &mdash; ' + esc(lineStr) : ''}</div>
    </div>
    <div class="card-actions">
      ${edgeBadgeHtml(game.composite_score)}
      <div class="grade-badge ${gradeClass(grade)}">${esc(grade)}</div>
      ${renderJimmyBadge(matchup)}
      <button class="reanalyze-btn small" onclick="reanalyzeGame('${currentSport}', '${esc(awayName)}', '${esc(homeName)}')" title="Re-analyze this game">RE-ANALYZE</button>
    </div>
  </div>`;

  // Tags
  if (tags.length > 0) {
    html += `<div class="flags-row">${tags.map(t => `<span class="flag-tag ${flagClass(t)}">${esc(t)}</span>`).join('')}</div>`;
  }

  // Edge pick
  if (edgePick.team && edgePick.team !== 'PASS') {
    html += `<div class="edge-pick-row">
      <div class="edge-pick-label">Edge Pick</div>
      <div class="edge-pick-text">${esc(edgePick.team)} &mdash; ${esc(edgePick.bet_type || '')} ${esc(edgePick.line || '')}</div>
      ${edgePick.reasoning ? `<div class="edge-pick-reasoning">${esc(edgePick.reasoning)}</div>` : ''}
    </div>`;
  }

  // Matrix scores (the 15-variable grading system)
  const matrixScores = game.matrix_scores || {};
  const compositeScore = game.composite_score || null;
  const analyzedBy = game.analyzed_by || game.model || '';
  const matrixKeys = Object.keys(matrixScores);

  if (matrixKeys.length > 0) {
    html += `<div class="analysis-block">
      <div class="ab-label">Scoring Matrix${analyzedBy ? ` — analyzed by ${esc(analyzedBy)}` : ''}${compositeScore ? ` — Composite: ${compositeScore}/10` : ''}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px;margin-top:6px;">`;
    matrixKeys.forEach(key => {
      const val = matrixScores[key];
      const score = typeof val === 'object' ? (val.score || val.value || val) : val;
      const numScore = parseFloat(score) || 0;
      const barColor = numScore >= 7 ? 'var(--green)' : numScore >= 5 ? 'var(--yellow)' : 'var(--red)';
      const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      html += `<div style="background:rgba(255,255,255,0.03);border-radius:4px;padding:4px 6px;font-size:0.65rem;">
        <div style="color:var(--text-dim);margin-bottom:2px;">${esc(label)}</div>
        <div style="display:flex;align-items:center;gap:4px;">
          <div style="flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;">
            <div style="width:${numScore * 10}%;height:100%;background:${barColor};border-radius:2px;"></div>
          </div>
          <span style="font-weight:700;color:${barColor};min-width:20px;text-align:right;">${numScore}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Full analysis breakdown
  const hasAnalysis = edgeQuestion || edgeSummary || injuryImpact || restSchedule || trends.length > 0;
  if (hasAnalysis) {
    html += `<div class="analysis-block">
      <div class="ab-label">Edge Analysis</div>`;

    if (edgeQuestion && edgeQuestion !== 'No clear edge identified.') {
      html += `<div class="ab-edge">${esc(edgeQuestion)}</div>`;
    }
    if (edgeSummary) {
      html += `<div class="ab-row"><strong>Edge:</strong> ${esc(edgeSummary)}</div>`;
    }
    if (injuryImpact && injuryImpact !== 'N/A') {
      html += `<div class="ab-row"><strong>Injuries:</strong> ${esc(injuryImpact)}</div>`;
    }
    if (restSchedule && restSchedule !== 'N/A') {
      html += `<div class="ab-row"><strong>Schedule:</strong> ${esc(restSchedule)}</div>`;
    }
    if (trends.length > 0) {
      html += `<div class="ab-row"><strong>Trends:</strong> ${trends.map(t => esc(t)).join(' | ')}</div>`;
    }
    html += `</div>`;
  }

  // Flags
  if (flags.length > 0) {
    html += `<div class="section-label">Flags</div>
      <div class="gotcha-text" style="font-size:0.72rem;">${flags.map(f => `<div>&#8226; ${esc(f)}</div>`).join('')}</div>`;
  }

  // Peter Zone
  if (peterZone) {
    html += `<div class="peter-zone">${esc(peterZone)}</div>`;
  }

  // Multi-book line comparison
  html += renderMultiBookCard(oddsGame, cardIdx);

  // Screener hits — Jimmy page: hide PASS, show CLOSE and above only
  const closeHits = screenerHits.filter(h => (h.verdict || h.signal || '') !== 'PASS');
  if (closeHits.length > 0) {
    html += `<div class="screener-section">
      <div class="section-label">Screener Hits</div>`;
    closeHits.forEach(hit => {
      const player = hit.player || '?';
      const stat = hit.stat || '';
      const line = hit.line ?? '';
      const floor = hit.floor ?? '';
      const verdict = hit.verdict || hit.signal || 'EDGE';
      html += `<div class="screener-hit">
        <span class="screener-player">${esc(player)}</span>
        <span class="screener-stat">${esc(stat)} line ${line} / floor ${floor}</span>
        <span class="screener-verdict">${esc(verdict)}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // EV Button
  html += `<div style="padding:0 8px 8px;"><button class="ev-btn" data-evkey="${evKey}" onclick="event.stopPropagation();createExpectedValue(this,'${evKey}')" style="width:100%;padding:10px;background:rgba(212,160,23,0.12);border:1px solid rgba(212,160,23,0.3);border-radius:8px;color:#D4A017;font-size:12px;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;">&#9889; Create Expected Value</button><div class="ev-panel" style="display:none;"></div></div>`;

  // Lock Pick Panel
  if (isLocked) {
    html += `<div class="pick-panel open" id="pick-panel-${evKey}"><div class="pick-locked-badge">LOCKED: ${esc(_lockedPicks[evKey])}</div></div>`;
  } else {
    html += `<div class="pick-panel" id="pick-panel-${evKey}">
      <div class="pick-type-row">
        <button class="pick-type-btn" data-type="ml" onclick="event.stopPropagation();selectPickType('${evKey}','ml')">ML</button>
        <button class="pick-type-btn" data-type="spread" onclick="event.stopPropagation();selectPickType('${evKey}','spread')">SPREAD</button>
        <button class="pick-type-btn" data-type="total" onclick="event.stopPropagation();selectPickType('${evKey}','total')">TOTAL</button>
      </div>
      <div class="pick-side-row" id="pick-sides-${evKey}"></div>
      <textarea class="pick-reasoning" id="pick-reason-${evKey}" rows="2" placeholder="Why this pick? (optional)" onclick="event.stopPropagation()"></textarea>
      <button class="pick-lock-btn" id="pick-lock-${evKey}" disabled onclick="event.stopPropagation();lockPick('${evKey}')">LOCK PICK</button>
    </div>`;
  }

  html += `</div>`;
  return html;
}

function esc(s) {
  if (s === null || s === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// === VIEW SWITCHING (Slate vs Matrix) ===
let currentView = 'slate';

function switchView(view) {
  currentView = view;
  const tabSlate = document.getElementById('tabSlate');
  const tabMatrix = document.getElementById('tabMatrix');
  const tabReview = document.getElementById('tabReview');
  const tabFeedback = document.getElementById('tabFeedback');
  // Reset all
  [tabSlate, tabMatrix, tabReview, tabFeedback].forEach(t => { if (t) { t.style.background = ''; t.style.color = ''; t.style.borderColor = ''; } });
  if (view === 'slate') {
    tabSlate.style.background = 'var(--pill-active)'; tabSlate.style.color = '#fff'; tabSlate.style.borderColor = 'var(--accent)';
    if (currentSport) loadSport(currentSport);
  } else if (view === 'matrix') {
    tabMatrix.style.background = 'var(--pill-active)'; tabMatrix.style.color = '#fff'; tabMatrix.style.borderColor = 'var(--accent)';
    renderMatrixView();
  } else if (view === 'review') {
    tabReview.style.background = 'var(--pill-active)'; tabReview.style.color = '#fff'; tabReview.style.borderColor = 'var(--accent)';
    renderReviewView();
  } else if (view === 'feedback') {
    tabFeedback.style.background = 'rgba(255,215,0,0.2)'; tabFeedback.style.color = '#FFD700'; tabFeedback.style.borderColor = 'rgba(255,215,0,0.5)';
    renderFeedbackView();
  }
}

function submitFeedback() {
  const msg = document.getElementById('fbMessage').value.trim();
  const cat = document.getElementById('fbCategory').value;
  const btn = document.getElementById('fbSubmitBtn');
  if (!msg) return;

  btn.textContent = 'SENDING...';
  btn.style.opacity = '0.5';

  fetch('/api/crew-board/jimmy', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ message: msg, category: cat, from: 'Jimmy' })
  }).then(r => r.json()).then(data => {
    btn.textContent = 'SENT ✓';
    btn.style.background = 'linear-gradient(135deg,#10B981,#059669)';
    document.getElementById('fbMessage').value = '';
    setTimeout(() => {
      btn.textContent = 'SEND TO PETER';
      btn.style.background = 'linear-gradient(135deg,#FFD700,#FFA500)';
      btn.style.opacity = '1';
    }, 2000);
    loadFeedbackHistory();
  }).catch(err => {
    btn.textContent = 'FAILED — TRY AGAIN';
    btn.style.background = 'linear-gradient(135deg,#EF4444,#DC2626)';
    btn.style.opacity = '1';
    setTimeout(() => {
      btn.textContent = 'SEND TO PETER';
      btn.style.background = 'linear-gradient(135deg,#FFD700,#FFA500)';
    }, 3000);
  });
}

function loadFeedbackHistory() {
  const histContainer = document.getElementById('fbHistory');
  if (!histContainer) return;

  fetch('/api/crew-board/jimmy').then(r => r.json()).then(data => {
    const notes = data.notes || [];
    if (notes.length === 0) {
      histContainer.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.25);text-align:center;padding:12px;">No feedback yet. Be the first to drop a note.</div>';
      return;
    }

    let html = '<div style="font-size:11px;color:rgba(255,215,0,0.5);font-weight:700;margin-bottom:8px;">PREVIOUS NOTES</div>';
    notes.forEach(n => {
      const catColors = {
        general: '#41EAD4', feature: '#6366f1', bug: '#EF4444',
        matrix: '#F59E0B', ui: '#A855F7', data: '#3B82F6'
      };
      const color = catColors[n.category] || '#41EAD4';
      const reply = n.reply ? `<div style="background:rgba(65,234,212,0.08);border-left:3px solid #41EAD4;padding:6px 10px;margin-top:6px;border-radius:0 6px 6px 0;font-size:11px;color:rgba(255,255,255,0.7);"><strong style="color:#41EAD4;">Peter:</strong> ${n.reply}</div>` : '';
      html += `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">

          <span style="font-size:10px;color:rgba(255,255,255,0.25);">${n.timestamp || ''}</span>

  }).catch(() => {
    histContainer.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.25);text-align:center;">Could not load history.</div>';
  });
}

function renderMatrixView() {

  const userMatrix = agentMatrix[sport] || { matrix: [], excluded: [] };
  const name = agentProfile ? agentProfile.display_name : 'Jimmy';

  // Build a lookup: key -> current weight (override if set, else default)
  const overrideLookup = {};
  if (userMatrix.matrix) {
    userMatrix.matrix.forEach(m => { overrideLookup[m.key] = { weight: m.weight, type: m.type, default_weight: m.default_weight }; });
  }

  let html = `<div style="margin-bottom:12px;">
    <h3 style="font-size:0.85rem;font-weight:800;color:var(--accent-glow);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">${esc(name)}'s Matrix &mdash; ${SPORT_LABELS[sport] || sport.toUpperCase()}</h3>
    <p style="font-size:0.68rem;color:var(--text-dim);margin-bottom:14px;">Edit the weights below (1–10). Yellow = you changed it. Hit Save to lock it in, then Analyze ${esc(name)}'s Way to re-run the cards.</p>`;

  if (matrix) {
    matrix.forEach(([key, defaultWeight]) => {
      const override = overrideLookup[key];
      const currentWeight = override ? override.weight : defaultWeight;
      const isChanged = override && override.type === 'override';
      const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      const rowBg = isChanged ? 'rgba(255,217,61,0.06)' : 'rgba(255,255,255,0.03)';
      const rowBorder = isChanged ? '1px solid rgba(255,217,61,0.2)' : '1px solid transparent';
      const weightColor = isChanged ? 'var(--yellow)' : (currentWeight >= 9 ? 'var(--green)' : currentWeight >= 7 ? 'var(--accent-glow)' : 'var(--text-dim)');
      html += `<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;margin-bottom:3px;background:${rowBg};border:${rowBorder};border-radius:7px;">
        <span style="flex:1;font-size:0.73rem;font-weight:600;">${esc(label)}</span>
        ${isChanged ? `<span style="font-size:0.62rem;color:var(--text-dim);">default ${defaultWeight}</span>` : ''}
        <input type="number" min="1" max="10" value="${currentWeight}"
          data-key="${esc(key)}" data-default="${defaultWeight}"
          style="width:44px;padding:4px 6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:5px;color:${weightColor};font-size:0.8rem;font-weight:800;text-align:center;"
          oninput="onWeightInput(this)">
      </div>`;
    });
  }
  html += `</div>`;

  // Save + Reset row
  html += `<div style="display:flex;gap:8px;margin-bottom:16px;">
    <button id="saveMatrixBtn" onclick="saveMatrix('${sport}')"
      style="flex:2;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.8rem;font-weight:800;letter-spacing:0.5px;cursor:pointer;">
      SAVE CHANGES
    </button>
    <button onclick="resetMatrix('${sport}')"
      style="flex:1;padding:12px;background:rgba(255,255,255,0.06);color:var(--text-dim);border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-size:0.75rem;font-weight:600;cursor:pointer;">
      RESET
    </button>
  </div>`;

  // Analyze buttons
  html += `<div style="display:flex;gap:10px;margin-bottom:20px;">
    <button class="analyze-my-way" id="analyzeMyWayBtn" onclick="analyzeMyWay('${sport}')" style="flex:1;">Analyze ${esc(name)}'s Way</button>
    <button class="reanalyze-btn" onclick="reanalyzeSlate('${sport}')" style="flex:1;padding:14px;">Analyze Default</button>
  </div>`;

  container.innerHTML = html;
  document.getElementById('footer').style.display = 'none';
}

function onWeightInput(el) {
  // Clamp to 1-10 as user types
  let v = parseInt(el.value);
  if (isNaN(v)) return;
  v = Math.max(1, Math.min(10, v));
  const def = parseInt(el.dataset.default);
  el.style.color = (v !== def) ? 'var(--yellow)' : 'var(--text-dim)';
}

async function saveMatrix(sport) {
  const btn = document.getElementById('saveMatrixBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'SAVING...'; }

  const inputs = document.querySelectorAll('[data-key]');
  const changes = [];
  inputs.forEach(inp => {
    const key = inp.dataset.key;
    const def = parseInt(inp.dataset.default);
    const val = Math.max(1, Math.min(10, parseInt(inp.value) || def));
    if (val !== def) changes.push({ variable: key, weight: val });
  });

  try {
    // Fire all weight updates in parallel
    await Promise.all(changes.map(c =>
      fetch(`/api/agent/${AGENT_USER_ID}/action`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'update_weight', sport, args: { variable: c.variable, weight: c.weight, sport } })
      })
    ));
    // Refresh cached matrix
    const matrixResp = await fetch(`/api/agent/${AGENT_USER_ID}/matrix/${sport}`).then(r => r.json()).catch(() => null);
    if (matrixResp) agentMatrix[sport] = matrixResp;
    showAgentToast(changes.length > 0 ? `Saved ${changes.length} weight change${changes.length > 1 ? 's' : ''}` : 'No changes to save');
    renderMatrixView();
  } catch(e) {
    showAgentToast('Save failed: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'SAVE CHANGES'; }
  }
}

async function resetMatrix(sport) {
  if (!confirm('Reset all weights to system defaults?')) return;
  try {
    await fetch(`/api/agent/${AGENT_USER_ID}/action`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reset_to_default', sport, args: { sport } })
    });
    const matrixResp = await fetch(`/api/agent/${AGENT_USER_ID}/matrix/${sport}`).then(r => r.json()).catch(() => null);
    if (matrixResp) agentMatrix[sport] = matrixResp;
    showAgentToast('Matrix reset to defaults');
    renderMatrixView();
  } catch(e) {
    showAgentToast('Reset failed: ' + e.message);
  }
}

function renderJimmyBadge(matchup) {
  if (!currentSport || !djAnalysis[currentSport]) return '';
  const djGames = djAnalysis[currentSport].games || [];
  const djGame = djGames.find(g => g.matchup === matchup);
  if (!djGame) return '';

  const defData = analysisCache[currentSport] || {};
  const defGames = defData.games || [];
  const defGame = defGames.find(g => g.matchup === matchup);
  const defScore = defGame ? (defGame.composite_score || 0) : 0;
  const djScore = djGame.composite_score || 0;
  const diff = (djScore - defScore).toFixed(1);
  const cls = diff > 0 ? 'dj-delta-up' : (diff < 0 ? 'dj-delta-down' : 'dj-delta-same');
  const arrow = diff > 0 ? '\u2191' : (diff < 0 ? '\u2193' : '=');
  return `<span class="dj-result-badge ${cls}">Jimmy: ${esc(djGame.grade)} (${djScore.toFixed(1)}) ${arrow}${Math.abs(diff)}</span>`;
}
