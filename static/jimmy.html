// === VOICE — Gold Standard (Casa Companion pattern) ===
let waitToRespondMode = false;
let voiceInteractionMode = 'freeflow';
let currentEagerness = 'medium';
let aiTranscriptBuffer = '';
let aiTranscriptEl = null;

function startVoiceWithMode(mode) {
  if (voiceActive) { endVoice(); return; }
  const btnConv = document.getElementById('btnConversation');
  const btnTurns = document.getElementById('btnTakeTurns');
  const btn = mode === 'turnbased' ? btnTurns : btnConv;
  if (btn && btn.disabled) return;
  if (btnConv) btnConv.disabled = true;
  if (btnTurns) btnTurns.disabled = true;
  setTimeout(() => { if (btnConv) btnConv.disabled = false; if (btnTurns) btnTurns.disabled = false; }, 1000);

  voiceInteractionMode = mode;
  waitToRespondMode = (mode === 'turnbased');
  startVoiceMode();
}

async function startVoiceMode() {
  const overlay = document.getElementById('voiceConnecting');
  const connectText = document.getElementById('voiceConnectText');
  if (overlay) overlay.classList.add('visible');
  if (connectText) connectText.textContent = 'Connecting to Jimmy\'s Edge Agent...';

  try {
    // 1. Token with user_id
    const tokenResp = await fetch('/api/voice/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ user_id: AGENT_USER_ID })
    });
    if (!tokenResp.ok) throw new Error('Failed to get voice token');
    const tokenData = await tokenResp.json();

    // 2. Peer connection
    rtcPC = new RTCPeerConnection();

    // 3. Audio output
    const audioEl = document.getElementById('rtcAudio');
    rtcPC.ontrack = event => {
      if (event.streams.length > 0) audioEl.srcObject = event.streams[0];
    };

    // 4. Mic
    rtcMicStream = await navigator.mediaDevices.getUserMedia({
      audio: {noiseSuppression:true, echoCancellation:true, autoGainControl:true, channelCount:1}
    });
    rtcPC.addTrack(rtcMicStream.getAudioTracks()[0]);

    // 5. Data channel
    rtcDC = rtcPC.createDataChannel('realtime-channel');

    // 6. Offer + SDP exchange
    const offer = await rtcPC.createOffer();
    await rtcPC.setLocalDescription(offer);

    const sdpResp = await fetch('/api/voice/sdp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sdp: offer.sdp, token: tokenData.token})
    });
    if (!sdpResp.ok) throw new Error('SDP exchange failed');
    const answerSdp = await sdpResp.text();
    await rtcPC.setRemoteDescription({type: 'answer', sdp: answerSdp});

    // 7. On data channel open — configure session
    rtcDC.onopen = () => {
      if (overlay) overlay.classList.remove('visible');

      // Configure VAD with mode settings
      rtcDC.send(JSON.stringify({
        type: 'session.update',
        session: {
          input_audio_transcription: {model: 'whisper-1'},
          turn_detection: {
            type: 'semantic_vad',
            create_response: true,
            interrupt_response: !waitToRespondMode,
            eagerness: currentEagerness
          }
        }
      }));

      voiceActive = true;
      updateVoiceUI(true);

      // Open transcript area
      document.getElementById('voiceTranscript').classList.add('open');

      // Set status
      const statusText = document.getElementById('voiceStatusText');
      if (statusText) statusText.textContent = waitToRespondMode
        ? 'Take Turns — listen, then speak'
        : 'Conversation mode. Just talk.';

      // Greeting — onboarding-aware
      const name = agentProfile ? agentProfile.display_name : 'Jimmy';
      const sport = currentSport ? currentSport.toUpperCase() : 'the slate';
      const hasCustomizations = agentProfile && agentProfile.matrices && Object.keys(agentProfile.matrices).some(s => {
        const m = agentProfile.matrices[s];
        return (m.overrides && Object.keys(m.overrides).length) || (m.custom_vars && m.custom_vars.length) || (m.excluded && m.excluded.length);
      });

      if (hasCustomizations) {
        rtcDC.send(JSON.stringify({
          type: 'response.create',
          response: {
            instructions: `Greet ${name} by name. You're their Edge Agent. Current sport is ${sport}. Mention they have custom weights saved. Ask what they want to do — adjust weights, analyze the slate their way, or explore props. 2-3 sentences, be sharp.`
          }
        }));
      } else {
        rtcDC.send(JSON.stringify({
          type: 'response.create',
          response: {
            instructions: `Greet ${name} by name. You're their personal Edge Agent. Tell them briefly: "We grade every game using a 20-variable weighted matrix — injuries, rest, sharp money, matchups. You can customize the weights to match how YOU see the game." Then ask: "Want me to walk you through the ${sport} variables so you can build your own grading sheet? Or I can show you what's on the slate tonight." Keep it to 3-4 sentences. Be welcoming but sharp.`
          }
        }));
      }
    };

    // 8. Handle all RTC events — gold standard
    rtcDC.onmessage = event => {
      const msg = JSON.parse(event.data);
      handleRTCEvent(msg);
    };

    rtcDC.onclose = () => endVoice();
    rtcPC.oniceconnectionstatechange = () => {
      if (rtcPC && (rtcPC.iceConnectionState === 'failed' || rtcPC.iceConnectionState === 'disconnected')) {
        endVoice();
        showAgentToast('Voice connection lost');
      }
    };

  } catch(e) {
    if (overlay) overlay.classList.remove('visible');
    showAgentToast('Voice error: ' + e.message);
    endVoice();
  }
}

function handleRTCEvent(msg) {
  const statusRow = document.getElementById('voiceStatusRow');
  const statusText = document.getElementById('voiceStatusText');
  const transcript = document.getElementById('voiceTranscript');

  switch (msg.type) {
    case 'input_audio_buffer.speech_started':
      setVoiceState('listening');
      aiTranscriptBuffer = '';
      aiTranscriptEl = null;
      break;

    case 'input_audio_buffer.speech_stopped':
      setVoiceState('thinking');
      break;

    case 'conversation.item.input_audio_transcription.completed':
      if (msg.transcript && msg.transcript.trim()) {
        addVoiceTranscript('user', msg.transcript.trim());
      }
      break;

    case 'response.output_audio_transcript.delta':
      // Build AI response word-by-word
      if (!aiTranscriptEl) {
        aiTranscriptBuffer = '';
        aiTranscriptEl = document.createElement('p');
        aiTranscriptEl.className = 'vt-agent';
        if (transcript) transcript.appendChild(aiTranscriptEl);
      }
      aiTranscriptBuffer += msg.delta;
      aiTranscriptEl.textContent = aiTranscriptBuffer;
      if (transcript) transcript.scrollTop = transcript.scrollHeight;
      break;

    case 'response.output_audio_transcript.done':
      aiTranscriptEl = null;
      aiTranscriptBuffer = '';
      break;

    case 'output_audio_buffer.started':
      setVoiceState('speaking');
      if (waitToRespondMode) muteRtcMic();
      break;

    case 'output_audio_buffer.stopped':
      setVoiceState('idle');
      if (waitToRespondMode) unmuteRtcMic();
      if (voiceActive && statusText) {
        statusText.textContent = waitToRespondMode
          ? 'Your turn \u2014 speak now'
          : 'Conversation mode. Just talk.';
      }
      break;

    case 'response.function_call_arguments.done':
      handleAgentFunctionCall(msg);
      break;

    case 'error':
      console.error('Realtime API error:', msg.error);
      showAgentToast('Voice error: ' + (msg.error?.message || 'Unknown'));
      break;
  }
}

function setVoiceState(state) {
  const statusRow = document.getElementById('voiceStatusRow');
  const statusText = document.getElementById('voiceStatusText');
  if (!statusRow) return;

  statusRow.className = 'voice-status-row active state-' + state;
  switch (state) {
    case 'listening':
      statusText.textContent = 'Listening...';
      break;
    case 'thinking':
      statusText.textContent = 'Thinking...';
      break;
    case 'speaking':
      statusText.textContent = 'Speaking...';
      break;
    case 'idle':
      statusText.textContent = waitToRespondMode
        ? 'Your turn \u2014 speak now'
        : 'Conversation mode. Just talk.';
      break;
  }
}

function addVoiceTranscript(role, text) {
  const transcript = document.getElementById('voiceTranscript');
  if (!transcript) return;
  const p = document.createElement('p');
  p.className = role === 'user' ? 'vt-user' : 'vt-agent';
  p.textContent = text;
  transcript.appendChild(p);
  transcript.scrollTop = transcript.scrollHeight;
}

async function handleAgentFunctionCall(msg) {
  const fnName = msg.name;
  let args = {};
  try { args = JSON.parse(msg.arguments || '{}'); } catch(e) {}
  const callId = msg.call_id;

  // Default sport to current if not specified
  if (!args.sport && currentSport) args.sport = currentSport;

  try {
    const resp = await fetch('/api/agent/' + AGENT_USER_ID + '/action', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: fnName, args: args })
    });
    const result = await resp.json();

    // Send result back to realtime session
    if (rtcDC && rtcDC.readyState === 'open') {
      rtcDC.send(JSON.stringify({
        type: 'conversation.item.create',
        item: { type: 'function_call_output', call_id: callId, output: JSON.stringify(result) }
      }));
      rtcDC.send(JSON.stringify({ type: 'response.create' }));
    }

    // Refresh matrix + UI
    if (result.success) {
      showAgentToast(result.message || 'Updated');
      const matrixResp = await fetch('/api/agent/' + AGENT_USER_ID + '/matrix/' + (args.sport || currentSport));
      if (matrixResp.ok) agentMatrix[args.sport || currentSport] = await matrixResp.json();
      if (currentSport) await loadSport(currentSport);
    }
  } catch(e) {
    showAgentToast('Action error: ' + e.message);
  }
}

function updateMicSensitivity(level) {
  currentEagerness = level;
  if (rtcDC && rtcDC.readyState === 'open') {
    rtcDC.send(JSON.stringify({
      type: 'session.update',
      session: {
        turn_detection: {
          type: 'semantic_vad',
          create_response: true,
          interrupt_response: !waitToRespondMode,
          eagerness: level
        }
      }
    }));
  }
}

function muteRtcMic() {
  if (rtcMicStream) rtcMicStream.getAudioTracks().forEach(t => { t.enabled = false; });
}
function unmuteRtcMic() {
  if (rtcMicStream) rtcMicStream.getAudioTracks().forEach(t => { t.enabled = true; });
}

function endVoice() {
  voiceActive = false;
  waitToRespondMode = false;
  voiceInteractionMode = 'freeflow';
  if (rtcDC) { try { rtcDC.close(); } catch(e){} rtcDC = null; }
  if (rtcPC) { try { rtcPC.close(); } catch(e){} rtcPC = null; }
  if (rtcMicStream) { rtcMicStream.getTracks().forEach(t => t.stop()); rtcMicStream = null; }
  const audioEl = document.getElementById('rtcAudio');
  if (audioEl && audioEl.srcObject) {
    audioEl.srcObject.getTracks().forEach(t => t.stop());
    audioEl.srcObject = null;
  }
  updateVoiceUI(false);
  document.getElementById('voiceConnecting').classList.remove('visible');
  document.getElementById('voiceTranscript').classList.remove('open');
}

function updateVoiceUI(active) {
  const btnConv = document.getElementById('btnConversation');
  const btnTurns = document.getElementById('btnTakeTurns');
  const btnEnd = document.getElementById('btnEndVoice');
  const micBtn = document.getElementById('voiceMicBtn');
  const statusRow = document.getElementById('voiceStatusRow');
  const micSens = document.getElementById('micSensitivity');

  if (active) {
    const activeBtn = voiceInteractionMode === 'turnbased' ? btnTurns : btnConv;
    if (activeBtn) activeBtn.classList.add('active');
    if (btnEnd) btnEnd.classList.add('visible');
    if (micBtn) micBtn.classList.add('listening');
    if (statusRow) statusRow.classList.add('active');
    if (micSens) micSens.classList.add('visible');
  } else {
    if (btnConv) btnConv.classList.remove('active');
    if (btnTurns) btnTurns.classList.remove('active');
    if (btnEnd) btnEnd.classList.remove('visible');
    if (micBtn) micBtn.classList.remove('listening');
    if (statusRow) { statusRow.classList.remove('active'); statusRow.className = 'voice-status-row'; }
    if (micSens) micSens.classList.remove('visible');
  }
}

// ===== EV CARD ANALYSIS =====
function createExpectedValue(btn, evKey) {
  var g = _djGameDataMap[evKey];
  if (!g) { alert('Game data not found'); return; }
  btn.disabled = true;
  btn.innerHTML = '&#9889; Analyzing...';
  btn.style.opacity = '0.6';
  var panel = btn.parentElement.querySelector('.ev-panel');
  var awayAbbr = (g.away || g.matchup.split(' @ ')[0] || '').split(' ').pop();
  var homeAbbr = (g.home || g.matchup.split(' @ ')[1] || '').split(' ').pop();
  var payload = {
    sport: (currentSport || 'nba').toLowerCase(),
    away_team: g.away || g.matchup.split(' @ ')[0] || '',
    home_team: g.home || g.matchup.split(' @ ')[1] || '',
    spread_away: g.away_spread || -(g.spread || 0),
    spread_home: g.spread || g.home_spread || 0,
    ml_away: g.away_ml || 0, ml_home: g.home_ml || 0,
    over_under: g.total || 0, matrix_score: g.grade || '--',
    signals: g.tags || [], chain_bonus: g.chain_bonus || 0,
    the_play: g.peter_zone || '', game_time: g.commence_time || g.time || ''
  };
  fetch('/api/ev/card', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
  .then(function(r) { return r.json(); })
  .then(function(ev) {
    renderEVPanel(panel, ev, g, awayAbbr, homeAbbr);
    btn.innerHTML = '&#9889; Refresh EV'; btn.disabled = false; btn.style.opacity = '1';
  })
  .catch(function() {
    panel.style.display = 'block';
    panel.innerHTML = '<div style="padding:12px;color:#EF4444;font-size:12px;">EV engines timed out. Try again.</div>';
    btn.innerHTML = '&#9889; Create Expected Value'; btn.disabled = false; btn.style.opacity = '1';
  });
}
function renderEVPanel(panel, ev, g, awayAbbr, homeAbbr) {
  panel.style.display = 'block';
  var matchup = awayAbbr + ' @ ' + homeAbbr;
  if (ev.error) { panel.innerHTML = '<div style="padding:12px;color:#EF4444;font-size:12px;">' + ev.error + '</div>'; return; }
  if (ev.raw_text) { panel.innerHTML = '<div style="padding:12px;color:#B0BEC5;font-size:11px;white-space:pre-wrap;">' + ev.raw_text + '</div>'; return; }
  var html = '<div style="background:rgba(212,160,23,0.06);border:1px solid rgba(212,160,23,0.2);border-radius:8px;padding:12px;margin-top:8px;">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
  html += '<span style="font-size:12px;font-weight:800;color:#D4A017;letter-spacing:0.5px;">&#9889; EV ANALYSIS</span>';
  html += '<span onclick="collapseEVPanel(this)" style="cursor:pointer;color:rgba(255,255,255,0.3);font-size:14px;padding:2px 6px;">&times;</span></div>';
  if (ev.spread_call) { html += '<div style="margin-bottom:10px;"><div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:3px;">SPREAD CALL</div><div style="font-size:12px;color:#fff;font-weight:600;">' + (ev.spread_call.pick || '') + '</div><div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;">' + (ev.spread_call.reasoning || '') + '</div></div>'; }
  if (ev.top_props && ev.top_props.length > 0) { html += '<div style="margin-bottom:10px;"><div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:3px;">TOP PROPS (Mathurin Test)</div>'; ev.top_props.forEach(function(p) { var vc = p.verdict === 'MISPRICED' ? '#10B981' : (p.verdict === 'CLOSE' ? '#FBB024' : '#B0BEC5'); html += '<div style="font-size:11px;color:#fff;margin-bottom:4px;"><strong>' + (p.player || '') + '</strong> ' + (p.prop || '') + ' <span style="color:' + vc + ';font-weight:700;font-size:10px;">' + (p.verdict || '') + '</span>'; if (p.l5_floor !== undefined && p.line !== undefined) { html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);">L5 floor: ' + p.l5_floor + ' | Line: ' + p.line + ' | Gap: ' + (p.gap > 0 ? '+' : '') + p.gap + '</div>'; } html += '</div>'; }); html += '</div>'; } else { html += '<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:10px;">No mispriced props found.</div>'; }
  if (ev.book_discrepancy) { html += '<div style="margin-bottom:10px;"><div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:3px;">BOOK DISCREPANCY</div><div style="font-size:11px;color:rgba(255,255,255,0.5);">' + ev.book_discrepancy + '</div></div>'; }
  if (ev.trap_check) { html += '<div style="margin-bottom:10px;"><div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:3px;">TRAP CHECK</div><div style="font-size:11px;color:rgba(255,255,255,0.5);">' + ev.trap_check + '</div></div>'; }
  if (ev._engine_data) { var ed = ev._engine_data; html += '<div style="font-size:9px;color:rgba(255,255,255,0.15);margin-top:8px;">Engines: ' + ed.screener_count + ' screened, ' + ed.disc_count + ' discrepancies, ' + ed.gap_count + ' gaps</div>'; }
  html += '</div>'; panel.innerHTML = html;
}
function collapseEVPanel(closeBtn) {
  var panel = closeBtn.closest('.ev-panel');
  if (panel) { panel.style.display = 'none'; panel.innerHTML = ''; var evBtn = panel.parentElement.querySelector('.ev-btn'); if (evBtn) evBtn.innerHTML = '&#9889; Create Expected Value'; }
}

// === BET QUEUE FUNCTIONS ===
async function loadBetQueueCount() {
  try {
    const resp = await fetch('/api/picks?status=pending');
    if (resp.ok) {
      const data = await resp.json();
      const picks = (data.picks || data.data || []).filter(p =>
        p.confidence === 'Strong' || p.confidence === 'Lock' || p.confidence === 'Fire' || p.confidence === 'Hammer'
      );
      const el = document.getElementById('betQueueCount');
      if (el) el.textContent = picks.length;
    }
  } catch(e) { console.log('Bet queue count failed'); }
}

async function loadBetQueue() {
  const container = document.getElementById('gamesContainer');
  const headerBar = document.getElementById('headerBar');
  const landingPage = document.getElementById('landingPage');
  const footer = document.getElementById('footer');
  if (landingPage) landingPage.innerHTML = '';
  if (headerBar) headerBar.style.display = 'block';
  if (footer) footer.style.display = 'block';
  document.getElementById('sportLabel').textContent = 'BET QUEUE';

  container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading bet queue...</div></div>';

  try {
    const resp = await fetch('/api/picks');
    if (!resp.ok) throw new Error('Failed to load picks');
    const data = await resp.json();
    const today = new Date().toISOString().slice(0, 10);
    const picks = (data.picks || data.data || []).filter(p => {
      const pDate = (p.created_at || p.timestamp || '').slice(0, 10);
      return pDate === today && p.result === null;
    });

    if (picks.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="icon">&#9989;</div><p>No pending bets in the queue. Check back before tip.</p></div>';
      return;
    }

    let html = '';
    picks.forEach(p => {
      const conf = p.confidence || '';
      const confColor = conf === 'Lock' || conf === 'Fire' ? 'var(--red)' :
                        conf === 'Strong' ? 'var(--green)' :
                        conf === 'Moderate' ? 'var(--yellow)' : 'var(--text-dim)';
      html += `
        <div class="game-card" style="margin-bottom:12px;padding:16px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:0.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;">${p.sport || ''}</span>
            <span style="font-size:0.7rem;font-weight:800;color:${confColor};text-transform:uppercase;">${conf} ${p.units ? p.units + 'u' : ''}</span>
          </div>
          <div style="font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:4px;">${p.selection || ''}</div>
          <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:8px;">${p.matchup || ''} | ${p.type || ''} | ${p.odds || ''}</div>
          <div style="font-size:0.75rem;color:var(--text-dim);line-height:1.5;">${p.notes || ''}</div>
          <div style="margin-top:12px;display:flex;gap:8px;">
            <button onclick="window.open('https://www.hardrocksportsbook.com','_blank')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--green);background:rgba(0,214,143,0.1);color:var(--green);font-size:0.75rem;font-weight:700;cursor:pointer;">PLACE AT HARD ROCK</button>
            <button onclick="printBetSlip(this, '${(p.selection||'').replace(/'/g,"\\'")}', '${(p.matchup||'').replace(/'/g,"\\'")}', '${p.odds||''}', '${p.units||''}', '${p.sport||''}')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--accent);background:rgba(108,92,231,0.1);color:var(--accent);font-size:0.75rem;font-weight:700;cursor:pointer;">PRINT SLIP</button>
          </div>
          <div style="margin-top:8px;">
            <input type="text" placeholder="Paste ticket # to confirm" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--card-border);background:var(--bg);color:var(--text);font-size:0.8rem;" onkeydown="if(event.key==='Enter')confirmBet(this,'${p.id||''}')">
          </div>
          <div style="font-size:0.65rem;color:var(--text-dim);margin-top:4px;">By: ${p.name || ''} | ${(p.created_at || p.timestamp || '').slice(11,16)}</div>
        </div>`;
    });

    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><p>Error loading queue: ' + e.message + '</p></div>';
  }
}

// === LOCK PICK UI ===
const _lockedPicks = JSON.parse(sessionStorage.getItem('jimmy_locked_picks') || '{}');

function togglePickPanel(evKey) {
  const panel = document.getElementById('pick-panel-' + evKey);
  if (!panel || _lockedPicks[evKey]) return;
  // Close all other panels first
  document.querySelectorAll('.pick-panel.open').forEach(p => {
    if (p.id !== 'pick-panel-' + evKey) p.classList.remove('open');
  });
  panel.classList.toggle('open');
}

function selectPickType(evKey, type) {
  const game = _djGameDataMap[evKey];
  if (!game) return;
  // Update type buttons
  document.querySelectorAll('#pick-panel-' + evKey + ' .pick-type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
  // Build side buttons
  const sideRow = document.getElementById('pick-sides-' + evKey);
  const awayName = game.away || (game.matchup || '').split(' @ ')[0] || 'AWAY';
  const homeName = game.home || (game.matchup || '').split(' @ ')[1] || 'HOME';
  const spread = parseFloat(game.spread || game.home_spread || 0);
  const total = parseFloat(game.total || 0);
  const awayMl = game.away_ml || '';
  const homeMl = game.home_ml || '';

  let html = '';
  if (type === 'ml') {
    const aOdds = awayMl ? (awayMl > 0 ? '+' + awayMl : awayMl) : '';
    const hOdds = homeMl ? (homeMl > 0 ? '+' + homeMl : homeMl) : '';
    html = `<button class="pick-side-btn" data-sel="${esc(awayName)} ML" data-odds="${aOdds}" onclick="selectPickSide('${evKey}',this)">${esc(awayName)} ML<br><span style="font-size:0.7rem;color:var(--text-dim)">${aOdds}</span></button>`;
    html += `<button class="pick-side-btn" data-sel="${esc(homeName)} ML" data-odds="${hOdds}" onclick="selectPickSide('${evKey}',this)">${esc(homeName)} ML<br><span style="font-size:0.7rem;color:var(--text-dim)">${hOdds}</span></button>`;
  } else if (type === 'spread') {
    const awaySpread = spread ? ((-spread) > 0 ? '+' + (-spread) : (-spread)) : '';
    const homeSpread = spread ? (spread > 0 ? '+' + spread : spread) : '';
    html = `<button class="pick-side-btn" data-sel="${esc(awayName)} ${awaySpread}" data-odds="-110" onclick="selectPickSide('${evKey}',this)">${esc(awayName)} ${awaySpread}<br><span style="font-size:0.7rem;color:var(--text-dim)">-110</span></button>`;
    html += `<button class="pick-side-btn" data-sel="${esc(homeName)} ${homeSpread}" data-odds="-110" onclick="selectPickSide('${evKey}',this)">${esc(homeName)} ${homeSpread}<br><span style="font-size:0.7rem;color:var(--text-dim)">-110</span></button>`;
  } else if (type === 'total') {
    html = `<button class="pick-side-btn" data-sel="OVER ${total}" data-odds="-110" onclick="selectPickSide('${evKey}',this)">OVER ${total}<br><span style="font-size:0.7rem;color:var(--text-dim)">-110</span></button>`;
    html += `<button class="pick-side-btn" data-sel="UNDER ${total}" data-odds="-110" onclick="selectPickSide('${evKey}',this)">UNDER ${total}<br><span style="font-size:0.7rem;color:var(--text-dim)">-110</span></button>`;
  }
  sideRow.innerHTML = html;
  // Reset lock button
  const lockBtn = document.getElementById('pick-lock-' + evKey);
  lockBtn.disabled = true;
  lockBtn.dataset.sel = '';
  lockBtn.dataset.odds = '';
  lockBtn.dataset.type = type;
}

function selectPickSide(evKey, btn) {
  // Highlight selected
  btn.closest('.pick-side-row').querySelectorAll('.pick-side-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Enable lock button
  const lockBtn = document.getElementById('pick-lock-' + evKey);
  lockBtn.disabled = false;
  lockBtn.dataset.sel = btn.dataset.sel;
  lockBtn.dataset.odds = btn.dataset.odds;
}

async function lockPick(evKey) {
  if (_lockedPicks[evKey]) return;
  const lockBtn = document.getElementById('pick-lock-' + evKey);
  const game = _djGameDataMap[evKey];
  if (!game || !lockBtn.dataset.sel) return;

  lockBtn.disabled = true;
  lockBtn.textContent = 'LOCKING...';

  const awayName = game.away || (game.matchup || '').split(' @ ')[0] || '';
  const homeName = game.home || (game.matchup || '').split(' @ ')[1] || '';
  const reasoning = (document.getElementById('pick-reason-' + evKey) || {}).value || '';
  const name = agentProfile ? agentProfile.display_name : 'Jimmy';

  const payload = {
    name: name,
    sport: currentSport || '',
    matchup: awayName + ' @ ' + homeName,
    selection: lockBtn.dataset.sel,
    odds: lockBtn.dataset.odds,
    type: lockBtn.dataset.type || '',
    reasoning: reasoning,
    timestamp: new Date().toISOString(),
    source: 'profile_card'
  };

  try {
    const resp = await fetch('/api/picks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error('POST failed: ' + resp.status);

    // Mark as locked
    _lockedPicks[evKey] = payload.selection;
    sessionStorage.setItem('jimmy_locked_picks', JSON.stringify(_lockedPicks));

    // Replace the panel with a locked badge
    const panel = document.getElementById('pick-panel-' + evKey);
    panel.innerHTML = `<div class="pick-locked-badge">LOCKED: ${esc(payload.selection)}</div>`;
    panel.classList.add('open');

    // Add green border to card
    panel.closest('.game-card').classList.add('pick-locked');

    showAgentToast('Pick locked: ' + payload.selection);
  } catch (err) {
    console.error('Lock pick error:', err);
    lockBtn.textContent = 'LOCK PICK';
    lockBtn.disabled = false;
    showAgentToast('Failed to lock pick. Try again.');
  }
}
