<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peter — NBA Edge</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; }

.header { padding:20px 16px 12px; border-bottom:1px solid rgba(212,160,23,0.15); }
.header h1 { font-size:22px; font-weight:900; color:#D4A017; letter-spacing:-0.5px; }
.header h1 span { color:rgba(255,255,255,0.4); font-weight:400; font-size:14px; }

/* Tabs */
.tabs { display:flex; gap:0; border-bottom:1px solid rgba(255,255,255,0.08); padding:0 16px; }
.tab { padding:12px 20px; font-size:12px; font-weight:800; letter-spacing:1px; color:rgba(255,255,255,0.35); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.tab.active { color:#D4A017; border-bottom-color:#D4A017; }
.tab:hover { color:rgba(255,255,255,0.7); }

/* Stats bar */
.stats-bar { display:flex; gap:12px; padding:12px 16px; overflow-x:auto; flex-wrap:wrap; }
.stat-pill { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:6px 12px; font-size:11px; color:rgba(255,255,255,0.5); white-space:nowrap; }
.stat-pill b { color:#D4A017; font-weight:700; }

/* Content panels */
.panel { display:none; padding:16px; }
.panel.active { display:block; }

/* Cards */
.profedge-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:16px; margin-bottom:14px; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.06); }
.matchup-text { font-size:16px; font-weight:800; color:#fff; }
.time-text { color:rgba(255,255,255,0.3); font-size:11px; font-weight:400; }
.grade-area { text-align:right; display:flex; align-items:center; gap:10px; }
.pct-badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; }
.grade-big { font-size:28px; font-weight:900; }
.grade-avg { font-size:11px; color:rgba(255,255,255,0.4); }

/* Pipeline */
.pipeline-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; scrollbar-width:thin; -webkit-overflow-scrolling:touch; }
.pipeline-step { min-width:170px; flex-shrink:0; border-radius:10px; padding:10px; }
.step-label { font-size:9px; font-weight:800; letter-spacing:1px; margin-bottom:6px; }
.step-data { font-size:11px; color:rgba(255,255,255,0.6); line-height:1.6; }
.step-data b { color:#fff; font-weight:700; }

/* Matrix tab */
.matrix-container { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:768px) { .matrix-container { grid-template-columns:1fr; } }
.matrix-panel { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:16px; }
.matrix-title { font-size:13px; font-weight:800; letter-spacing:1px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.06); }
.matrix-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.03); gap:8px; }
.matrix-var-name { font-size:11px; color:rgba(255,255,255,0.6); flex:1; min-width:0; }
.matrix-var-desc { font-size:9px; color:rgba(255,255,255,0.3); flex:2; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.matrix-weight { font-size:13px; font-weight:800; min-width:30px; text-align:center; }
.matrix-input { width:50px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:6px; color:#fff; font-size:13px; font-weight:700; text-align:center; padding:4px; }
.matrix-input:focus { outline:none; border-color:#D4A017; }
.matrix-input.higher { border-color:#10B981; background:rgba(16,185,129,0.1); }
.matrix-input.lower { border-color:#ef4444; background:rgba(239,68,68,0.1); }

.save-btn { margin-top:16px; width:100%; padding:12px; background:rgba(212,160,23,0.15); border:1px solid rgba(212,160,23,0.4); color:#D4A017; font-size:13px; font-weight:800; border-radius:8px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; }
.save-btn:hover { background:rgba(212,160,23,0.25); }
.save-btn:disabled { opacity:0.4; cursor:not-allowed; }
.save-msg { text-align:center; font-size:11px; margin-top:8px; min-height:16px; }

/* Detail expand */
.detail-toggle { text-align:center; margin-top:6px; cursor:pointer; }
.detail-toggle span { font-size:10px; color:rgba(255,255,255,0.25); }

/* Loading */
.loading { text-align:center; padding:60px 20px; color:rgba(255,255,255,0.3); font-size:13px; }

/* Regrade btn */
.regrade-btn { margin-top:8px; background:rgba(212,160,23,0.12); border:1px solid rgba(212,160,23,0.3); color:#D4A017; font-size:10px; font-weight:700; padding:5px 12px; border-radius:6px; cursor:pointer; }

/* Pick UI */
.pick-panel { display:none; margin-top:10px; border-top:1px solid rgba(245,158,11,0.15); padding-top:12px; }
.pick-panel.open { display:block; }
.pick-panel.locked { pointer-events:none; }
.pick-type-row { display:flex; gap:8px; margin-bottom:10px; }
.pick-type-btn { flex:1; padding:10px 0; text-align:center; font-size:12px; font-weight:800; letter-spacing:1px; border-radius:8px; cursor:pointer; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); transition:all 0.2s; }
.pick-type-btn:hover { border-color:rgba(245,158,11,0.4); color:rgba(255,255,255,0.8); }
.pick-type-btn.active { background:rgba(245,158,11,0.15); border-color:#F59E0B; color:#F59E0B; }
.pick-sides-row { display:flex; gap:8px; margin-bottom:10px; }
.pick-side-btn { flex:1; padding:12px 8px; text-align:center; font-size:13px; font-weight:700; border-radius:8px; cursor:pointer; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.6); transition:all 0.2s; line-height:1.3; }
.pick-side-btn:hover { border-color:rgba(245,158,11,0.3); }
.pick-side-btn.selected { background:rgba(245,158,11,0.12); border-color:#F59E0B; color:#fff; box-shadow:0 0 12px rgba(245,158,11,0.2); }
.pick-side-btn .pick-odds { font-size:10px; color:rgba(255,255,255,0.35); margin-top:2px; }
.pick-side-btn.selected .pick-odds { color:rgba(245,158,11,0.7); }
.pick-reason-input { width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-size:12px; padding:10px 14px; margin-bottom:10px; resize:none; font-family:inherit; }
.pick-reason-input:focus { outline:none; border-color:rgba(245,158,11,0.4); }
.pick-lock-btn { width:100%; padding:14px; font-size:14px; font-weight:900; letter-spacing:1.5px; border:none; border-radius:8px; cursor:pointer; transition:all 0.2s; background:linear-gradient(135deg,#F59E0B,#D97706); color:#000; }
.pick-lock-btn:disabled { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.2); cursor:not-allowed; }
.pick-lock-btn:not(:disabled):hover { box-shadow:0 0 20px rgba(245,158,11,0.3); transform:translateY(-1px); }
.pick-locked-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.4); color:#10B981; font-size:11px; font-weight:800; padding:6px 14px; border-radius:8px; letter-spacing:0.5px; margin-top:8px; }
</style>
</head>
<body>

<div class="header">
    <h1>Peter — NBA Edge <span>| Director</span></h1>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('games')">NBA GAMES</div>
    <div class="tab" onclick="switchTab('matrix')">MY MATRIX</div>
    <div class="tab" onclick="switchTab('board')">BOARD</div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="panel active" id="panelGames">
    <div class="loading" id="gamesLoading">Loading NBA games...</div>
    <div id="gamesContainer"></div>
    <div id="kalshiRevealSection" style="display:none;text-align:center;padding:20px;">
        <button onclick="revealKalshi()" style="background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:#7C3AED;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:0.5px;">REVEAL MARKET CHECK</button>
        <div id="kalshiResults" style="display:none;margin-top:16px;text-align:left;"></div>
    </div>
</div>
<script>
function revealKalshi() {
    var els = document.querySelectorAll('.kalshi-data');
    if (!els.length) return;
    var html = '<div style="background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.2);border-radius:10px;padding:16px;">';
    html += '<div style="font-size:11px;color:#7C3AED;font-weight:800;letter-spacing:1px;margin-bottom:12px;">KALSHI MARKET-IMPLIED PROBABILITIES</div>';
    els.forEach(function(el) {
        var prob = parseFloat(el.dataset.prob);
        var strike = el.dataset.strike;
        var matchup = el.dataset.matchup;
        var pctStr = (prob * 100).toFixed(0) + '%';
        var barColor = prob > 0.55 ? '#10B981' : prob > 0.4 ? '#F59E0B' : '#EF4444';
        html += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);">';
        html += '<div style="flex:1;font-size:12px;color:rgba(255,255,255,0.7);">' + matchup + '</div>';
        html += '<div style="width:60px;background:rgba(255,255,255,0.05);border-radius:4px;height:8px;"><div style="width:' + pctStr + ';background:' + barColor + ';height:100%;border-radius:4px;"></div></div>';
        html += '<div style="font-size:13px;font-weight:800;color:' + barColor + ';width:45px;text-align:right;">' + pctStr + '</div>';
        if (strike) html += '<div style="font-size:9px;color:rgba(255,255,255,0.3);">(' + strike + ')</div>';
        html += '</div>';
    });
    html += '</div>';
    document.getElementById('kalshiResults').innerHTML = html;
    document.getElementById('kalshiResults').style.display = 'block';
    event.target.style.display = 'none';
}
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        if (document.querySelectorAll('.kalshi-data').length > 0) {
            document.getElementById('kalshiRevealSection').style.display = 'block';
        }
    }, 3000);
});
</script>

<div class="panel" id="panelBoard">
    <div id="boardView" style="padding:16px;">
      <div id="boardContainer"></div>
      <div style="position:sticky;bottom:0;padding:12px 0;background:#0a0a0f;">
        <div style="display:flex;gap:8px;">
          <input id="boardInput" type="text" placeholder="Drop a message..." onkeydown="if(event.key==='Enter')postMessage()" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:10px 14px;color:#fff;font-size:13px;">
          <button onclick="postMessage()" style="background:#F59E0B;color:#000;border:none;border-radius:6px;padding:10px 18px;font-weight:800;font-size:12px;cursor:pointer;">POST</button>
        </div>
      </div>
    </div>
</div>

<div class="panel" id="panelMatrix">
    <div class="loading" id="matrixLoading">Loading matrix...</div>
    <div id="matrixContent" style="display:none;">
        <div class="matrix-container">
            <div class="matrix-panel">
                <div class="matrix-title" style="color:#6366f1;">OFFICIAL MATRIX</div>
                <div id="officialMatrix"></div>
            </div>
            <div class="matrix-panel">
                <div class="matrix-title" style="color:#D4A017;">PETER'S MATRIX</div>
                <div id="peterMatrix"></div>
                <button class="save-btn" id="saveBtn" onclick="saveMatrix()">SAVE MY WEIGHTS</button>
                <div class="save-msg" id="saveMsg"></div>
            </div>
        </div>
    </div>
</div>

<script>
var _gamesData = [];
var _matrixData = [];
var _peterWeights = {};

// ── TAB SWITCHING ──
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    if (tab === 'games') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('panelGames').classList.add('active');
    } else if (tab === 'matrix') {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('panelMatrix').classList.add('active');
        if (_matrixData.length === 0) loadMatrix();
    } else if (tab === 'board') {
        document.querySelectorAll('.tab')[2].classList.add('active');
        document.getElementById('panelBoard').classList.add('active');
        loadBoard();
    }
}

// ── GRADE HELPERS ──
function _gradeColor(grade) {
    if (!grade) return 'rgba(255,255,255,0.3)';
    if (grade.startsWith('A')) return '#10B981';
    if (grade === 'B+') return '#38BDF8';
    if (grade.startsWith('B')) return '#818cf8';
    if (grade.startsWith('C')) return '#d4a024';
    return '#ef4444';
}
function _dimStyle(grade) {
    if (!grade) return 'opacity:0.4;';
    if (['C+','C','D','F'].indexOf(grade) !== -1) return 'opacity:0.45;';
    return '';
}

// ── LOAD GAMES ──
function loadGames() {
    fetch('/api/profedge/nba')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            _gamesData = data.games || [];
            _matrixData = data.matrix || [];
            document.getElementById('gamesLoading').style.display = 'none';
            renderStats(data);
            renderGames(_gamesData);
            // Pre-populate peter weights from matrix
            if (_matrixData.length > 0 && Object.keys(_peterWeights).length === 0) {
                _matrixData.forEach(function(m) { _peterWeights[m.key] = m.weight; });
            }
        })
        .catch(function(err) {
            document.getElementById('gamesLoading').textContent = 'Failed to load games: ' + err.message;
        });
}

// ── STATS BAR ──
function renderStats(data) {
    var games = data.games || [];
    var total = games.length;
    var graded = 0, aPlus = 0, totalPct = 0, totalVars = 0, totalChains = 0;
    games.forEach(function(g) {
        var gr = g.grade;
        if (gr && gr.consensus_grade && gr.consensus_grade !== 'N/A' && gr.consensus_grade !== '?') {
            graded++;
            if (gr.consensus_grade === 'A+') aPlus++;
        }
        // pipeline pct
        var steps = 0;
        if (g.odds && (g.odds.spread_home || g.odds.total)) steps++;
        if (g.home_profile && g.home_profile.L5) steps++;
        if (gr && gr.profiles) {
            var pk = Object.keys(gr.profiles);
            if (pk.length > 0 && gr.profiles[pk[0]].variables) steps++;
            if (pk.length > 0 && gr.profiles[pk[0]].grade) steps++;
        }
        if (gr && gr.consensus_grade && gr.consensus_grade !== '?' && gr.consensus_grade !== 'N/A') steps++;
        totalPct += Math.round((steps / 5) * 100);
        // vars + chains
        if (gr && gr.profiles) {
            var fp = gr.profiles[Object.keys(gr.profiles)[0]];
            if (fp && fp.variables) totalVars += Object.keys(fp.variables).length;
            if (fp && fp.chains_fired) totalChains += fp.chains_fired.length;
        }
    });
    var avgPct = total > 0 ? Math.round(totalPct / total) : 0;
    var matrixVars = (_matrixData || []).length;
    var html = '';
    html += '<div class="stat-pill">Games <b>' + total + '</b></div>';
    html += '<div class="stat-pill">Graded <b>' + graded + '</b></div>';
    html += '<div class="stat-pill">A+ <b>' + aPlus + '</b></div>';
    html += '<div class="stat-pill">Pipeline <b>' + avgPct + '%</b></div>';
    html += '<div class="stat-pill">Matrix vars <b>' + matrixVars + '</b></div>';
    html += '<div class="stat-pill">Chains <b>' + totalChains + '</b></div>';
    document.getElementById('statsBar').innerHTML = html;
}

// ── RENDER GAME CARDS ──
function renderGames(games) {
    var container = document.getElementById('gamesContainer');
    if (!games || games.length === 0) {
        container.innerHTML = '<div class="loading">No NBA games today</div>';
        return;
    }
    var html = '';
    games.forEach(function(g, idx) {
        var gr = g.grade;
        var grade = gr ? gr.consensus_grade : 'N/A';
        if (grade === '?') grade = 'N/A';
        var avg = gr ? gr.consensus_avg.toFixed(1) : '--';
        var pickSide = gr ? gr.pick_side : '';
        var pickTeam = pickSide === 'home' ? g.home : (pickSide === 'away' ? g.away : '');
        var dim = (grade === 'N/A') ? 'opacity:0.6;' : _dimStyle(grade);
        var gColor = (grade === 'N/A') ? 'rgba(255,255,255,0.25)' : _gradeColor(grade);

        // Percent complete
        var pctSteps = 0;
        if (g.odds && (g.odds.spread_home || g.odds.total)) pctSteps++;
        if (g.home_profile && g.home_profile.L5) pctSteps++;
        if (gr && gr.profiles) {
            var profKeys = Object.keys(gr.profiles);
            if (profKeys.length > 0 && gr.profiles[profKeys[0]].variables) pctSteps++;
            if (profKeys.length > 0 && gr.profiles[profKeys[0]].grade) pctSteps++;
        }
        if (gr && gr.consensus_grade && gr.consensus_grade !== '?' && gr.consensus_grade !== 'N/A') pctSteps++;
        var pctComplete = Math.round((pctSteps / 5) * 100);
        var pctColor = pctComplete === 100 ? '#10B981' : pctComplete >= 60 ? '#F59E0B' : '#EF4444';
        var pctBg = pctComplete === 100 ? '16,185,129' : pctComplete >= 60 ? '245,158,11' : '239,68,68';

        // Time
        var timeStr = '';
        if (g.time) {
            try { var dt = new Date(g.time); timeStr = dt.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true}); } catch(e) { timeStr = g.time; }
        }

        html += '<div class="profedge-card" style="' + dim + '">';

        // Header
        html += '<div class="card-header">';
        html += '<div class="matchup-text">' + g.matchup + ' <span class="time-text">' + timeStr + '</span></div>';
        html += '<div class="grade-area"><span class="pct-badge" style="color:' + pctColor + ';background:rgba(' + pctBg + ',0.12);">' + pctComplete + '%</span><span class="grade-big" style="color:' + gColor + ';">' + grade + '</span> <span class="grade-avg">' + avg + '</span></div>';
        html += '</div>';

        // Pipeline
        html += '<div class="pipeline-row">';

        // Step 1: Data
        html += '<div class="pipeline-step" style="background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.2);">';
        html += '<div class="step-label" style="color:#6366f1;">STEP 1 — DATA</div>';
        var odds = g.odds || {};
        var atsHome = (g.home_profile && g.home_profile.ats_record) ? g.home_profile.ats_record : '';
        var atsAway = (g.away_profile && g.away_profile.ats_record) ? g.away_profile.ats_record : '';
        var atsStr = (atsHome || atsAway) ? '<br>ATS: <b>' + (atsAway || '--') + ' / ' + (atsHome || '--') + '</b>' : '';
        html += '<div class="step-data">Spread: <b>' + (odds.spread_home || odds.spread || '--') + '</b><br>O/U: <b>' + (odds.total || odds.over_under || '--') + '</b><br>ML: <b>' + (odds.ml_home || odds.home_ml || '--') + ' / ' + (odds.ml_away || odds.away_ml || '--') + '</b>' + atsStr + '</div>';
        html += '</div>';

        // Step 2: Enrichment
        html += '<div class="pipeline-step" style="min-width:200px;background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.2);">';
        html += '<div class="step-label" style="color:#38BDF8;">STEP 2 — ENRICHMENT</div>';
        ['away','home'].forEach(function(side) {
            var prof = g[side + '_profile'] || {};
            var abbrev = side === 'home' ? (g.home_abbrev || g.home) : (g.away_abbrev || g.away);
            var tag = side === 'home' ? 'HOME' : 'AWAY';
            html += '<div style="margin-bottom:4px;">';
            html += '<span style="font-size:10px;font-weight:700;color:#fff;">' + abbrev + '</span> <span style="font-size:9px;color:rgba(255,255,255,0.3);">' + tag + '</span><br>';
            var hasAny = false;
            if (prof.L5 && prof.L5 !== '0-0') { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">L5: ' + prof.L5 + ' | L10: ' + (prof.L10 || '--') + '</span><br>'; hasAny = true; }
            if (prof.ppg_L5) { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">PPG: ' + prof.ppg_L5.toFixed(1) + ' | Opp: ' + (prof.opp_ppg_L5 || 0).toFixed(1) + '</span><br>'; hasAny = true; }
            if (prof.streak && prof.streak !== 'L0' && prof.streak !== 'W0') { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">Streak: ' + prof.streak + ' | Rest: ' + (prof.rest_days != null ? prof.rest_days + 'd' : '--') + '</span><br>'; hasAny = true; }
            else if (prof.rest_days != null) { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">Rest: ' + prof.rest_days + 'd</span><br>'; hasAny = true; }
            if (!hasAny) html += '<span style="font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;">Awaiting data</span><br>';
            var inj = (g.injuries && g.injuries[side]) || [];
            if (inj.length > 0) {
                var outCount = inj.filter(function(i){return i.status === 'OUT';}).length;
                html += '<span style="font-size:10px;color:#ef4444;">' + inj.length + ' injuries (' + outCount + ' OUT)</span>';
            }
            html += '</div>';
        });
        html += '</div>';

        // Step 3: Variables

// ── MATRIX TAB ──
function loadMatrix() {
    // Load official matrix from profedge response (already cached) and Peter's overrides
    Promise.all([
        fetch('/api/profedge/nba').then(function(r) { return r.json(); }),
        fetch('/api/agent/peter/matrix/nba').then(function(r) { return r.json(); }).catch(function() { return null; })
    ]).then(function(results) {
        var profData = results[0];
        var agentMatrix = results[1];
        _matrixData = profData.matrix || [];

        document.getElementById('matrixLoading').style.display = 'none';
        document.getElementById('matrixContent').style.display = 'block';

        // Build Peter's weights from agent matrix overrides
        _peterWeights = {};
        _matrixData.forEach(function(m) { _peterWeights[m.key] = m.weight; });

        if (agentMatrix && agentMatrix.matrix) {
            agentMatrix.matrix.forEach(function(m) {
                _peterWeights[m.key] = m.weight;
            });
        }

        renderMatrixPanels();
    }).catch(function(err) {
        document.getElementById('matrixLoading').textContent = 'Failed to load matrix: ' + err.message;
    });
}

function renderMatrixPanels() {
    var officialHtml = '';
    var peterHtml = '';

    _matrixData.forEach(function(m) {
        var key = m.key;
        var officialWeight = m.weight;
        var desc = m.description || '';
        var peterWeight = _peterWeights[key] != null ? _peterWeights[key] : officialWeight;
        var wColor = officialWeight >= 8 ? '#10B981' : (officialWeight >= 6 ? '#d4a024' : 'rgba(255,255,255,0.4)');

        // Official side
        officialHtml += '<div class="matrix-row">';
        officialHtml += '<span class="matrix-var-name">' + key.replace(/_/g, ' ') + '</span>';
        officialHtml += '<span class="matrix-var-desc" title="' + desc.replace(/"/g, '&quot;') + '">' + desc + '</span>';
        officialHtml += '<span class="matrix-weight" style="color:' + wColor + ';">' + officialWeight + '</span>';
        officialHtml += '</div>';

        // Peter side
        var diffClass = '';
        if (peterWeight > officialWeight) diffClass = ' higher';
        else if (peterWeight < officialWeight) diffClass = ' lower';

        peterHtml += '<div class="matrix-row">';
        peterHtml += '<span class="matrix-var-name">' + key.replace(/_/g, ' ') + '</span>';
        peterHtml += '<input type="number" min="1" max="10" class="matrix-input' + diffClass + '" data-key="' + key + '" data-official="' + officialWeight + '" value="' + peterWeight + '" onchange="onWeightChange(this)" oninput="onWeightChange(this)">';
        peterHtml += '</div>';
    });

    document.getElementById('officialMatrix').innerHTML = officialHtml;
    document.getElementById('peterMatrix').innerHTML = peterHtml;
}

function onWeightChange(el) {
    var val = parseInt(el.value) || 0;
    if (val < 1) val = 1;
    if (val > 10) val = 10;
    el.value = val;
    var official = parseInt(el.getAttribute('data-official'));
    el.className = 'matrix-input' + (val > official ? ' higher' : (val < official ? ' lower' : ''));
    _peterWeights[el.getAttribute('data-key')] = val;
}

function saveMatrix() {
    var btn = document.getElementById('saveBtn');
    var msg = document.getElementById('saveMsg');
    btn.disabled = true;
    btn.textContent = 'SAVING...';
    msg.textContent = '';
    msg.style.color = '';

    // Build overrides: only send weights that differ from official
    var overrides = {};
    _matrixData.forEach(function(m) {
        var peterW = _peterWeights[m.key];
        if (peterW != null && peterW !== m.weight) {
            overrides[m.key] = peterW;
        }
    });

    // Use the agent action endpoint to update weights one by one
    var promises = Object.keys(overrides).map(function(key) {
        return fetch('/api/agent/peter/action', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                action: 'update_weight',
                args: { sport: 'nba', variable: key, weight: overrides[key] }
            })
        }).then(function(r) { return r.json(); });
    });

    Promise.all(promises).then(function(results) {
        var errors = results.filter(function(r) { return r.error; });
        if (errors.length > 0) {
            msg.textContent = errors.length + ' variable(s) failed to save';
            msg.style.color = '#ef4444';
        } else {
            var count = Object.keys(overrides).length;
            msg.textContent = count > 0 ? count + ' weight(s) saved' : 'No changes to save';
            msg.style.color = '#10B981';
        }
        btn.disabled = false;
        btn.textContent = 'SAVE MY WEIGHTS';
    }).catch(function(err) {
        msg.textContent = 'Save failed: ' + err.message;
        msg.style.color = '#ef4444';
        btn.disabled = false;
        btn.textContent = 'SAVE MY WEIGHTS';
    });
}

              '<button onclick="sendReply(\'' + p.id + '\')" style="margin-left:4px;background:#F59E0B;color:#000;border:none;border-radius:4px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;">Send</button>' +
            '</div>' +

var _pickState = {}; // idx -> { type, selection, odds }

function isPickLocked(gameId) {
    try {
        var locked = JSON.parse(localStorage.getItem('peter_locked_picks') || '{}');
        return !!locked[gameId];
    } catch(e) { return false; }
}

function getLockedPick(gameId) {
    try {
        var locked = JSON.parse(localStorage.getItem('peter_locked_picks') || '{}');
        return locked[gameId] || null;
    } catch(e) { return null; }
}

function saveLockedPick(gameId, pickData) {
    try {
        var locked = JSON.parse(localStorage.getItem('peter_locked_picks') || '{}');
        locked[gameId] = pickData;
        localStorage.setItem('peter_locked_picks', JSON.stringify(locked));
    } catch(e) {}
}

function togglePickPanel(idx) {
    var panel = document.getElementById('pick-panel-' + idx);
    if (panel) {
        panel.classList.toggle('open');
    }
}

function selectPickType(idx, type) {
    var panel = document.getElementById('pick-panel-' + idx);
    if (!panel) return;
    var g = _gamesData[idx];
    if (!g) return;

    // Update state
    if (!_pickState[idx]) _pickState[idx] = {};
    _pickState[idx].type = type;
    _pickState[idx].selection = null;
    _pickState[idx].odds = null;

    // Highlight active type button
    var btns = panel.querySelectorAll('.pick-type-btn');
    btns.forEach(function(b) { b.classList.remove('active'); });
    btns.forEach(function(b) {
        if ((type === 'ml' && b.textContent === 'ML') ||
            (type === 'spread' && b.textContent === 'SPREAD') ||
            (type === 'total' && b.textContent === 'TOTAL')) {
            b.classList.add('active');
        }
    });

    // Build side buttons
    var sidesContainer = document.getElementById('pick-sides-' + idx);
    var odds = g.odds || {};
    var html = '';

    if (type === 'ml') {
        var awayML = odds.ml_away || odds.away_ml || '--';
        var homeML = odds.ml_home || odds.home_ml || '--';
        html += '<div class="pick-side-btn" onclick="selectPickSide(' + idx + ',this,\'' + _esc(g.away) + ' ML\',\'' + awayML + '\')">' + (g.away_abbrev || g.away) + ' ML<div class="pick-odds">' + awayML + '</div></div>';
        html += '<div class="pick-side-btn" onclick="selectPickSide(' + idx + ',this,\'' + _esc(g.home) + ' ML\',\'' + homeML + '\')">' + (g.home_abbrev || g.home) + ' ML<div class="pick-odds">' + homeML + '</div></div>';
    } else if (type === 'spread') {
        var spreadHome = odds.spread_home || odds.spread || '--';
        var spreadAway = spreadHome !== '--' ? (parseFloat(spreadHome) > 0 ? '-' + Math.abs(parseFloat(spreadHome)) : '+' + Math.abs(parseFloat(spreadHome))) : '--';
        var spreadHomeDisplay = spreadHome !== '--' ? (parseFloat(spreadHome) > 0 ? '+' + spreadHome : spreadHome) : '--';
        html += '<div class="pick-side-btn" onclick="selectPickSide(' + idx + ',this,\'' + _esc(g.away) + ' ' + spreadAway + '\',\'\')">' + (g.away_abbrev || g.away) + ' ' + spreadAway + '</div>';
        html += '<div class="pick-side-btn" onclick="selectPickSide(' + idx + ',this,\'' + _esc(g.home) + ' ' + spreadHomeDisplay + '\',\'\')">' + (g.home_abbrev || g.home) + ' ' + spreadHomeDisplay + '</div>';
    } else if (type === 'total') {
        var total = odds.total || odds.over_under || '--';
        html += '<div class="pick-side-btn" onclick="selectPickSide(' + idx + ',this,\'OVER ' + total + '\',\'\')">OVER ' + total + '</div>';
        html += '<div class="pick-side-btn" onclick="selectPickSide(' + idx + ',this,\'UNDER ' + total + '\',\'\')">UNDER ' + total + '</div>';
    }

    sidesContainer.innerHTML = html;

    // Disable lock button until side is selected
    document.getElementById('pick-lock-' + idx).disabled = true;
}

function _esc(s) { return (s || '').replace(/'/g, "\\'"); }

function selectPickSide(idx, el, selection, odds) {
    // Highlight selected side
    var row = el.parentElement;
    row.querySelectorAll('.pick-side-btn').forEach(function(b) { b.classList.remove('selected'); });
    el.classList.add('selected');

    // Update state
    if (!_pickState[idx]) _pickState[idx] = {};
    _pickState[idx].selection = selection;
    _pickState[idx].odds = odds;

    // Enable lock button
    document.getElementById('pick-lock-' + idx).disabled = false;
}

function lockPick(idx) {
    var state = _pickState[idx];
    if (!state || !state.selection || !state.type) return;

    var g = _gamesData[idx];
    if (!g) return;

    var panel = document.getElementById('pick-panel-' + idx);
    var gameId = panel.getAttribute('data-game-id');

    // Prevent double lock
    if (isPickLocked(gameId)) return;

    var reasoning = (document.getElementById('pick-reason-' + idx).value || '').trim();
    var lockBtn = document.getElementById('pick-lock-' + idx);
    lockBtn.disabled = true;
    lockBtn.textContent = 'LOCKING...';

    var payload = {
        name: 'Peter',
        sport: g.sport || 'nba',
        matchup: (g.away || '') + ' @ ' + (g.home || ''),
        selection: state.selection,
        odds: state.odds || '',
        type: state.type,
        reasoning: reasoning,
        timestamp: new Date().toISOString(),
        source: 'profile_card'
    };

    fetch('/api/picks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    }).then(function(r) {
        if (!r.ok) throw new Error('Server returned ' + r.status);
        return r.json();
    }).then(function() {
        // Save to localStorage
        saveLockedPick(gameId, { selection: state.selection, type: state.type, odds: state.odds });

        // Replace pick panel with locked badge
        panel.innerHTML = '<div class="pick-locked-badge" style="margin:0 auto;">&#10003; LOCKED — ' + state.selection + '</div>';
        panel.classList.add('open');
        panel.classList.add('locked');

        // Also hide the "LOCK A PICK" trigger
        var trigger = panel.previousElementSibling;
        if (trigger) {
            trigger.innerHTML = '<div class="pick-locked-badge">&#10003; LOCKED — ' + state.selection + '</div>';
        }
    }).catch(function(err) {
        lockBtn.disabled = false;
        lockBtn.textContent = 'LOCK IT IN';
        lockBtn.style.background = 'rgba(239,68,68,0.2)';
        lockBtn.style.color = '#ef4444';
        setTimeout(function() {
            lockBtn.style.background = '';
            lockBtn.style.color = '';
        }, 2000);
        console.error('Lock pick failed:', err);
    });
}

// ── INIT ──
loadGames();
</script>
