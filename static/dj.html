<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Expected Value</title>
<style>
  :root {
    --bg: #0d0d14;
    --card-bg: #161622;
    --card-border: #1e1e30;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: #7c6cf7;
    --green: #00d68f;
    --red: #ff5555;
    --yellow: #ffd93d;
    --orange: #ff9f43;
    --pill-bg: #1a1a2e;
    --pill-active: #6c5ce7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--bg) 80%, transparent);
    padding: 20px 16px 12px;
  }

  .header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    text-align: center;
    margin-bottom: 12px;
  }

  .header h1 .sport-label { color: var(--accent-glow); }
  .header h1 .date-label { color: var(--text-dim); font-weight: 400; font-size: 0.85rem; }

  .pills {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    justify-content: center;
    flex-wrap: wrap;
    padding-bottom: 4px;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--pill-bg);
    color: var(--text-dim);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--pill-active); color: #fff; border-color: var(--accent); }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  .loading .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .games-container { padding: 0 12px; max-width: 800px; margin: 0 auto; }

  /* Landing page */
  .landing {
    text-align: center;
    padding: 60px 20px 40px;
    max-width: 600px;
    margin: 0 auto;
  }
  .landing h2 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--text);
  }
  .landing .subtitle {
    font-size: 0.95rem;
    color: var(--accent-glow);
    margin-bottom: 30px;
    font-weight: 500;
  }
  .landing .what-we-do {
    text-align: left;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 30px;
  }
  .landing .what-we-do h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .landing .what-we-do ul {
    list-style: none;
    padding: 0;
  }
  .landing .what-we-do li {
    font-size: 0.88rem;
    color: var(--text);
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    line-height: 1.5;
  }
  .landing .what-we-do li:last-child { border-bottom: none; }
  .landing .what-we-do li::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
  }
  .landing .tonight {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 20px;
  }
  .landing .tonight strong { color: var(--text); }
  .landing-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .landing-btn {
    padding: 14px 28px;
    border-radius: 10px;
    border: 1px solid var(--accent);
    background: rgba(108, 92, 231, 0.12);
    color: var(--accent-glow);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .landing-btn:hover {
    background: var(--accent);
    color: #fff;
    transform: translateY(-1px);
  }

  /* Re-analyze button */
  .reanalyze-bar {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .reanalyze-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: rgba(108, 92, 231, 0.1);
    color: var(--accent-glow);
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .reanalyze-btn:hover { background: var(--accent); color: #fff; }
  .reanalyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .reanalyze-btn.small {
    padding: 4px 10px;
    font-size: 0.65rem;
    border-radius: 6px;
  }

  /* Grade legend */
  .grade-legend {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 0.7rem;
    color: var(--text-dim);
    line-height: 1.6;
    text-align: center;
  }
  .grade-legend .gl-a { color: var(--green); font-weight: 700; }
  .grade-legend .gl-b { color: var(--yellow); font-weight: 700; }
  .grade-legend .gl-c { color: var(--orange); font-weight: 700; }
  .grade-legend .gl-d { color: var(--red); font-weight: 700; }

  /* Game cards */
  .game-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .game-card:hover { border-color: var(--accent); }

  .game-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .matchup-info { flex: 1; }

  .matchup-teams {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.4;
  }

  .matchup-meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .grade-badge {
    font-size: 1.6rem;
    font-weight: 800;
    min-width: 50px;
    text-align: center;
    line-height: 1;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(108, 92, 231, 0.15);
  }

  .grade-A { color: var(--green); background: rgba(0, 214, 143, 0.12); }
  .grade-B { color: var(--yellow); background: rgba(255, 217, 61, 0.12); }
  .grade-C { color: var(--orange); background: rgba(255, 159, 67, 0.12); }
  .grade-D, .grade-F { color: var(--red); background: rgba(255, 85, 85, 0.12); }
  .grade-INCOMPLETE { color: var(--text-dim); background: rgba(136, 136, 160, 0.1); font-size: 0.8rem; }

  .lines-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .line-chip {
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    font-weight: 500;
  }

  .line-chip .val { color: var(--text); font-weight: 700; }

  .edge-pick-row {
    background: rgba(108, 92, 231, 0.08);
    border: 1px solid rgba(108, 92, 231, 0.2);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }

  .edge-pick-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-glow);
    margin-bottom: 4px;
    font-weight: 700;
  }

  .edge-pick-text {
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.4;
  }

  .edge-pick-reasoning {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 600;
  }

  /* Analysis text */
  .analysis-block {
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .analysis-block .ab-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-glow);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .analysis-block .ab-edge {
    color: var(--text);
    font-weight: 600;
    font-size: 0.82rem;
    margin-bottom: 6px;
  }
  .analysis-block strong { color: var(--text); }
  .analysis-block .ab-row {
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .analysis-block .ab-row:last-child { border-bottom: none; }

  .gotcha-text {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .gotcha-text ul { padding-left: 16px; margin: 0; }
  .gotcha-text li { margin-bottom: 3px; }
  .gotcha-text strong { color: var(--text); }

  .flags-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .flag-tag {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .flag-SHARP { background: rgba(0,214,143,0.15); color: var(--green); }
  .flag-TRAP { background: rgba(255,85,85,0.15); color: var(--red); }
  .flag-B2B { background: rgba(255,159,67,0.15); color: var(--orange); }
  .flag-UPSET { background: rgba(255,217,61,0.15); color: var(--yellow); }
  .flag-PASS { background: rgba(136,136,160,0.12); color: var(--text-dim); }
  .flag-BEST { background: rgba(0,214,143,0.2); color: var(--green); }
  .flag-REST { background: rgba(108,92,231,0.15); color: var(--accent-glow); }
  .flag-INJURY { background: rgba(255,85,85,0.12); color: var(--red); }
  .flag-INCOMPLETE { background: rgba(136,136,160,0.1); color: var(--text-dim); }
  .flag-default { background: rgba(255,255,255,0.06); color: var(--text-dim); }

  .screener-section {
    margin-top: 8px;
    border-top: 1px solid var(--card-border);
    padding-top: 8px;
  }

  .screener-hit {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 0.75rem;
  }

  .screener-player { font-weight: 600; }
  .screener-stat { color: var(--text-dim); }
  .screener-verdict { color: var(--green); font-weight: 700; font-size: 0.7rem; }

  .peter-zone {
    font-size: 0.78rem;
    color: var(--text);
    line-height: 1.5;
    background: rgba(108, 92, 231, 0.06);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    margin-top: 8px;
    border-radius: 0 6px 6px 0;
  }

  .footer {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 0.7rem;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .icon { font-size: 2rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  .global-gotcha {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }

  .global-gotcha .section-label { color: var(--accent-glow); }

  /* Multi-book line comparison */
  .books-section {
    margin-top: 10px;
    border-top: 1px solid var(--card-border);
    padding-top: 10px;
  }
  .books-toggle {
    font-size: 0.7rem;
    color: var(--accent-glow);
    cursor: pointer;
    font-weight: 600;
    padding: 4px 0;
    user-select: none;
  }
  .books-toggle:hover { text-decoration: underline; }
  .books-detail { display: none; margin-top: 8px; }
  .books-detail.open { display: block; }
  .books-market {
    margin-bottom: 10px;
  }
  .books-market-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-glow);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .books-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 6px;
    font-size: 0.72rem;
    border-radius: 4px;
    margin-bottom: 2px;
  }
  .books-row.best { background: rgba(0, 214, 143, 0.08); }
  .books-row.worst { background: rgba(255, 85, 85, 0.06); }
  .books-row .book-name {
    color: var(--text-dim);
    min-width: 90px;
    font-weight: 500;
  }
  .books-row .book-line {
    color: var(--text);
    font-weight: 700;
    min-width: 80px;
  }
  .books-row .book-odds {
    color: var(--text-dim);
    font-weight: 600;
    min-width: 60px;
    text-align: right;
  }
  .books-row .best-tag {
    font-size: 0.55rem;
    color: var(--green);
    font-weight: 800;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .books-row .worst-tag {
    font-size: 0.55rem;
    color: var(--red);
    font-weight: 800;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .books-gap {
    font-size: 0.68rem;
    color: var(--yellow);
    font-weight: 600;
    padding: 2px 0;
    margin-top: 2px;
  }
  .books-gap.disagree { color: var(--orange); }

  /* Card top row with re-analyze */
  .card-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>

<div class="header" id="headerBar" style="display:none;">
  <h1>CASA EXPECTED VALUE &mdash; <span class="sport-label" id="sportLabel">NCAAB</span> <span class="date-label" id="dateLabel"></span></h1>
  <div class="pills" id="sportPills"></div>
</div>

<div id="landingPage"></div>

<div id="loadingState" class="loading" style="display:none;">
  <div class="spinner"></div>
  <div id="loadingText">Loading slate...</div>
</div>

<div class="games-container" id="gamesContainer"></div>

<div class="footer" id="footer" style="display:none;">
  <div id="lastAnalyzed"></div>
  <div style="margin-top:4px;">Casa Expected Value &mdash; Edge Crew</div>
</div>

<script>
const SPORTS = ['ncaab','nba'];
const SPORT_LABELS = {ncaab:'NCAAB',nba:'NBA'};
const BOOK_DISPLAY = {
  'draftkings':'DraftKings','fanduel':'FanDuel','betmgm':'BetMGM','bovada':'Bovada',
  'pointsbetus':'PointsBet','williamhill_us':'Caesars','barstool':'ESPN BET','betrivers':'BetRivers',
  'unibet_us':'Unibet','wynnbet':'WynnBET','superbook':'SuperBook','hardrock':'Hard Rock',
  'fliff':'Fliff','betus':'BetUS','mybookieag':'MyBookie','betonlineag':'BetOnline',
  'lowvig':'LowVig','pinnacle':'Pinnacle','bet365':'Bet365'
};

let currentSport = null;
let analysisCache = {};
let oddsCache = {};
let screenerCache = {};
let gamesLoaded = false;

function init() {
  showLanding();
}

function showLanding() {
  gamesLoaded = false;
  currentSport = null;
  document.getElementById('headerBar').style.display = 'none';
  document.getElementById('gamesContainer').innerHTML = '';
  document.getElementById('footer').style.display = 'none';

  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  document.getElementById('landingPage').innerHTML = `
    <div class="landing">
      <h2>CASA EXPECTED VALUE</h2>
      <div class="subtitle">What you saw tonight &mdash; automated.</div>

      <div class="what-we-do" style="text-align:left;max-width:560px;margin:24px auto;">
        <h3 style="color:var(--green);font-size:0.95rem;margin-bottom:12px;">Tonight's Proof</h3>
        <div style="background:rgba(0,214,143,0.06);border:1px solid rgba(0,214,143,0.2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:0.8rem;line-height:1.7;">
          <div><span style="color:var(--green);font-weight:700;">Mathurin O17.5 PTS</span> &mdash; L5 games: 26, 28, 21, 22, 23. Floor: 21. Line: 17.5. Gap: +3.5. <span style="color:var(--green);font-weight:700;">CASHED (21 pts)</span></div>
          <div style="margin-top:6px;"><span style="color:var(--green);font-weight:700;">Achiuwa O6.5 REB (+106)</span> &mdash; Sabonis + Eubanks OUT = no center. <span style="color:var(--green);font-weight:700;">CASHED (7 reb)</span></div>
          <div style="margin-top:6px;"><span style="color:var(--green);font-weight:700;">Achiuwa O10.5 PTS (even)</span> &mdash; Same injury gap. <span style="color:var(--green);font-weight:700;">CASHED (18 pts)</span></div>
          <div style="margin-top:6px;"><span style="color:var(--green);font-weight:700;">SJ Sharks ML +140</span> &mdash; MTL missing Laine + Caufield. <span style="color:var(--green);font-weight:700;">CASHED</span></div>
        </div>

        <h3 style="font-size:0.85rem;margin-bottom:10px;">How It Works</h3>
        <ul style="font-size:0.78rem;line-height:1.8;">
          <li><strong>15-Variable Matrix</strong> &mdash; every game scored across 15 factors (injuries, rest, matchup, trends, public action, sharp money, etc.) by AI analysis</li>
          <li><strong>The Mathurin Screener</strong> &mdash; pulls every player's last 5 game logs, compares their FLOOR to the book's line. Floor &gt; line = the book is wrong</li>
          <li><strong>Multi-Book Comparison</strong> &mdash; same line across 12+ books (DraftKings, FanDuel, Pinnacle, Bovada, Bet365, Hard Rock, BetOnline...). See who has the best number in one card</li>
          <li><strong>Injury Gap Detection</strong> &mdash; when a star is OUT, we identify which role player absorbs minutes and check if the book adjusted their line. If not = mispriced</li>
          <li><strong>Arbitrage Scanner</strong> &mdash; cross-book arb opportunities where you can bet both sides and guarantee profit</li>
        </ul>

        <h3 style="font-size:0.85rem;margin-top:18px;margin-bottom:10px;">What You See Per Game</h3>
        <ul style="font-size:0.78rem;line-height:1.8;">
          <li><strong>Grade (A through F)</strong> &mdash; A = strong edge, book is wrong. D/F = trap, stay away</li>
          <li><strong>Scoring Matrix</strong> &mdash; the 15 variables visualized so you see WHY it got that grade</li>
          <li><strong>Edge Question</strong> &mdash; "Where is the market wrong on this game?"</li>
          <li><strong>Book Lines</strong> &mdash; every book's spread, ML, and total side by side. Best highlighted green, worst red</li>
          <li><strong>Screener Hits</strong> &mdash; any player props where the floor beats the line</li>
        </ul>

        <div style="margin-top:18px;padding:12px;background:rgba(108,92,231,0.08);border:1px solid rgba(108,92,231,0.2);border-radius:8px;font-size:0.78rem;color:var(--text-dim);line-height:1.6;">
          <strong style="color:var(--accent-glow);">The Rule:</strong> Every pick must pass the Mathurin Test &mdash; "Can you show a NUMBER that proves the book is wrong?" If yes, bet it. If no, pass. No opinions, only math.
        </div>
      </div>

      <div class="tonight" style="margin-top:20px;">Conference Tournaments + NBA &mdash; ${dateStr}</div>
      <div class="landing-buttons">
        <button class="landing-btn" onclick="startSport('ncaab')">LOAD NCAAB</button>
        <button class="landing-btn" onclick="startSport('nba')">LOAD NBA</button>
      </div>
    </div>`;
}

function startSport(sport) {
  document.getElementById('landingPage').innerHTML = '';
  document.getElementById('headerBar').style.display = 'block';
  gamesLoaded = true;
  switchSport(sport);
}

function renderPills() {
  const container = document.getElementById('sportPills');
  container.innerHTML = SPORTS.map(s =>
    `<div class="pill ${s === currentSport ? 'active' : ''}" onclick="switchSport('${s}')">${SPORT_LABELS[s]}</div>`
  ).join('');
}

function switchSport(sport) {
  currentSport = sport;
  document.getElementById('sportLabel').textContent = SPORT_LABELS[sport];
  const today = new Date();
  document.getElementById('dateLabel').textContent = today.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  renderPills();
  loadSport(sport);
}

async function loadSport(sport) {
  const container = document.getElementById('gamesContainer');
  const loading = document.getElementById('loadingState');
  const footer = document.getElementById('footer');

  container.innerHTML = '';
  footer.style.display = 'none';
  loading.style.display = 'block';
  document.getElementById('loadingText').textContent = 'Loading slate...';

  try {
    // Fetch analysis, screener, odds, and arbs in parallel
    const [analysisResp, screenerResp, oddsResp, arbResp] = await Promise.all([
      fetch(`/api/analysis/${sport}?cached_only=true`).then(r => r.json()).catch(() => null),
      fetch(`/api/screener/${sport}`).then(r => r.json()).catch(() => null),
      fetch(`/api/odds/${sport}`).then(r => r.json()).catch(() => null),
      fetch(`/api/arb-scan`).then(r => r.json()).catch(() => null)
    ]);

    loading.style.display = 'none';

    const analysis = analysisResp || { games: [] };
    const screener = screenerResp || { screener: [] };
    const odds = oddsResp || { games: [] };

    // Cache for re-analyze
    analysisCache[sport] = analysis;
    screenerCache[sport] = screener;
    oddsCache[sport] = odds;

    // Show ALL analysis games (the analysis IS the demo — DJ needs to see the full system)
    // Only fall back to odds-only upcoming games when no analysis exists
    const now = Date.now();
    const allOddsGames = odds.games || [];
    const upcomingOddsGames = allOddsGames.filter(g => {
      const ct = g.commence_time || g.commence || g.time || '';
      if (!ct) return true;
      return new Date(ct).getTime() > now;
    });

    let games;
    const analysisGames = analysis.games || [];

    if (analysisGames.length > 0) {
      // Show ALL analyzed games — today's completed games show the full matrix/gotcha system
      games = analysisGames;
    } else if (upcomingOddsGames.length > 0) {
      // No analysis yet (tomorrow's slate) — show odds-only cards
      games = upcomingOddsGames.map(og => ({
        matchup: `${og.away} @ ${og.home}`,
        away: og.away || '',
        home: og.home || '',
        grade: 'TBD',
        spread: og.home_spread || null,
        total: og.total || null,
        away_ml: og.away_ml || null,
        home_ml: og.home_ml || null,
        commence_time: og.commence_time || og.commence || '',
        all_bookmakers: og.all_bookmakers || [],
      }));
    } else {
      games = [];
    }

    if (games.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">&#128203;</div><p>No ${SPORT_LABELS[sport]} games or analysis available.</p><p style="margin-top:8px;font-size:0.75rem;">NCAAB lines appear morning of game day. NBA analysis runs at 4 PM PST.</p></div>`;
      return;
    }

    // Build screener lookup: matchup string -> hits
    const screenerByGame = buildScreenerMap(screener.screener || [], games);

    // Build odds lookup: matchup -> odds game data (with all_bookmakers)
    const oddsByGame = buildOddsMap(upcomingOddsGames, games);

    // Render
    let html = '';

    // Re-analyze bar
    html += `<div class="reanalyze-bar">
      <button class="reanalyze-btn" id="reanalyzeSlateBtn" onclick="reanalyzeSlate('${sport}')">RE-ANALYZE SLATE</button>
    </div>`;

    // Grade legend
    html += `<div class="grade-legend">
      <span class="gl-a">A</span> = Strong edge, book is wrong
      &nbsp;|&nbsp; <span class="gl-b">B</span> = Lean, slight edge
      &nbsp;|&nbsp; <span class="gl-c">C</span> = No edge, fair line
      &nbsp;|&nbsp; <span class="gl-d">D/F</span> = Trap, stay away
    </div>`;

    // Global gotcha
    if (analysis.gotcha) {
      html += `<div class="global-gotcha"><div class="section-label">Tonight's Intel</div><div class="gotcha-text">${analysis.gotcha}</div></div>`;
    }

    // Arbitrage opportunities
    const arbs = (arbResp && arbResp.arbs) ? arbResp.arbs : [];
    if (arbs.length > 0) {
      html += `<div class="global-gotcha" style="border-color:rgba(0,214,143,0.3);background:rgba(0,214,143,0.04);">
        <div class="section-label" style="color:var(--green);">ARBITRAGE OPPORTUNITIES (${arbs.length})</div>`;
      arbs.slice(0, 5).forEach(a => {
        html += `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.75rem;">
          <div style="font-weight:700;">${esc(a.matchup || a.game || '')}</div>
          <div style="color:var(--text-dim);margin-top:2px;">${esc(a.type || '')} — ${esc(a.book1 || a.best_book || '')} vs ${esc(a.book2 || a.worst_book || '')} — <span style="color:var(--green);font-weight:700;">Profit: ${a.profit_pct || a.profit || '?'}%</span></div>
        </div>`;
      });
      html += `</div>`;
    }

    // Sort games: best grades first
    const gradeOrder = {'A+':0,'A':1,'A-':2,'B+':3,'B':4,'B-':5,'C+':6,'C':7,'D':8,'F':9,'TBD':10,'INCOMPLETE':11};
    games.sort((a, b) => (gradeOrder[a.grade] ?? 10) - (gradeOrder[b.grade] ?? 10));

    games.forEach((game, idx) => {
      html += renderGameCard(game, screenerByGame[game.matchup] || [], oddsByGame[game.matchup] || null, idx);
    });

    container.innerHTML = html;

    // Footer
    const ts = analysis.generated_at || analysis.fetched_at || '';
    document.getElementById('lastAnalyzed').textContent = ts ? `Last analyzed: ${ts}` : '';
    footer.style.display = 'block';

  } catch (err) {
    loading.style.display = 'none';
    container.innerHTML = `<div class="empty-state"><p>Failed to load data. Try again later.</p></div>`;
    console.error(err);
  }
}

async function reanalyzeSlate(sport) {
  const btn = document.getElementById('reanalyzeSlateBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'ANALYZING...'; }
  const loading = document.getElementById('loadingState');
  loading.style.display = 'block';
  document.getElementById('loadingText').textContent = 'Running AI analysis... this may take 30-60 seconds';

  try {
    await fetch(`/api/analysis/${sport}?force=true`);
    await loadSport(sport);
  } catch (err) {
    console.error('Re-analyze failed:', err);
    loading.style.display = 'none';
    if (btn) { btn.disabled = false; btn.textContent = 'RE-ANALYZE SLATE'; }
  }
}

async function reanalyzeGame(sport) {
  // For now, re-fetch the whole slate
  await reanalyzeSlate(sport);
}

function buildOddsMap(oddsGames, analysisGames) {
  const map = {};
  analysisGames.forEach(g => { map[g.matchup] = null; });

  oddsGames.forEach(og => {
    const ogKey = `${og.away} @ ${og.home}`.toLowerCase();
    for (const ag of analysisGames) {
      const agKey = (ag.matchup || '').toLowerCase();
      // Match by team name overlap
      const ogTeams = ogKey.replace('@', ' ').split(/\s+/).filter(t => t.length > 2);
      const agTeams = agKey.replace('@', ' ').split(/\s+/).filter(t => t.length > 2);
      const overlap = ogTeams.some(t => agTeams.some(h => h.includes(t) || t.includes(h)));
      if (overlap && !map[ag.matchup]) {
        map[ag.matchup] = og;
        break;
      }
    }
  });
  return map;
}

function buildScreenerMap(screenerHits, games) {
  const map = {};
  games.forEach(g => { map[g.matchup] = []; });

  screenerHits.forEach(hit => {
    const hitMatchup = (hit.matchup || '').toLowerCase();
    for (const g of games) {
      const gm = (g.matchup || '').toLowerCase();
      const gTeams = gm.replace('@', ' ').split(/\s+/).filter(t => t.length > 2);
      const hTeams = hitMatchup.replace('@', ' ').replace('vs', ' ').split(/\s+/).filter(t => t.length > 2);
      const overlap = gTeams.some(t => hTeams.some(h => h.includes(t) || t.includes(h)));
      if (overlap) {
        if (!map[g.matchup]) map[g.matchup] = [];
        map[g.matchup].push(hit);
        break;
      }
    }
  });
  return map;
}

function gradeClass(grade) {
  if (!grade) return '';
  const g = grade.replace(/[+-]/g, '');
  if (g === 'A') return 'grade-A';
  if (g === 'B') return 'grade-B';
  if (g === 'C') return 'grade-C';
  if (g === 'D' || g === 'F') return 'grade-D';
  if (grade === 'INCOMPLETE') return 'grade-INCOMPLETE';
  return '';
}

function flagClass(tag) {
  const t = tag.toUpperCase();
  if (t === 'SHARP') return 'flag-SHARP';
  if (t === 'TRAP') return 'flag-TRAP';
  if (t === 'B2B') return 'flag-B2B';
  if (t === 'UPSET') return 'flag-UPSET';
  if (t === 'PASS') return 'flag-PASS';
  if (t === 'BEST BET' || t === 'BEST') return 'flag-BEST';
  if (t.includes('REST')) return 'flag-REST';
  if (t.includes('INJURY')) return 'flag-INJURY';
  if (t === 'INCOMPLETE') return 'flag-INCOMPLETE';
  return 'flag-default';
}

function bookDisplayName(key) {
  return BOOK_DISPLAY[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function renderMultiBookCard(oddsGame, cardIdx) {
  if (!oddsGame || !oddsGame.all_bookmakers || oddsGame.all_bookmakers.length < 2) {
    return '';
  }

  const books = oddsGame.all_bookmakers;
  const away = oddsGame.away;
  const home = oddsGame.home;
  const toggleId = `booksDetail_${cardIdx}`;

  let html = `<div class="books-section">
    <div class="books-toggle" onclick="toggleBooks('${toggleId}')">&#9660; Compare Lines Across ${books.length} Books</div>
    <div class="books-detail" id="${toggleId}">`;

  // SPREAD comparison
  const spreadData = [];
  books.forEach(bk => {
    const spreads = bk.markets.spreads || [];
    spreads.forEach(s => {
      if (s.name === home) {
        spreadData.push({ book: bk.title || bk.key, team: home, point: s.point, price: s.price });
      }
    });
  });
  if (spreadData.length > 1) {
    // Sort by point (most favorable = most negative for favorite, most positive for dog)
    spreadData.sort((a, b) => a.point - b.point);
    const bestSpread = spreadData[0];
    const worstSpread = spreadData[spreadData.length - 1];
    const gap = Math.abs(worstSpread.point - bestSpread.point);

    html += `<div class="books-market">
      <div class="books-market-title">SPREAD (${esc(home)})</div>`;
    spreadData.forEach((d, i) => {
      const isBest = i === 0;
      const isWorst = i === spreadData.length - 1;
      const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
      const tag = isBest ? '<span class="best-tag">BEST</span>' : (isWorst ? '<span class="worst-tag">WORST</span>' : '');
      html += `<div class="books-row ${cls}">
        <span class="book-name">${esc(bookDisplayName(d.book))}</span>
        <span class="book-line">${esc(home)} ${d.point > 0 ? '+' : ''}${d.point}</span>
        <span class="book-odds">(${d.price > 0 ? '+' : ''}${d.price})</span>
        ${tag}
      </div>`;
    });
    if (gap > 0) {
      html += `<div class="books-gap ${gap >= 1.5 ? 'disagree' : ''}">Gap: ${gap.toFixed(1)} pts${gap >= 1.5 ? ' | BOOKS DISAGREE' : ''}</div>`;
    }
    html += `</div>`;
  }

  // MONEYLINE comparison
  const mlAwayData = [];
  const mlHomeData = [];
  books.forEach(bk => {
    const h2h = bk.markets.h2h || [];
    h2h.forEach(h => {
      if (h.name === away) mlAwayData.push({ book: bk.title || bk.key, team: away, price: h.price });
      if (h.name === home) mlHomeData.push({ book: bk.title || bk.key, team: home, price: h.price });
    });
  });
  if (mlAwayData.length > 1 || mlHomeData.length > 1) {
    html += `<div class="books-market"><div class="books-market-title">MONEYLINE</div>`;

    // Determine who is favorite/dog
    const avgAway = mlAwayData.reduce((s, d) => s + d.price, 0) / (mlAwayData.length || 1);
    const avgHome = mlHomeData.reduce((s, d) => s + d.price, 0) / (mlHomeData.length || 1);
    const dogData = avgAway > avgHome ? mlAwayData : mlHomeData;
    const favData = avgAway > avgHome ? mlHomeData : mlAwayData;
    const dogTeam = avgAway > avgHome ? away : home;
    const favTeam = avgAway > avgHome ? home : away;

    // Show dog lines (higher = better for bettor)
    dogData.sort((a, b) => b.price - a.price);
    favData.sort((a, b) => b.price - a.price); // Less negative = better for fav bettor

    // Merge and show side by side
    const allML = [];
    books.forEach(bk => {
      const h2h = bk.markets.h2h || [];
      let awayP = null, homeP = null;
      h2h.forEach(h => {
        if (h.name === away) awayP = h.price;
        if (h.name === home) homeP = h.price;
      });
      if (awayP !== null && homeP !== null) {
        allML.push({ book: bk.title || bk.key, awayP, homeP, dogP: avgAway > avgHome ? awayP : homeP });
      }
    });
    // Sort by best dog odds
    allML.sort((a, b) => b.dogP - a.dogP);

    allML.forEach((d, i) => {
      const isBest = i === 0;
      const isWorst = i === allML.length - 1;
      const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
      const tag = isBest ? '<span class="best-tag">BEST DOG</span>' : (isWorst ? '<span class="worst-tag">WORST</span>' : '');
      html += `<div class="books-row ${cls}">
        <span class="book-name">${esc(bookDisplayName(d.book))}</span>
        <span class="book-line">${esc(away)} ${d.awayP > 0 ? '+' : ''}${d.awayP} / ${esc(home)} ${d.homeP > 0 ? '+' : ''}${d.homeP}</span>
        ${tag}
      </div>`;
    });

    if (allML.length >= 2) {
      const bestDog = allML[0].dogP;
      const worstDog = allML[allML.length - 1].dogP;
      const gap = Math.abs(bestDog - worstDog);
      if (gap > 0) {
        html += `<div class="books-gap">Gap: ${gap} cents</div>`;
      }
    }
    html += `</div>`;
  }

  // TOTAL comparison
  const totalData = [];
  books.forEach(bk => {
    const totals = bk.markets.totals || [];
    let overP = null, underP = null, point = null;
    totals.forEach(t => {
      if (t.name === 'Over') { overP = t.price; point = t.point; }
      if (t.name === 'Under') { underP = t.price; }
    });
    if (point !== null) {
      totalData.push({ book: bk.title || bk.key, point, overP, underP });
    }
  });
  if (totalData.length > 1) {
    totalData.sort((a, b) => a.point - b.point);
    const low = totalData[0].point;
    const high = totalData[totalData.length - 1].point;
    const gap = high - low;

    html += `<div class="books-market"><div class="books-market-title">TOTAL (O/U)</div>`;
    totalData.forEach((d, i) => {
      const isBest = i === 0;
      const isWorst = i === totalData.length - 1;
      const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
      const tag = isBest ? '<span class="best-tag">LOW</span>' : (isWorst && gap > 0 ? '<span class="worst-tag">HIGH</span>' : '');
      html += `<div class="books-row ${cls}">
        <span class="book-name">${esc(bookDisplayName(d.book))}</span>
        <span class="book-line">O/U ${d.point}</span>
        <span class="book-odds">O(${d.overP > 0 ? '+' : ''}${d.overP}) U(${d.underP > 0 ? '+' : ''}${d.underP})</span>
        ${tag}
      </div>`;
    });
    if (gap > 0) {
      html += `<div class="books-gap ${gap >= 2 ? 'disagree' : ''}">Gap: ${gap.toFixed(1)} pts${gap >= 2 ? ' | BOOKS DISAGREE' : ''}</div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function toggleBooks(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function renderGameCard(game, screenerHits, oddsGame, cardIdx) {
  const matchup = game.matchup || '?';
  const grade = game.grade || 'TBD';
  const tags = game.tags || [];
  const edgePick = game.edge_pick || {};
  const flags = game.flags || [];
  const peterZone = game.peter_zone || '';
  const edgeSummary = game.edge_summary || '';
  const injuryImpact = game.injury_impact || '';
  const restSchedule = game.rest_schedule || '';
  const edgeQuestion = game.edge_question || '';
  const trends = game.trends || [];

  let html = `<div class="game-card">`;

  // Top row: matchup + grade + re-analyze
  html += `<div class="game-top">
    <div class="matchup-info">
      <div class="matchup-teams">${esc(matchup)}</div>
      <div class="matchup-meta"></div>
    </div>
    <div class="card-actions">
      <div class="grade-badge ${gradeClass(grade)}">${esc(grade)}</div>
      <button class="reanalyze-btn small" onclick="reanalyzeGame('${currentSport}')" title="Re-analyze this game">RE-ANALYZE</button>
    </div>
  </div>`;

  // Tags
  if (tags.length > 0) {
    html += `<div class="flags-row">${tags.map(t => `<span class="flag-tag ${flagClass(t)}">${esc(t)}</span>`).join('')}</div>`;
  }

  // Edge pick
  if (edgePick.team && edgePick.team !== 'PASS') {
    html += `<div class="edge-pick-row">
      <div class="edge-pick-label">Edge Pick</div>
      <div class="edge-pick-text">${esc(edgePick.team)} &mdash; ${esc(edgePick.bet_type || '')} ${esc(edgePick.line || '')}</div>
      ${edgePick.reasoning ? `<div class="edge-pick-reasoning">${esc(edgePick.reasoning)}</div>` : ''}
    </div>`;
  }

  // Matrix scores (the 15-variable grading system)
  const matrixScores = game.matrix_scores || {};
  const compositeScore = game.composite_score || null;
  const analyzedBy = game.analyzed_by || game.model || '';
  const matrixKeys = Object.keys(matrixScores);

  if (matrixKeys.length > 0) {
    html += `<div class="analysis-block">
      <div class="ab-label">Scoring Matrix${analyzedBy ? ` — analyzed by ${esc(analyzedBy)}` : ''}${compositeScore ? ` — Composite: ${compositeScore}/10` : ''}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px;margin-top:6px;">`;
    matrixKeys.forEach(key => {
      const val = matrixScores[key];
      const score = typeof val === 'object' ? (val.score || val.value || val) : val;
      const numScore = parseFloat(score) || 0;
      const barColor = numScore >= 7 ? 'var(--green)' : numScore >= 5 ? 'var(--yellow)' : 'var(--red)';
      const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      html += `<div style="background:rgba(255,255,255,0.03);border-radius:4px;padding:4px 6px;font-size:0.65rem;">
        <div style="color:var(--text-dim);margin-bottom:2px;">${esc(label)}</div>
        <div style="display:flex;align-items:center;gap:4px;">
          <div style="flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;">
            <div style="width:${numScore * 10}%;height:100%;background:${barColor};border-radius:2px;"></div>
          </div>
          <span style="font-weight:700;color:${barColor};min-width:20px;text-align:right;">${numScore}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Full analysis breakdown
  const hasAnalysis = edgeQuestion || edgeSummary || injuryImpact || restSchedule || trends.length > 0;
  if (hasAnalysis) {
    html += `<div class="analysis-block">
      <div class="ab-label">Edge Analysis</div>`;

    if (edgeQuestion && edgeQuestion !== 'No clear edge identified.') {
      html += `<div class="ab-edge">${esc(edgeQuestion)}</div>`;
    }
    if (edgeSummary) {
      html += `<div class="ab-row"><strong>Edge:</strong> ${esc(edgeSummary)}</div>`;
    }
    if (injuryImpact && injuryImpact !== 'N/A') {
      html += `<div class="ab-row"><strong>Injuries:</strong> ${esc(injuryImpact)}</div>`;
    }
    if (restSchedule && restSchedule !== 'N/A') {
      html += `<div class="ab-row"><strong>Schedule:</strong> ${esc(restSchedule)}</div>`;
    }
    if (trends.length > 0) {
      html += `<div class="ab-row"><strong>Trends:</strong> ${trends.map(t => esc(t)).join(' | ')}</div>`;
    }
    html += `</div>`;
  }

  // Flags
  if (flags.length > 0) {
    html += `<div class="section-label">Flags</div>
      <div class="gotcha-text" style="font-size:0.72rem;">${flags.map(f => `<div>&#8226; ${esc(f)}</div>`).join('')}</div>`;
  }

  // Peter Zone
  if (peterZone) {
    html += `<div class="peter-zone">${esc(peterZone)}</div>`;
  }

  // Multi-book line comparison
  html += renderMultiBookCard(oddsGame, cardIdx);

  // Screener hits
  if (screenerHits.length > 0) {
    html += `<div class="screener-section">
      <div class="section-label">Screener Hits</div>`;
    screenerHits.forEach(hit => {
      const player = hit.player || '?';
      const stat = hit.stat || '';
      const line = hit.line ?? '';
      const floor = hit.floor ?? '';
      const verdict = hit.verdict || hit.signal || 'EDGE';
      html += `<div class="screener-hit">
        <span class="screener-player">${esc(player)}</span>
        <span class="screener-stat">${esc(stat)} line ${line} / floor ${floor}</span>
        <span class="screener-verdict">${esc(verdict)}</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function esc(s) {
  if (s === null || s === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
