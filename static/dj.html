<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ — NCAAB Edge</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: #0a0a0f;
    color: #fff;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
}
a { color: #38BDF8; text-decoration: none; }

/* Header */
.dj-header {
    padding: 20px 24px 14px;
    border-bottom: 1px solid rgba(56,189,248,0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.dj-header h1 {
    font-size: 22px;
    font-weight: 900;
    color: #38BDF8;
    letter-spacing: 0.5px;
}
.dj-header .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    font-weight: 400;
}
.back-link {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    transition: all 0.2s;
}
.back-link:hover { border-color: #38BDF8; color: #38BDF8; }

/* Tabs */
.tab-bar {
    display: flex;
    gap: 0;
    padding: 0 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-top: 4px;
}
.tab-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-weight: 700;
    padding: 12px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.5px;
}
.tab-btn:hover { color: rgba(255,255,255,0.7); }
.tab-btn.active {
    color: #38BDF8;
    border-bottom-color: #38BDF8;
}

/* Content */
.tab-content { display: none; padding: 20px 24px; }
.tab-content.active { display: block; }

/* Stats bar */
.stats-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
}
.stat-box {
    border-radius: 8px;
    padding: 8px 14px;
    text-align: center;
    min-width: 70px;
}
.stat-box .label { font-size: 10px; color: rgba(255,255,255,0.4); }
.stat-box .value { font-size: 18px; font-weight: 800; }

/* Cards */
.profedge-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
}
.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.matchup-text { font-size: 16px; font-weight: 800; color: #fff; }
.time-text { color: rgba(255,255,255,0.3); font-size: 11px; font-weight: 400; }
.pipeline-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
}
.pipeline-step {
    min-width: 170px;
    flex-shrink: 0;
    border-radius: 10px;
    padding: 10px;
}
.step-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 6px;
}

/* Matrix tab */
.matrix-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
@media (max-width: 800px) {
    .matrix-container { grid-template-columns: 1fr; }
}
.matrix-panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px;
}
.matrix-panel h3 {
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
}
.matrix-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 8px;
}
.matrix-row:last-child { border-bottom: none; }
.var-name {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    flex: 1;
    text-transform: capitalize;
}
.var-weight {
    font-size: 14px;
    font-weight: 800;
    min-width: 30px;
    text-align: center;
}
.weight-input {
    width: 52px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    padding: 4px 6px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
}
.weight-input:focus { border-color: #38BDF8; }
.weight-input.higher { border-color: #10B981; background: rgba(16,185,129,0.08); }
.weight-input.lower { border-color: #ef4444; background: rgba(239,68,68,0.08); }
.weight-sum {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-align: right;
    padding-top: 10px;
    margin-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.08);
}
.save-btn {
    background: rgba(56,189,248,0.15);
    border: 1px solid rgba(56,189,248,0.4);
    color: #38BDF8;
    font-size: 14px;
    font-weight: 800;
    padding: 10px 28px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
}
.save-btn:hover { background: rgba(56,189,248,0.25); }
.save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.save-msg {
    font-size: 12px;
    margin-left: 12px;
    display: inline-block;
}

/* Loading */
.loading {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.3);
    font-size: 14px;
}

/* Detail toggle */
.detail-toggle {
    text-align: center;
    margin-top: 6px;
    cursor: pointer;
}
.detail-toggle span {
    font-size: 10px;
    color: rgba(255,255,255,0.25);
}

/* Scrollbar */
::-webkit-scrollbar { height: 4px; width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>
<body>

<div class="dj-header">
    <div>
        <h1>DJ — NCAAB Edge</h1>
        <div class="subtitle">College Basketball Analysis Pipeline</div>
    </div>
    <a href="/" class="back-link">Edge Crew Home</a>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('games')">NCAAB GAMES</button>
    <button class="tab-btn" onclick="switchTab('matrix')">MY MATRIX</button>
</div>

<div id="tab-games" class="tab-content active">
    <div id="games-stats" class="stats-bar"></div>
    <div id="games-container"><div class="loading">Loading NCAAB games...</div></div>
</div>

<div id="tab-matrix" class="tab-content">
    <div id="matrix-container"><div class="loading">Loading matrix data...</div></div>
</div>

<script>
// ─── State ───
var gamesData = null;
var officialMatrix = [];
var djMatrix = {};
var matrixLoaded = false;

// ─── Tab Switching ───
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    if (tab === 'games') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('tab-games').classList.add('active');
    } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('tab-matrix').classList.add('active');
        if (!matrixLoaded) loadMatrix();
    }
}

// ─── Grade Helpers ───
function gradeColor(grade) {
    if (!grade || grade === 'N/A') return 'rgba(255,255,255,0.3)';
    if (grade.startsWith('A')) return '#10B981';
    if (grade === 'B+') return '#38BDF8';
    if (grade.startsWith('B')) return '#818cf8';
    if (grade.startsWith('C')) return '#d4a024';
    return '#ef4444';
}
function dimStyle(grade) {
    if (!grade || grade === 'N/A') return 'opacity:0.6;';
    if (['C+','C','D','F'].indexOf(grade) !== -1) return 'opacity:0.45;';
    return '';
}

// ─── Toggle Detail ───
function toggleDetail(idx) {
    var el = document.getElementById('dj-detail-' + idx);
    if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ─── Re-grade ───
function regradeGame(gameId) {
    fetch('/api/profedge/ncaab/grade/' + gameId, { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function() { loadGames(); })
        .catch(function(e) { console.error('Regrade error', e); });
}

// ─── Load Games ───
function loadGames() {
    fetch('/api/profedge/ncaab')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            gamesData = data;
            officialMatrix = data.matrix || [];
            renderStats(data);
            renderGames(data.games || []);
        })
        .catch(function(e) {
            document.getElementById('games-container').innerHTML = '<div class="loading" style="color:#ef4444;">Failed to load games: ' + e.message + '</div>';
        });
}

// ─── Render Stats Bar ───
function renderStats(data) {
    var bar = document.getElementById('games-stats');
    var games = data.games || [];
    var total = games.length;
    var graded = 0, aPlus = 0, aGrade = 0, bPlus = 0, pctSum = 0;
    games.forEach(function(g) {
        var gr = g.grade ? g.grade.consensus_grade : null;
        if (gr && gr !== 'N/A' && gr !== '?') graded++;
        if (gr === 'A+') aPlus++;
        else if (gr === 'A' || gr === 'A-') aGrade++;
        else if (gr === 'B+') bPlus++;
        var steps = 0;
        if (g.odds && (g.odds.spread_home || g.odds.total)) steps++;
        if (g.home_profile && g.home_profile.L5) steps++;
        if (g.grade && g.grade.profiles) {
            var pk = Object.keys(g.grade.profiles);
            if (pk.length > 0 && g.grade.profiles[pk[0]].variables) steps++;
            if (pk.length > 0 && g.grade.profiles[pk[0]].grade) steps++;
        }
        if (gr && gr !== '?' && gr !== 'N/A') steps++;
        pctSum += Math.round((steps / 5) * 100);
    });
    var avgPct = total > 0 ? Math.round(pctSum / total) : 0;
    var avgPctColor = avgPct === 100 ? '#10B981' : avgPct >= 60 ? '#F59E0B' : '#EF4444';
    bar.innerHTML =
        '<div class="stat-box" style="background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);"><div class="label">Games</div><div class="value" style="color:#38BDF8;">' + total + '</div></div>' +
        '<div class="stat-box" style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);"><div class="label">Graded</div><div class="value" style="color:#10B981;">' + graded + '</div></div>' +
        '<div class="stat-box" style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);"><div class="label">A+</div><div class="value" style="color:#818cf8;">' + aPlus + '</div></div>' +
        '<div class="stat-box" style="background:rgba(212,160,36,0.08);border:1px solid rgba(212,160,36,0.2);"><div class="label">A/A-</div><div class="value" style="color:#d4a024;">' + aGrade + '</div></div>' +
        '<div class="stat-box" style="background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);"><div class="label">B+</div><div class="value" style="color:#38BDF8;">' + bPlus + '</div></div>' +
        '<div class="stat-box" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);"><div class="label">Pipeline</div><div class="value" style="color:' + avgPctColor + ';">' + avgPct + '%</div></div>' +
        (data.matrix_count ? '<div class="stat-box" style="background:rgba(212,160,36,0.08);border:1px solid rgba(212,160,36,0.2);"><div class="label">Matrix</div><div class="value" style="color:#d4a024;">' + data.matrix_count + ' vars</div></div>' : '') +
        (data.chain_count ? '<div class="stat-box" style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);"><div class="label">Chains</div><div class="value" style="color:#10B981;">' + data.chain_count + '</div></div>' : '') +
        '<div class="stat-box" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);"><div class="label">Date</div><div class="value" style="font-size:13px;color:#fff;">' + (data.date || '?') + '</div></div>';
}

// ─── Render Game Cards ───
function renderGames(games) {
    var container = document.getElementById('games-container');
    if (!games || games.length === 0) {
        container.innerHTML = '<div class="loading">No NCAAB games today</div>';
        return;
    }
    var html = '';
    games.forEach(function(g, idx) {
        var gr = g.grade;
        var grade = gr ? gr.consensus_grade : 'N/A';
        if (grade === '?') grade = 'N/A';
        var avg = gr ? gr.consensus_avg.toFixed(1) : '--';
        var pickSide = gr ? gr.pick_side : '';
        var pickTeam = pickSide === 'home' ? g.home : g.away;
        var dim = (grade === 'N/A') ? 'opacity:0.6;' : dimStyle(grade);
        var gColor = (grade === 'N/A') ? 'rgba(255,255,255,0.25)' : gradeColor(grade);

        // Percent complete
        var pctSteps = 0;
        if (g.odds && (g.odds.spread_home || g.odds.total)) pctSteps++;
        if (g.home_profile && g.home_profile.L5) pctSteps++;
        if (gr && gr.profiles) {
            var profKeys = Object.keys(gr.profiles);
            if (profKeys.length > 0 && gr.profiles[profKeys[0]].variables) pctSteps++;
            if (profKeys.length > 0 && gr.profiles[profKeys[0]].grade) pctSteps++;
        }
        if (gr && gr.consensus_grade && gr.consensus_grade !== '?' && gr.consensus_grade !== 'N/A') pctSteps++;
        var pctComplete = Math.round((pctSteps / 5) * 100);
        var pctColor = pctComplete === 100 ? '#10B981' : pctComplete >= 60 ? '#F59E0B' : '#EF4444';

        // Time
        var timeStr = '';
        if (g.time) {
            try {
                var dt = new Date(g.time);
                timeStr = dt.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});
            } catch(e) { timeStr = g.time; }
        }

        html += '<div class="profedge-card" style="' + dim + '">';

        // Matchup header
        html += '<div class="card-header">';
        html += '<div class="matchup-text">' + g.matchup + ' <span class="time-text">' + timeStr + '</span></div>';
        html += '<div style="text-align:right;display:flex;align-items:center;gap:10px;">';
        html += '<span style="font-size:10px;font-weight:700;color:' + pctColor + ';background:rgba(' + (pctComplete===100?'16,185,129':pctComplete>=60?'245,158,11':'239,68,68') + ',0.12);padding:3px 8px;border-radius:10px;">' + pctComplete + '%</span>';
        html += '<span style="font-size:28px;font-weight:900;color:' + gColor + ';">' + grade + '</span>';
        html += '<span style="font-size:11px;color:rgba(255,255,255,0.4);">' + avg + '</span>';
        html += '</div></div>';

        // 5-step pipeline
        html += '<div class="pipeline-row">';

        // Step 1: Data
        html += '<div class="pipeline-step" style="background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.2);">';
        html += '<div class="step-label" style="color:#6366f1;">STEP 1 — DATA</div>';
        var odds = g.odds || {};
        var spH = odds.spread_home || odds.spread || '--';
        var ouVal = odds.total || odds.over_under || '--';
        var mlH = odds.ml_home || odds.home_ml || '--';
        var mlA = odds.ml_away || odds.away_ml || '--';
        html += '<div style="font-size:11px;color:rgba(255,255,255,0.6);line-height:1.6;">';
        html += 'Spread: <span style="color:#fff;font-weight:700;">' + spH + '</span><br>';
        html += 'O/U: <span style="color:#fff;font-weight:700;">' + ouVal + '</span><br>';
        html += 'ML: <span style="color:#fff;font-weight:700;">' + mlH + ' / ' + mlA + '</span>';
        html += '</div></div>';

        // Step 2: Enrichment
        html += '<div class="pipeline-step" style="min-width:200px;background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.2);">';
        html += '<div class="step-label" style="color:#38BDF8;">STEP 2 — ENRICHMENT</div>';
        ['away', 'home'].forEach(function(side) {
            var prof = g[side + '_profile'] || {};
            var abbrev = side === 'home' ? (g.home_abbrev || g.home) : (g.away_abbrev || g.away);
            var tag = side === 'home' ? 'HOME' : 'AWAY';
            html += '<div style="margin-bottom:4px;">';
            html += '<span style="font-size:10px;font-weight:700;color:#fff;">' + abbrev + '</span> <span style="font-size:9px;color:rgba(255,255,255,0.3);">' + tag + '</span><br>';
            var hasAny = false;
            if (prof.L5 && prof.L5 !== '0-0') { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">L5: ' + prof.L5 + ' | L10: ' + (prof.L10 || '--') + '</span><br>'; hasAny = true; }
            if (prof.ppg_L5) { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">PPG: ' + prof.ppg_L5.toFixed(1) + ' | Opp: ' + (prof.opp_ppg_L5 || 0).toFixed(1) + '</span><br>'; hasAny = true; }
            if (prof.kenpom_off) { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">AdjO: ' + prof.kenpom_off + ' | AdjD: ' + (prof.kenpom_def || '?') + '</span><br>'; hasAny = true; }
            if (prof.tempo) { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">Tempo: ' + prof.tempo + '</span><br>'; hasAny = true; }
            if (prof.seed) { html += '<span style="font-size:10px;color:#d4a024;">Seed: #' + prof.seed + '</span><br>'; hasAny = true; }
            if (prof.streak && prof.streak !== 'L0' && prof.streak !== 'W0') { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">Streak: ' + prof.streak + ' | Rest: ' + (prof.rest_days != null ? prof.rest_days + 'd' : '--') + '</span><br>'; hasAny = true; }
            else if (prof.rest_days != null) { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">Rest: ' + prof.rest_days + 'd</span><br>'; hasAny = true; }
            if (!hasAny) html += '<span style="font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;">Awaiting data</span><br>';
            var inj = (g.injuries && g.injuries[side]) || [];
            if (inj.length > 0) {
                var outCount = inj.filter(function(i){return i.status === 'OUT';}).length;
                html += '<span style="font-size:10px;color:#ef4444;">' + inj.length + ' injuries (' + outCount + ' OUT)</span>';
            }
            html += '</div>';
        });
        html += '</div>';

        // Step 3: Variables
        html += '<div class="pipeline-step" style="min-width:200px;background:rgba(212,160,36,0.06);border:1px solid rgba(212,160,36,0.2);">';
        html += '<div class="step-label" style="color:#d4a024;">STEP 3 — VARIABLES</div>';
        if (gr && gr.profiles) {
            var firstProfile = gr.profiles[Object.keys(gr.profiles)[0]];
            if (firstProfile && firstProfile.variables) {
                var vars = firstProfile.variables;
                var varNames = Object.keys(vars);
                varNames.sort(function(a,b) { return (vars[b].score || 0) - (vars[a].score || 0); });
                var showVars = varNames.slice(0, 8);
                showVars.forEach(function(vname) {
                    var v = vars[vname];
                    var vs = v.score || 0;
                    var vc = vs >= 7 ? '#10B981' : (vs >= 5 ? '#d4a024' : '#ef4444');
                    html += '<div style="display:flex;justify-content:space-between;font-size:10px;padding:1px 0;">';
                    html += '<span style="color:rgba(255,255,255,0.5);">' + vname.replace(/_/g, ' ') + '</span>';
                    html += '<span style="color:' + vc + ';font-weight:700;">' + vs + '</span>';
                    html += '</div>';
                });
                if (varNames.length > 8) {
                    html += '<div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:2px;">+' + (varNames.length - 8) + ' more</div>';
                }
            } else {
                html += '<div style="font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;">No variables</div>';
            }
        } else {
            html += '<div style="font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;">Awaiting analysis</div>';
        }
        html += '</div>';

        // Step 4: Graders
        html += '<div class="pipeline-step" style="min-width:220px;background:rgba(247,37,133,0.06);border:1px solid rgba(247,37,133,0.2);">';
        html += '<div class="step-label" style="color:#F72585;">STEP 4 — GRADERS</div>';
        if (gr && gr.profiles) {
            var profileNames = Object.keys(gr.profiles);
            html += '<div style="display:grid;grid-template-columns:' + (profileNames.length > 1 ? '1fr 1fr' : '1fr') + ';gap:6px;">';
            profileNames.forEach(function(pname) {
                var p = gr.profiles[pname];
                var pc = pname === 'sintonia' ? '#F72585' : (pname === 'renzo' ? '#9B59B6' : (pname === 'peter' ? '#D4A017' : (pname === 'ai' ? '#00D4AA' : (pname === 'alyssa' ? '#41EAD4' : '#38BDF8'))));
                html += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px;text-align:center;">';
                html += '<div style="font-size:9px;font-weight:800;color:' + pc + ';letter-spacing:0.5px;text-transform:uppercase;">' + pname + '</div>';
                html += '<div style="font-size:24px;font-weight:900;color:' + gradeColor(p.grade) + ';line-height:1.2;">' + (p.grade || '?') + '</div>';
                html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);">' + (p.final || 0).toFixed(1) + '</div>';
                if (p.sizing) html += '<div style="font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px;">' + p.sizing + '</div>';
                html += '</div>';
            });
            html += '</div>';
            if (gr.peter_rules && gr.peter_rules.flags && gr.peter_rules.flags.length > 0) {
                html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;">';
                gr.peter_rules.flags.forEach(function(f) {
                    var fc = f.action === 'KILL' ? '#ef4444' : (f.action === 'BOOST' ? '#10B981' : '#d4a024');
                    html += '<span style="font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,0.04);border:1px solid ' + fc + ';color:' + fc + ';">' + f.action + '</span>';
                });
                html += '</div>';
            }
        } else {
            html += '<div style="font-size:24px;font-weight:900;color:rgba(255,255,255,0.15);text-align:center;padding:12px 0;">N/A</div>';
        }
        html += '</div>';

        // Step 5: Engine
        html += '<div class="pipeline-step" style="min-width:180px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);text-align:center;display:flex;flex-direction:column;justify-content:center;">';
        html += '<div class="step-label" style="color:#10B981;">STEP 5 — ENGINE</div>';
        html += '<div style="font-size:36px;font-weight:900;color:' + gColor + ';line-height:1;">' + grade + '</div>';
        html += '<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;">Score: ' + avg + '</div>';
        if (pickTeam && grade !== 'N/A') {
            var sizing = '';
            if (gr && gr.profiles && gr.profiles.sintonia) sizing = gr.profiles.sintonia.sizing || '';
            html += '<div style="margin-top:8px;background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.3);color:#38BDF8;font-size:12px;font-weight:800;padding:6px 10px;border-radius:6px;">' + pickTeam + (sizing && sizing !== 'PASS' ? ' (' + sizing + ')' : '') + '</div>';
        }
        if (gr && gr.ev && gr.ev.ev_pct != null) {
            var evPct = gr.ev.ev_pct;
            var evColor = evPct > 0 ? '#10B981' : '#ef4444';
            html += '<div style="margin-top:4px;font-size:11px;font-weight:700;color:' + evColor + ';">EV: ' + (evPct > 0 ? '+' : '') + evPct.toFixed(1) + '%</div>';
        }
        if (g.race) {
            html += '<div style="margin-top:4px;font-size:10px;color:rgba(255,255,255,0.5);">Race: ' + g.race.home_score + '-' + g.race.away_score + '</div>';
            html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);">' + (g.race.confidence || '') + '</div>';
        }
        html += '<button onclick="event.stopPropagation();regradeGame(\'' + g.game_id + '\')" style="margin-top:8px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.3);color:#38BDF8;font-size:10px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;">RE-GRADE</button>';
        html += '</div>';

        html += '</div>'; // end pipeline row

        // Expandable detail
        html += '<div id="dj-detail-' + idx + '" style="display:none;margin-top:10px;border-top:1px solid rgba(255,255,255,0.06);padding-top:10px;">';
        if (gr && gr.profiles) {
            html += '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
            Object.keys(gr.profiles).forEach(function(pname) {
                var p = gr.profiles[pname];
                var pc = pname === 'sintonia' ? '#F72585' : (pname === 'renzo' ? '#9B59B6' : (pname === 'peter' ? '#D4A017' : (pname === 'ai' ? '#00D4AA' : (pname === 'alyssa' ? '#41EAD4' : '#38BDF8'))));
                html += '<div style="flex:1;min-width:200px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px;">';
                html += '<div style="font-size:10px;color:' + pc + ';font-weight:700;text-transform:uppercase;margin-bottom:4px;">' + pname + ' — ALL VARIABLES</div>';
                if (p.variables) {
                    Object.keys(p.variables).forEach(function(vname) {
                        var v = p.variables[vname];
                        var vs = v.score || 0;
                        var vc = vs >= 7 ? '#10B981' : (vs >= 5 ? '#d4a024' : '#ef4444');
                        html += '<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.03);">';
                        html += '<span style="color:rgba(255,255,255,0.5);">' + vname.replace(/_/g, ' ') + '</span>';
                        html += '<span style="color:' + vc + ';font-weight:700;">' + vs + '/10</span>';
                        html += '</div>';
                    });
                }
                if (p.chains_fired && p.chains_fired.length > 0) {
                    html += '<div style="margin-top:4px;">';
                    p.chains_fired.forEach(function(c) {
                        html += '<span style="font-size:9px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10B981;padding:2px 5px;border-radius:3px;margin-right:3px;">' + c + '</span>';
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
            html += '</div>';
        }
        // Injuries detail
        html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">';
        ['away', 'home'].forEach(function(side) {
            var inj = (g.injuries && g.injuries[side]) || [];
            if (inj.length > 0) {
                var team = side === 'home' ? (g.home_abbrev || g.home) : (g.away_abbrev || g.away);
                html += '<div style="flex:1;min-width:200px;">';
                html += '<div style="font-size:10px;color:#ef4444;font-weight:700;margin-bottom:2px;">' + team + ' INJURIES</div>';
                inj.forEach(function(i) {
                    html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);">' + (i.status || '?') + ' — ' + i.player + ' (' + (i.pos || '?') + ')</div>';
                });
                html += '</div>';
            }
        });
        html += '</div>';
        html += '</div>'; // end detail

        // Toggle link
        html += '<div class="detail-toggle" onclick="toggleDetail(' + idx + ')">';
        html += '<span>tap for full breakdown</span>';
        html += '</div>';

        html += '</div>'; // end card
    });
    container.innerHTML = html;
}

// ─── Load Matrix ───
function loadMatrix() {
    matrixLoaded = true;
    var officialReady = officialMatrix.length > 0
        ? Promise.resolve()
        : fetch('/api/profedge/ncaab').then(function(r) { return r.json(); }).then(function(data) { officialMatrix = data.matrix || []; });

    var djReady = fetch('/api/agent/dj/matrix/ncaab')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            djMatrix = {};
            if (data && data.matrix) {
                data.matrix.forEach(function(v) { djMatrix[v.name] = v.weight; });
            }
        })
        .catch(function() { djMatrix = {}; });

    Promise.all([officialReady, djReady]).then(function() {
        renderMatrix();
    }).catch(function(e) {
        document.getElementById('matrix-container').innerHTML = '<div class="loading" style="color:#ef4444;">Failed to load matrix: ' + e.message + '</div>';
    });
}

// ─── Render Matrix ───
function renderMatrix() {
    var container = document.getElementById('matrix-container');
    if (!officialMatrix || officialMatrix.length === 0) {
        container.innerHTML = '<div class="loading">No matrix data available. Load games first.</div>';
        return;
    }

    var officialSum = 0;
    var djSum = 0;

    // Official column
    var offHtml = '<div class="matrix-panel">';
    offHtml += '<h3 style="color:#d4a024;">OFFICIAL MATRIX <span style="font-size:11px;color:rgba(255,255,255,0.3);font-weight:400;">(' + officialMatrix.length + ' variables)</span></h3>';
    officialMatrix.forEach(function(v) {
        officialSum += v.weight;
        var wColor = v.weight >= 9 ? '#10B981' : (v.weight >= 8 ? '#38BDF8' : (v.weight >= 7 ? '#d4a024' : 'rgba(255,255,255,0.5)'));
        offHtml += '<div class="matrix-row">';
        offHtml += '<div class="var-name">' + v.name.replace(/_/g, ' ') + '</div>';
        offHtml += '<div class="var-weight" style="color:' + wColor + ';">' + v.weight + '</div>';
        offHtml += '</div>';
    });
    offHtml += '<div class="weight-sum">Total Weight: <span style="color:#d4a024;">' + officialSum + '</span></div>';
    offHtml += '</div>';

    // DJ column
    var djHtml = '<div class="matrix-panel" style="border-color:rgba(56,189,248,0.2);">';
    djHtml += '<h3 style="color:#38BDF8;">DJ\'S MATRIX <span style="font-size:11px;color:rgba(255,255,255,0.3);font-weight:400;">Custom Weights</span></h3>';
    officialMatrix.forEach(function(v) {
        var djW = djMatrix[v.name] != null ? djMatrix[v.name] : v.weight;
        djSum += djW;
        var diffClass = '';
        if (djW > v.weight) diffClass = ' higher';
        else if (djW < v.weight) diffClass = ' lower';
        djHtml += '<div class="matrix-row">';
        djHtml += '<div class="var-name">' + v.name.replace(/_/g, ' ') + '</div>';
        djHtml += '<div style="flex:2;padding:0 8px;"><span style="font-size:9px;color:rgba(255,255,255,0.3);">' + (v.desc || '') + '</span></div>';
        djHtml += '<div style="display:flex;align-items:center;gap:6px;">';
        djHtml += '<span style="font-size:9px;color:rgba(255,255,255,0.25);">' + v.weight + '</span>';
        djHtml += '<input type="number" class="weight-input' + diffClass + '" min="1" max="10" value="' + djW + '" data-var="' + v.name + '" data-official="' + v.weight + '" onchange="onWeightChange(this)" oninput="onWeightChange(this)">';
        djHtml += '</div>';
        djHtml += '</div>';
    });
    djHtml += '<div class="weight-sum">Total Weight: <span id="dj-sum" style="color:#38BDF8;">' + djSum + '</span></div>';
    djHtml += '<div style="margin-top:14px;">';
    djHtml += '<button class="save-btn" onclick="saveMatrix()">SAVE MY MATRIX</button>';
    djHtml += '<button class="save-btn" style="background:rgba(212,160,36,0.1);border-color:rgba(212,160,36,0.3);color:#d4a024;margin-left:8px;" onclick="resetMatrix()">RESET TO OFFICIAL</button>';
    djHtml += '<span id="save-msg" class="save-msg"></span>';
    djHtml += '</div>';
    djHtml += '</div>';

    container.innerHTML = '<div class="matrix-container">' + offHtml + djHtml + '</div>';
}

// ─── Weight Change Handler ───
function onWeightChange(input) {
    var val = parseInt(input.value) || 1;
    if (val < 1) val = 1;
    if (val > 10) val = 10;
    input.value = val;
    var official = parseInt(input.getAttribute('data-official'));
    input.className = 'weight-input' + (val > official ? ' higher' : (val < official ? ' lower' : ''));

    var sum = 0;
    document.querySelectorAll('.weight-input').forEach(function(inp) {
        sum += parseInt(inp.value) || 0;
    });
    var sumEl = document.getElementById('dj-sum');
    if (sumEl) sumEl.textContent = sum;
}

// ─── Save Matrix ───
function saveMatrix() {
    var weights = [];
    document.querySelectorAll('.weight-input').forEach(function(inp) {
        weights.push({
            name: inp.getAttribute('data-var'),
            weight: parseInt(inp.value) || 1
        });
    });

    var msgEl = document.getElementById('save-msg');
    msgEl.textContent = 'Saving...';
    msgEl.style.color = '#38BDF8';

    fetch('/api/agent/dj/matrix/ncaab', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ matrix: weights })
    })
    .then(function(r) { return r.json(); })
    .then(function() {
        msgEl.textContent = 'Saved';
        msgEl.style.color = '#10B981';
        setTimeout(function() { msgEl.textContent = ''; }, 3000);
    })
    .catch(function(e) {
        msgEl.textContent = 'Error: ' + e.message;
        msgEl.style.color = '#ef4444';
    });
}

// ─── Reset Matrix ───
function resetMatrix() {
    document.querySelectorAll('.weight-input').forEach(function(inp) {
        var official = parseInt(inp.getAttribute('data-official'));
        inp.value = official;
        inp.className = 'weight-input';
    });
    var sum = 0;
    officialMatrix.forEach(function(v) { sum += v.weight; });
    var sumEl = document.getElementById('dj-sum');
    if (sumEl) sumEl.textContent = sum;
    document.getElementById('save-msg').textContent = '';
}

// ─── Init ───
loadGames();
</script>
