<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ's Edge Agent — Casa EV</title>
<style>
  :root {
    --bg: #0d0d14;
    --card-bg: #161622;
    --card-border: #1e1e30;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: #7c6cf7;
    --green: #00d68f;
    --red: #ff5555;
    --yellow: #ffd93d;
    --orange: #ff9f43;
    --pill-bg: #1a1a2e;
    --pill-active: #6c5ce7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 0 0 100px;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--bg) 80%, transparent);
    padding: 20px 16px 12px;
  }

  .header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    text-align: center;
    margin-bottom: 12px;
  }

  .header h1 .sport-label { color: var(--accent-glow); }
  .header h1 .date-label { color: var(--text-dim); font-weight: 400; font-size: 0.85rem; }

  .pills {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    justify-content: center;
    flex-wrap: wrap;
    padding-bottom: 4px;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--pill-bg);
    color: var(--text-dim);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--pill-active); color: #fff; border-color: var(--accent); }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  .loading .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .games-container { padding: 0 12px; max-width: 800px; margin: 0 auto; }

  /* Landing page */
  .landing {
    text-align: center;
    padding: 60px 20px 40px;
    max-width: 600px;
    margin: 0 auto;
  }
  .landing h2 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--text);
  }
  .landing .subtitle {
    font-size: 0.95rem;
    color: var(--accent-glow);
    margin-bottom: 30px;
    font-weight: 500;
  }
  .landing .what-we-do {
    text-align: left;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 30px;
  }
  .landing .what-we-do h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .landing .what-we-do ul {
    list-style: none;
    padding: 0;
  }
  .landing .what-we-do li {
    font-size: 0.88rem;
    color: var(--text);
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    line-height: 1.5;
  }
  .landing .what-we-do li:last-child { border-bottom: none; }
  .landing .what-we-do li::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
  }
  .landing .tonight {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 20px;
  }
  .landing .tonight strong { color: var(--text); }
  .landing-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .landing-btn {
    padding: 14px 28px;
    border-radius: 10px;
    border: 1px solid var(--accent);
    background: rgba(108, 92, 231, 0.12);
    color: var(--accent-glow);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .landing-btn:hover {
    background: var(--accent);
    color: #fff;
    transform: translateY(-1px);
  }

  /* Re-analyze button */
  .reanalyze-bar {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .reanalyze-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: rgba(108, 92, 231, 0.1);
    color: var(--accent-glow);
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .reanalyze-btn:hover { background: var(--accent); color: #fff; }
  .reanalyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .reanalyze-btn.small {
    padding: 4px 10px;
    font-size: 0.65rem;
    border-radius: 6px;
  }

  /* Grade legend */
  .grade-legend {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 0.7rem;
    color: var(--text-dim);
    line-height: 1.6;
    text-align: center;
  }
  .grade-legend .gl-a { color: var(--green); font-weight: 700; }
  .grade-legend .gl-b { color: var(--yellow); font-weight: 700; }
  .grade-legend .gl-c { color: var(--orange); font-weight: 700; }
  .grade-legend .gl-d { color: var(--red); font-weight: 700; }

  /* Game cards */
  .game-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .game-card:hover { border-color: var(--accent); }

  .game-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .matchup-info { flex: 1; }

  .matchup-teams {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.4;
  }

  .matchup-meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .grade-badge {
    font-size: 1.6rem;
    font-weight: 800;
    min-width: 50px;
    text-align: center;
    line-height: 1;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(108, 92, 231, 0.15);
  }

  .grade-A { color: var(--green); background: rgba(0, 214, 143, 0.12); }
  .grade-B { color: var(--yellow); background: rgba(255, 217, 61, 0.12); }
  .grade-C { color: var(--orange); background: rgba(255, 159, 67, 0.12); }
  .grade-D, .grade-F { color: var(--red); background: rgba(255, 85, 85, 0.12); }
  .grade-INCOMPLETE { color: var(--text-dim); background: rgba(136, 136, 160, 0.1); font-size: 0.8rem; }

  .lines-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .line-chip {
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    font-weight: 500;
  }

  .line-chip .val { color: var(--text); font-weight: 700; }

  .edge-pick-row {
    background: rgba(108, 92, 231, 0.08);
    border: 1px solid rgba(108, 92, 231, 0.2);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }

  .edge-pick-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-glow);
    margin-bottom: 4px;
    font-weight: 700;
  }

  .edge-pick-text {
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.4;
  }

  .edge-pick-reasoning {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 600;
  }

  /* Analysis text */
  .analysis-block {
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .analysis-block .ab-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-glow);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .analysis-block .ab-edge {
    color: var(--text);
    font-weight: 600;
    font-size: 0.82rem;
    margin-bottom: 6px;
  }
  .analysis-block strong { color: var(--text); }
  .analysis-block .ab-row {
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .analysis-block .ab-row:last-child { border-bottom: none; }

  .gotcha-text {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .gotcha-text ul { padding-left: 16px; margin: 0; }
  .gotcha-text li { margin-bottom: 3px; }
  .gotcha-text strong { color: var(--text); }

  .flags-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .flag-tag {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .flag-SHARP { background: rgba(0,214,143,0.15); color: var(--green); }
  .flag-TRAP { background: rgba(255,85,85,0.15); color: var(--red); }
  .flag-B2B { background: rgba(255,159,67,0.15); color: var(--orange); }
  .flag-UPSET { background: rgba(255,217,61,0.15); color: var(--yellow); }
  .flag-PASS { background: rgba(136,136,160,0.12); color: var(--text-dim); }
  .flag-BEST { background: rgba(0,214,143,0.2); color: var(--green); }
  .flag-REST { background: rgba(108,92,231,0.15); color: var(--accent-glow); }
  .flag-INJURY { background: rgba(255,85,85,0.12); color: var(--red); }
  .flag-INCOMPLETE { background: rgba(136,136,160,0.1); color: var(--text-dim); }
  .flag-default { background: rgba(255,255,255,0.06); color: var(--text-dim); }

  .screener-section {
    margin-top: 8px;
    border-top: 1px solid var(--card-border);
    padding-top: 8px;
  }

  .screener-hit {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 0.75rem;
  }

  .screener-player { font-weight: 600; }
  .screener-stat { color: var(--text-dim); }
  .screener-verdict { color: var(--green); font-weight: 700; font-size: 0.7rem; }

  .peter-zone {
    font-size: 0.78rem;
    color: var(--text);
    line-height: 1.5;
    background: rgba(108, 92, 231, 0.06);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    margin-top: 8px;
    border-radius: 0 6px 6px 0;
  }

  .footer {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 0.7rem;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .icon { font-size: 2rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  .global-gotcha {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }

  .global-gotcha .section-label { color: var(--accent-glow); }

  /* Multi-book line comparison */
  .books-section {
    margin-top: 10px;
    border-top: 1px solid var(--card-border);
    padding-top: 10px;
  }
  .books-toggle {
    font-size: 0.7rem;
    color: var(--accent-glow);
    cursor: pointer;
    font-weight: 600;
    padding: 4px 0;
    user-select: none;
  }
  .books-toggle:hover { text-decoration: underline; }
  .books-detail { display: none; margin-top: 8px; }
  .books-detail.open { display: block; }
  .books-market {
    margin-bottom: 10px;
  }
  .books-market-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-glow);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .books-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 6px;
    font-size: 0.72rem;
    border-radius: 4px;
    margin-bottom: 2px;
  }
  .books-row.best { background: rgba(0, 214, 143, 0.08); }
  .books-row.worst { background: rgba(255, 85, 85, 0.06); }
  .books-row .book-name {
    color: var(--text-dim);
    min-width: 90px;
    font-weight: 500;
  }
  .books-row .book-line {
    color: var(--text);
    font-weight: 700;
    min-width: 80px;
  }
  .books-row .book-odds {
    color: var(--text-dim);
    font-weight: 600;
    min-width: 60px;
    text-align: right;
  }
  .books-row .best-tag {
    font-size: 0.55rem;
    color: var(--green);
    font-weight: 800;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .books-row .worst-tag {
    font-size: 0.55rem;
    color: var(--red);
    font-weight: 800;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .books-gap {
    font-size: 0.68rem;
    color: var(--yellow);
    font-weight: 600;
    padding: 2px 0;
    margin-top: 2px;
  }
  .books-gap.disagree { color: var(--orange); }

  /* Card top row with re-analyze */
  .card-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* === AGENT PANEL === */
  .agent-panel {
    background: var(--card-bg);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    position: relative;
  }
  .agent-panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .agent-panel-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); animation: agent-pulse 2s infinite;
  }
  @keyframes agent-pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .agent-panel-title {
    font-size: 0.85rem; font-weight: 800; color: var(--accent-glow);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .agent-panel-badge {
    margin-left: auto;
    padding: 3px 10px; border-radius: 10px;
    background: rgba(108,92,231,0.15);
    color: var(--accent-glow); font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* Analyze My Way button */
  .analyze-my-way {
    display: block; width: 100%; padding: 14px; margin: 10px 0;
    border-radius: 10px; border: none;
    background: linear-gradient(135deg, #6c5ce7, #7c6cf7);
    color: #fff; font-family: inherit; font-size: 0.85rem; font-weight: 800;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .analyze-my-way:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,92,231,0.3); }
  .analyze-my-way:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .analyze-my-way.running { animation: amw-shimmer 1.5s infinite; }
  @keyframes amw-shimmer { 0%,100%{opacity:1;} 50%{opacity:0.7;} }

  /* Matrix panel */
  .matrix-panel {
    margin-top: 12px;
    border-top: 1px solid var(--card-border);
    padding-top: 12px;
  }
  .matrix-panel-toggle {
    font-size: 0.72rem; color: var(--accent-glow);
    cursor: pointer; font-weight: 700; user-select: none;
  }
  .matrix-panel-toggle:hover { text-decoration: underline; }
  .matrix-panel-body { display: none; margin-top: 10px; }
  .matrix-panel-body.open { display: block; }
  .matrix-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px; border-radius: 6px; margin-bottom: 3px;
    font-size: 0.72rem; background: rgba(255,255,255,0.03);
  }
  .matrix-row .m-key { flex: 1; font-weight: 600; color: var(--text); }
  .matrix-row .m-weight {
    font-weight: 800; color: var(--accent-glow);
    min-width: 28px; text-align: center;
  }
  .matrix-row .m-tag {
    font-size: 0.55rem; font-weight: 700; padding: 1px 6px;
    border-radius: 4px; margin-left: 6px; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .m-tag-override { color: var(--yellow); background: rgba(255,217,61,0.12); }
  .m-tag-custom { color: var(--green); background: rgba(0,214,143,0.12); }
  .matrix-excluded-row {
    padding: 4px 8px; margin-bottom: 3px; font-size: 0.7rem;
    color: var(--red); text-decoration: line-through; opacity: 0.6;
  }

  /* DJ results comparison */
  .dj-result-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px; border-radius: 6px; font-size: 0.65rem;
    font-weight: 700; margin-left: 8px;
  }
  .dj-delta-up { color: var(--green); background: rgba(0,214,143,0.1); }
  .dj-delta-down { color: var(--red); background: rgba(255,85,85,0.1); }
  .dj-delta-same { color: var(--text-dim); background: rgba(255,255,255,0.05); }

  /* Voice bar — fixed bottom */
  .voice-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 0; padding-bottom: env(safe-area-inset-bottom);
    background: rgba(13,13,20,0.97); backdrop-filter: blur(12px);
    border-top: 1px solid var(--card-border);
    z-index: 200;
  }
  .voice-status-row {
    padding: 6px 16px; text-align: center;
    font-size: 0.72rem; font-weight: 600; color: var(--text-dim);
    display: none;
  }
  .voice-status-row.active { display: block; }
  .voice-status-row .v-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; animation: agent-pulse 1s infinite;
  }
  .voice-status-row.state-listening { color: var(--green); }
  .voice-status-row.state-thinking { color: var(--yellow); }
  .voice-status-row.state-speaking { color: var(--accent-glow); }

  .voice-controls {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 8px 16px;
  }
  .voice-mode-btn {
    padding: 8px 16px; border-radius: 8px;
    border: 1px solid rgba(108,92,231,0.3);
    background: rgba(108,92,231,0.08); color: var(--accent-glow);
    font-family: inherit; font-size: 0.7rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .voice-mode-btn:hover { background: rgba(108,92,231,0.15); border-color: var(--accent); }
  .voice-mode-btn.active { background: rgba(108,92,231,0.25); border-color: var(--accent); color: #fff; }
  .voice-mode-btn.end-btn {
    border-color: rgba(255,85,85,0.3); color: var(--red);
    background: rgba(255,85,85,0.08); display: none;
  }
  .voice-mode-btn.end-btn.visible { display: inline-flex; }

  .voice-mic-btn {
    width: 44px; height: 44px; border-radius: 12px;
    border: 1px solid rgba(108,92,231,0.3);
    background: transparent; color: var(--accent-glow); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .voice-mic-btn:hover { background: rgba(108,92,231,0.1); }
  .voice-mic-btn.listening {
    background: rgba(108,92,231,0.2); border-color: var(--accent);
    animation: mic-pulse 1.5s infinite;
  }
  @keyframes mic-pulse {
    0%,100%{box-shadow:0 0 0 0 rgba(108,92,231,0.4);}
    50%{box-shadow:0 0 0 10px rgba(108,92,231,0);}
  }

  .mic-sensitivity {
    display: none; align-items: center; gap: 6px;
    padding: 4px 16px 6px; justify-content: center;
  }
  .mic-sensitivity.visible { display: flex; }
  .mic-sensitivity label {
    font-size: 0.6rem; color: var(--text-dim); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .mic-sensitivity select {
    padding: 3px 8px; border-radius: 6px; border: 1px solid var(--card-border);

async function loadSport(sport) {
  const container = document.getElementById('gamesContainer');
  const loading = document.getElementById('loadingState');
  const footer = document.getElementById('footer');

  container.innerHTML = '';
  footer.style.display = 'none';
  loading.style.display = 'block';
  document.getElementById('loadingText').textContent = 'Loading slate...';

  try {
    // Fetch analysis, screener, odds, arbs, and agent matrix in parallel
    const [analysisResp, screenerResp, oddsResp, arbResp, matrixResp] = await Promise.all([
      fetch(`/api/analysis/${sport}?cached_only=true`).then(r => r.json()).catch(() => null),
      fetch(`/api/screener/${sport}`).then(r => r.json()).catch(() => null),
      fetch(`/api/odds/${sport}`).then(r => r.json()).catch(() => null),
      fetch(`/api/arb-scan`).then(r => r.json()).catch(() => null),
      agentProfile ? fetch(`/api/agent/${AGENT_USER_ID}/matrix/${sport}`).then(r => r.json()).catch(() => null) : Promise.resolve(null)
    ]);
    if (matrixResp) agentMatrix[sport] = matrixResp;

    loading.style.display = 'none';

    const analysis = analysisResp || { games: [] };
    const screener = screenerResp || { screener: [] };
    const odds = oddsResp || { games: [] };

    // Cache for re-analyze
    analysisCache[sport] = analysis;
    screenerCache[sport] = screener;
    oddsCache[sport] = odds;

    // Show ALL analysis games (the analysis IS the demo — DJ needs to see the full system)
    // Only fall back to odds-only upcoming games when no analysis exists
    const now = Date.now();
    const allOddsGames = odds.games || [];
    const upcomingOddsGames = allOddsGames.filter(g => {
      const ct = g.commence_time || g.commence || g.time || '';
      if (!ct) return true;
      return new Date(ct).getTime() > now;
    });

    let games;
    const analysisGames = analysis.games || [];

    // Build from odds (upcoming games), then MERGE analysis data onto matching games
    if (upcomingOddsGames.length > 0) {
      games = upcomingOddsGames.map(og => {
        const oddsMatchup = `${og.away} @ ${og.home}`;
        // Find matching analysis game by team name overlap
        let matched = null;
        const ogTeams = [og.away, og.home].map(t => (t || '').toLowerCase().split(/\s+/).filter(w => w.length > 2));
        for (const ag of analysisGames) {
          const am = (ag.matchup || '').toLowerCase();
          const found = ogTeams.some(teamWords => teamWords.some(w => am.includes(w)));
          if (found) { matched = ag; break; }
        }
        // Merge: use odds for lines/books, analysis for grade/matrix/edge
        return {
          matchup: oddsMatchup,
          away: og.away || '',
          home: og.home || '',
          grade: matched ? matched.grade : 'TBD',
          composite_score: matched ? matched.composite_score : null,
          matrix_scores: matched ? matched.matrix_scores : {},
          edge_question: matched ? matched.edge_question : '',
          edge_summary: matched ? matched.edge_summary : '',
          edge_pick: matched ? matched.edge_pick : {},
          injury_impact: matched ? matched.injury_impact : '',
          rest_schedule: matched ? matched.rest_schedule : '',
          trends: matched ? (matched.trends || []) : [],
          tags: matched ? (matched.tags || []) : [],
          flags: matched ? (matched.flags || []) : [],
          peter_zone: matched ? matched.peter_zone : '',
          analyzed_by: matched ? (matched.analyzed_by || matched._thinker || '') : '',
          player_props: matched ? matched.player_props : [],
          spread: og.home_spread || null,
          total: og.total || null,
          away_ml: og.away_ml || null,
          home_ml: og.home_ml || null,
          commence_time: og.commence_time || og.commence || og.time || '',
          all_bookmakers: og.all_bookmakers || [],
        };
      });
    } else if (analysisGames.length > 0) {
      // No odds games but analysis exists — show analysis
      games = analysisGames;
    } else {
      games = [];
    }

    if (games.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">&#128203;</div><p>No ${SPORT_LABELS[sport]} games or analysis available.</p><p style="margin-top:8px;font-size:0.75rem;">NCAAB lines appear morning of game day. NBA analysis runs at 4 PM PST.</p></div>`;
      return;
    }

    // Build screener lookup: matchup string -> hits
    const screenerByGame = buildScreenerMap(screener.screener || [], games);

    // Build odds lookup: matchup -> odds game data (with all_bookmakers)
    // When games came from odds directly, use the game itself as the odds source
    let oddsByGame;
    if (analysisGames.length > 0) {
      oddsByGame = buildOddsMap(allOddsGames, games);
    } else {
      // Games ARE from odds — map each to its matching odds game directly
      oddsByGame = {};
      games.forEach((g, i) => {
        oddsByGame[g.matchup] = upcomingOddsGames[i] || g;
      });
    }

    // Render
    let html = '';

    // Re-analyze bar
    html += `<div class="reanalyze-bar">
      <button class="reanalyze-btn" id="reanalyzeSlateBtn" onclick="reanalyzeSlate('${sport}')">RE-ANALYZE SLATE</button>
    </div>`;

    // Default matrix card — how this sport is graded
    html += renderDefaultMatrixCard(sport);

    // Agent panel
    if (agentProfile) {
      html += renderAgentPanel(sport);
    }

    // Grade legend
    html += `<div class="grade-legend">
      <span class="gl-a">A</span> = Strong edge, book is wrong
      &nbsp;|&nbsp; <span class="gl-b">B</span> = Lean, slight edge
      &nbsp;|&nbsp; <span class="gl-c">C</span> = No edge, fair line
      &nbsp;|&nbsp; <span class="gl-d">D/F</span> = Trap, stay away
    </div>`;

    // Global gotcha
    if (analysis.gotcha) {
      html += `<div class="global-gotcha"><div class="section-label">Tonight's Intel</div><div class="gotcha-text">${analysis.gotcha}</div></div>`;
    }

    // Arbitrage opportunities
    const arbs = (arbResp && arbResp.arbs) ? arbResp.arbs : [];
    if (arbs.length > 0) {
      html += `<div class="global-gotcha" style="border-color:rgba(0,214,143,0.3);background:rgba(0,214,143,0.04);">
        <div class="section-label" style="color:var(--green);">ARBITRAGE OPPORTUNITIES (${arbs.length})</div>`;
      arbs.slice(0, 5).forEach(a => {
        html += `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.75rem;">
          <div style="font-weight:700;">${esc(a.matchup || a.game || '')}</div>
          <div style="color:var(--text-dim);margin-top:2px;">${esc(a.type || '')} — ${esc(a.book1 || a.best_book || '')} vs ${esc(a.book2 || a.worst_book || '')} — <span style="color:var(--green);font-weight:700;">Profit: ${a.profit_pct || a.profit || '?'}%</span></div>
        </div>`;
      });
      html += `</div>`;
    }

    // Sort games: best grades first
    const gradeOrder = {'A+':0,'A':1,'A-':2,'B+':3,'B':4,'B-':5,'C+':6,'C':7,'D':8,'F':9,'TBD':10,'INCOMPLETE':11};
    games.sort((a, b) => (gradeOrder[a.grade] ?? 10) - (gradeOrder[b.grade] ?? 10));

    // Filter out games that have already started (stale)
    const now = new Date();
    const futureGames = games.filter(game => {
      const ct = game.commence_time || game.commence || game.time || '';
      if (!ct) return true; // No time data — keep it
      return new Date(ct) > now;
    });

    if (futureGames.length === 0 && games.length > 0) {
      html += `<div class="empty-state"><div class="icon">&#9989;</div><p>All ${SPORT_LABELS[sport]} games have started or finished. Check back tomorrow.</p></div>`;
    }

    futureGames.forEach((game, idx) => {
      html += renderGameCard(game, screenerByGame[game.matchup] || [], oddsByGame[game.matchup] || null, idx);
    });

    container.innerHTML = html;

    // Footer
    const ts = analysis.generated_at || analysis.fetched_at || '';

  } catch (err) {
    loading.style.display = 'none';
    container.innerHTML = `<div class="empty-state"><p>Failed to load data. Try again later.</p></div>`;
    console.error(err);
  }
}

function buildOddsMap(oddsGames, analysisGames) {
  const map = {};
  analysisGames.forEach(g => { map[g.matchup] = null; });

  oddsGames.forEach(og => {
    const ogKey = `${og.away} @ ${og.home}`.toLowerCase();
    for (const ag of analysisGames) {
      const agKey = (ag.matchup || '').toLowerCase();
      // Match by team name overlap
      const ogTeams = ogKey.replace('@', ' ').split(/\s+/).filter(t => t.length > 2);
      const agTeams = agKey.replace('@', ' ').split(/\s+/).filter(t => t.length > 2);
      const overlap = ogTeams.some(t => agTeams.some(h => h.includes(t) || t.includes(h)));
      if (overlap && !map[ag.matchup]) {
        map[ag.matchup] = og;
        break;
      }
    }
  });
  return map;
}

function buildScreenerMap(screenerHits, games) {
  const map = {};
  games.forEach(g => { map[g.matchup] = []; });

  screenerHits.forEach(hit => {
    const hitMatchup = (hit.matchup || '').toLowerCase();
    for (const g of games) {
      const gm = (g.matchup || '').toLowerCase();
      const gTeams = gm.replace('@', ' ').split(/\s+/).filter(t => t.length > 2);
      const hTeams = hitMatchup.replace('@', ' ').replace('vs', ' ').split(/\s+/).filter(t => t.length > 2);
      const overlap = gTeams.some(t => hTeams.some(h => h.includes(t) || t.includes(h)));
      if (overlap) {
        if (!map[g.matchup]) map[g.matchup] = [];
        map[g.matchup].push(hit);
        break;
      }
    }
  });
  return map;
}

function gradeClass(grade) {
  if (!grade) return '';
  const g = grade.replace(/[+-]/g, '');
  if (g === 'A') return 'grade-A';
  if (g === 'B') return 'grade-B';
  if (g === 'C') return 'grade-C';
  if (g === 'D' || g === 'F') return 'grade-D';
  if (grade === 'INCOMPLETE') return 'grade-INCOMPLETE';
  return '';
}

function flagClass(tag) {
  const t = tag.toUpperCase();
  if (t === 'SHARP') return 'flag-SHARP';
  if (t === 'TRAP') return 'flag-TRAP';
  if (t === 'B2B') return 'flag-B2B';
  if (t === 'UPSET') return 'flag-UPSET';
  if (t === 'PASS') return 'flag-PASS';
  if (t === 'BEST BET' || t === 'BEST') return 'flag-BEST';
  if (t.includes('REST')) return 'flag-REST';
  if (t.includes('INJURY')) return 'flag-INJURY';
  if (t === 'INCOMPLETE') return 'flag-INCOMPLETE';
  return 'flag-default';
}

function bookDisplayName(key) {
  return BOOK_DISPLAY[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function renderMultiBookCard(oddsGame, cardIdx) {
  if (!oddsGame || !oddsGame.all_bookmakers || oddsGame.all_bookmakers.length < 2) {
    return '';
  }

  const books = oddsGame.all_bookmakers;
  const away = oddsGame.away;
  const home = oddsGame.home;
  const toggleId = `booksDetail_${cardIdx}`;

  let html = `<div class="books-section">
    <div class="books-toggle" onclick="toggleBooks('${toggleId}')">&#9660; Compare Lines Across ${books.length} Books</div>
    <div class="books-detail" id="${toggleId}">`;

  // SPREAD comparison
  const spreadData = [];
  books.forEach(bk => {
    const spreads = bk.markets.spreads || [];
    spreads.forEach(s => {
      if (s.name === home) {
        spreadData.push({ book: bk.title || bk.key, team: home, point: s.point, price: s.price });
      }
    });
  });
  if (spreadData.length > 1) {
    // Sort by point (most favorable = most negative for favorite, most positive for dog)
    spreadData.sort((a, b) => a.point - b.point);
    const bestSpread = spreadData[0];
    const worstSpread = spreadData[spreadData.length - 1];
    const gap = Math.abs(worstSpread.point - bestSpread.point);

    html += `<div class="books-market">
      <div class="books-market-title">SPREAD (${esc(home)})</div>`;
    spreadData.forEach((d, i) => {
      const isBest = i === 0;
      const isWorst = i === spreadData.length - 1;
      const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
      const tag = isBest ? '<span class="best-tag">BEST</span>' : (isWorst ? '<span class="worst-tag">WORST</span>' : '');
      html += `<div class="books-row ${cls}">
        <span class="book-name">${esc(bookDisplayName(d.book))}</span>
        <span class="book-line">${esc(home)} ${d.point > 0 ? '+' : ''}${d.point}</span>
        <span class="book-odds">(${d.price > 0 ? '+' : ''}${d.price})</span>
        ${tag}
      </div>`;
    });
    if (gap > 0) {
      html += `<div class="books-gap ${gap >= 1.5 ? 'disagree' : ''}">Gap: ${gap.toFixed(1)} pts${gap >= 1.5 ? ' | BOOKS DISAGREE' : ''}</div>`;
    }
    html += `</div>`;
  }

  // MONEYLINE comparison
  const mlAwayData = [];
  const mlHomeData = [];
  books.forEach(bk => {
    const h2h = bk.markets.h2h || [];
    h2h.forEach(h => {
      if (h.name === away) mlAwayData.push({ book: bk.title || bk.key, team: away, price: h.price });
      if (h.name === home) mlHomeData.push({ book: bk.title || bk.key, team: home, price: h.price });
    });
  });
  if (mlAwayData.length > 1 || mlHomeData.length > 1) {
    html += `<div class="books-market"><div class="books-market-title">MONEYLINE</div>`;

    // Determine who is favorite/dog
    const avgAway = mlAwayData.reduce((s, d) => s + d.price, 0) / (mlAwayData.length || 1);
    const avgHome = mlHomeData.reduce((s, d) => s + d.price, 0) / (mlHomeData.length || 1);
    const dogData = avgAway > avgHome ? mlAwayData : mlHomeData;
    const favData = avgAway > avgHome ? mlHomeData : mlAwayData;
    const dogTeam = avgAway > avgHome ? away : home;
    const favTeam = avgAway > avgHome ? home : away;

    // Show dog lines (higher = better for bettor)
    dogData.sort((a, b) => b.price - a.price);
    favData.sort((a, b) => b.price - a.price); // Less negative = better for fav bettor

    // Merge and show side by side
    const allML = [];
    books.forEach(bk => {
      const h2h = bk.markets.h2h || [];
      let awayP = null, homeP = null;
      h2h.forEach(h => {
        if (h.name === away) awayP = h.price;
        if (h.name === home) homeP = h.price;
      });
      if (awayP !== null && homeP !== null) {
        allML.push({ book: bk.title || bk.key, awayP, homeP, dogP: avgAway > avgHome ? awayP : homeP });
      }
    });
    // Sort by best dog odds
    allML.sort((a, b) => b.dogP - a.dogP);

    allML.forEach((d, i) => {
      const isBest = i === 0;
      const isWorst = i === allML.length - 1;
      const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
      const tag = isBest ? '<span class="best-tag">BEST DOG</span>' : (isWorst ? '<span class="worst-tag">WORST</span>' : '');
      html += `<div class="books-row ${cls}">
        <span class="book-name">${esc(bookDisplayName(d.book))}</span>
        <span class="book-line">${esc(away)} ${d.awayP > 0 ? '+' : ''}${d.awayP} / ${esc(home)} ${d.homeP > 0 ? '+' : ''}${d.homeP}</span>
        ${tag}
      </div>`;
    });

    if (allML.length >= 2) {
      const bestDog = allML[0].dogP;
      const worstDog = allML[allML.length - 1].dogP;
      const gap = Math.abs(bestDog - worstDog);
      if (gap > 0) {
        html += `<div class="books-gap">Gap: ${gap} cents</div>`;
      }
    }
    html += `</div>`;
  }

  // TOTAL comparison
  const totalData = [];
  books.forEach(bk => {
    const totals = bk.markets.totals || [];
    let overP = null, underP = null, point = null;
    totals.forEach(t => {
      if (t.name === 'Over') { overP = t.price; point = t.point; }
      if (t.name === 'Under') { underP = t.price; }
    });
    if (point !== null) {
      totalData.push({ book: bk.title || bk.key, point, overP, underP });
    }
  });
  if (totalData.length > 1) {
    totalData.sort((a, b) => a.point - b.point);
    const low = totalData[0].point;
    const high = totalData[totalData.length - 1].point;
    const gap = high - low;

    html += `<div class="books-market"><div class="books-market-title">TOTAL (O/U)</div>`;
    totalData.forEach((d, i) => {
      const isBest = i === 0;
      const isWorst = i === totalData.length - 1;
      const cls = isBest ? 'best' : (isWorst ? 'worst' : '');
      const tag = isBest ? '<span class="best-tag">LOW</span>' : (isWorst && gap > 0 ? '<span class="worst-tag">HIGH</span>' : '');
      html += `<div class="books-row ${cls}">
        <span class="book-name">${esc(bookDisplayName(d.book))}</span>
        <span class="book-line">O/U ${d.point}</span>
        <span class="book-odds">O(${d.overP > 0 ? '+' : ''}${d.overP}) U(${d.underP > 0 ? '+' : ''}${d.underP})</span>
        ${tag}
      </div>`;
    });
    if (gap > 0) {
      html += `<div class="books-gap ${gap >= 2 ? 'disagree' : ''}">Gap: ${gap.toFixed(1)} pts${gap >= 2 ? ' | BOOKS DISAGREE' : ''}</div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function renderGameCard(game, screenerHits, oddsGame, cardIdx) {
  const matchup = game.matchup || '?';
  const grade = game.grade || 'TBD';
  // Store game data for EV button
  const awayName = game.away || matchup.split(' @ ')[0] || '';
  const homeName = game.home || matchup.split(' @ ')[1] || '';
  const evKey = (awayName + '_at_' + homeName).replace(/\s+/g, '_');
  _djGameDataMap[evKey] = game;
  const tags = game.tags || [];
  const edgePick = game.edge_pick || {};
  const flags = game.flags || [];
  const peterZone = game.peter_zone || '';
  const edgeSummary = game.edge_summary || '';
  const injuryImpact = game.injury_impact || '';
  const restSchedule = game.rest_schedule || '';
  const edgeQuestion = game.edge_question || '';
  const trends = game.trends || [];

  // Format game time
  const ct = game.commence_time || game.commence || game.time || '';
  let timeStr = '';
  if (ct) {
    const d = new Date(ct);
    timeStr = d.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Los_Angeles' }) + ' PST';
  }

  // Basic lines for header
  const spread = game.spread || game.home_spread || '';
  const total = game.total || '';
  const awayMl = game.away_ml || '';
  const homeMl = game.home_ml || '';
  const lineStr = [
    spread ? `Spread: ${spread > 0 ? '+' : ''}${spread}` : '',
    total ? `Total: ${total}` : '',
    (awayMl && homeMl) ? `ML: ${awayMl > 0 ? '+' : ''}${awayMl}/${homeMl > 0 ? '+' : ''}${homeMl}` : ''
  ].filter(Boolean).join(' | ');

  let html = `<div class="game-card">`;

  // Top row: matchup + grade + re-analyze
  html += `<div class="game-top">
    <div class="matchup-info">
      <div class="matchup-teams">${esc(matchup)}</div>
      <div class="matchup-meta">${timeStr ? esc(timeStr) : ''}${lineStr ? ' &mdash; ' + esc(lineStr) : ''}</div>
    </div>
    <div class="card-actions">
      <div class="grade-badge ${gradeClass(grade)}">${esc(grade)}</div>
      ${renderDJBadge(matchup)}
      <button class="reanalyze-btn small" onclick="reanalyzeGame('${currentSport}')" title="Re-analyze this game">RE-ANALYZE</button>
    </div>
  </div>`;

  // Tags
  if (tags.length > 0) {
    html += `<div class="flags-row">${tags.map(t => `<span class="flag-tag ${flagClass(t)}">${esc(t)}</span>`).join('')}</div>`;
  }

  // Edge pick
  if (edgePick.team && edgePick.team !== 'PASS') {
    html += `<div class="edge-pick-row">
      <div class="edge-pick-label">Edge Pick</div>
      <div class="edge-pick-text">${esc(edgePick.team)} &mdash; ${esc(edgePick.bet_type || '')} ${esc(edgePick.line || '')}</div>
      ${edgePick.reasoning ? `<div class="edge-pick-reasoning">${esc(edgePick.reasoning)}</div>` : ''}
    </div>`;
  }

  // Matrix scores (the 15-variable grading system)
  const matrixScores = game.matrix_scores || {};
  const compositeScore = game.composite_score || null;
  const analyzedBy = game.analyzed_by || game.model || '';
  const matrixKeys = Object.keys(matrixScores);

  if (matrixKeys.length > 0) {
    html += `<div class="analysis-block">
      <div class="ab-label">Scoring Matrix${analyzedBy ? ` — analyzed by ${esc(analyzedBy)}` : ''}${compositeScore ? ` — Composite: ${compositeScore}/10` : ''}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px;margin-top:6px;">`;
    matrixKeys.forEach(key => {
      const val = matrixScores[key];
      const score = typeof val === 'object' ? (val.score || val.value || val) : val;
      const numScore = parseFloat(score) || 0;
      const barColor = numScore >= 7 ? 'var(--green)' : numScore >= 5 ? 'var(--yellow)' : 'var(--red)';
      const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      html += `<div style="background:rgba(255,255,255,0.03);border-radius:4px;padding:4px 6px;font-size:0.65rem;">
        <div style="color:var(--text-dim);margin-bottom:2px;">${esc(label)}</div>
        <div style="display:flex;align-items:center;gap:4px;">
          <div style="flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;">
            <div style="width:${numScore * 10}%;height:100%;background:${barColor};border-radius:2px;"></div>
          </div>
          <span style="font-weight:700;color:${barColor};min-width:20px;text-align:right;">${numScore}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Full analysis breakdown
  const hasAnalysis = edgeQuestion || edgeSummary || injuryImpact || restSchedule || trends.length > 0;
  if (hasAnalysis) {
    html += `<div class="analysis-block">
      <div class="ab-label">Edge Analysis</div>`;

    if (edgeQuestion && edgeQuestion !== 'No clear edge identified.') {
      html += `<div class="ab-edge">${esc(edgeQuestion)}</div>`;
    }
    if (edgeSummary) {
      html += `<div class="ab-row"><strong>Edge:</strong> ${esc(edgeSummary)}</div>`;
    }
    if (injuryImpact && injuryImpact !== 'N/A') {
      html += `<div class="ab-row"><strong>Injuries:</strong> ${esc(injuryImpact)}</div>`;
    }
    if (restSchedule && restSchedule !== 'N/A') {
      html += `<div class="ab-row"><strong>Schedule:</strong> ${esc(restSchedule)}</div>`;
    }
    if (trends.length > 0) {
      html += `<div class="ab-row"><strong>Trends:</strong> ${trends.map(t => esc(t)).join(' | ')}</div>`;
    }
    html += `</div>`;
  }

  // Flags
  if (flags.length > 0) {
    html += `<div class="section-label">Flags</div>
      <div class="gotcha-text" style="font-size:0.72rem;">${flags.map(f => `<div>&#8226; ${esc(f)}</div>`).join('')}</div>`;
  }

  // Peter Zone
  if (peterZone) {
    html += `<div class="peter-zone">${esc(peterZone)}</div>`;
  }

  // Multi-book line comparison
  html += renderMultiBookCard(oddsGame, cardIdx);

  // Screener hits
  if (screenerHits.length > 0) {
    html += `<div class="screener-section">
      <div class="section-label">Screener Hits</div>`;
    screenerHits.forEach(hit => {
      const player = hit.player || '?';
      const stat = hit.stat || '';
      const line = hit.line ?? '';
      const floor = hit.floor ?? '';
      const verdict = hit.verdict || hit.signal || 'EDGE';
      html += `<div class="screener-hit">
        <span class="screener-player">${esc(player)}</span>
        <span class="screener-stat">${esc(stat)} line ${line} / floor ${floor}</span>
        <span class="screener-verdict">${esc(verdict)}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // EV Button
  html += `<div style="padding:0 8px 8px;"><button class="ev-btn" data-evkey="${evKey}" onclick="event.stopPropagation();createExpectedValue(this,'${evKey}')" style="width:100%;padding:10px;background:rgba(212,160,23,0.12);border:1px solid rgba(212,160,23,0.3);border-radius:8px;color:#D4A017;font-size:12px;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;">&#9889; Create Expected Value</button><div class="ev-panel" style="display:none;"></div></div>`;

  html += `</div>`;
  return html;
}

function esc(s) {
  if (s === null || s === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// === DEFAULT MATRIX CARD ===
function renderDefaultMatrixCard(sport) {
  const matrix = DEFAULT_MATRICES[sport];
  if (!matrix) return '';
  const totalWeight = matrix.reduce((s, v) => s + v[1], 0);
  const maxScore = totalWeight * 10;

  let html = `<div class="default-matrix-card">
    <div class="dmc-header">
      <div class="dmc-title">${SPORT_LABELS[sport] || sport.toUpperCase()} Scoring Matrix</div>
      <div class="dmc-meta">${matrix.length} variables | Max ${maxScore} pts | Built by Edge Crew</div>
    </div>
    <div class="dmc-grid">`;
  matrix.forEach(([key, weight]) => {
    const wClass = weight >= 9 ? 'dmc-w9' : weight >= 7 ? 'dmc-w7' : weight >= 5 ? 'dmc-w5' : 'dmc-w4';
    const label = key.replace(/_/g, ' ');
    html += `<div class="dmc-var"><span class="dmc-key">${esc(label)}</span><span class="dmc-weight ${wClass}">${weight}</span></div>`;
  });
  html += `</div>
    <div style="margin-top:8px;font-size:0.65rem;color:var(--text-dim);line-height:1.6;">
      Each game scored 1-10 per variable. Weight x Score = weighted total. Composite = total / ${maxScore} x 10.
      <strong style="color:var(--accent-glow);">Talk to your agent to customize these weights.</strong>
    </div>
  </div>`;
  return html;
}

function renderDJBadge(matchup) {
  if (!currentSport || !djAnalysis[currentSport]) return '';
  const djGames = djAnalysis[currentSport].games || [];
  const djGame = djGames.find(g => g.matchup === matchup);
  if (!djGame) return '';

  const defData = analysisCache[currentSport] || {};
  const defGames = defData.games || [];
  const defGame = defGames.find(g => g.matchup === matchup);
  const defScore = defGame ? (defGame.composite_score || 0) : 0;
  const djScore = djGame.composite_score || 0;
  const diff = (djScore - defScore).toFixed(1);
  const cls = diff > 0 ? 'dj-delta-up' : (diff < 0 ? 'dj-delta-down' : 'dj-delta-same');
  const arrow = diff > 0 ? '\u2191' : (diff < 0 ? '\u2193' : '=');
  return `<span class="dj-result-badge ${cls}">DJ: ${esc(djGame.grade)} (${djScore.toFixed(1)}) ${arrow}${Math.abs(diff)}</span>`;
}

// === VOICE — Gold Standard (Casa Companion pattern) ===
let waitToRespondMode = false;
let voiceInteractionMode = 'freeflow';
let currentEagerness = 'medium';
let aiTranscriptBuffer = '';
let aiTranscriptEl = null;

function startVoiceWithMode(mode) {
  if (voiceActive) { endVoice(); return; }
  const btnConv = document.getElementById('btnConversation');
  const btnTurns = document.getElementById('btnTakeTurns');
  const btn = mode === 'turnbased' ? btnTurns : btnConv;
  if (btn && btn.disabled) return;
  if (btnConv) btnConv.disabled = true;
  if (btnTurns) btnTurns.disabled = true;
  setTimeout(() => { if (btnConv) btnConv.disabled = false; if (btnTurns) btnTurns.disabled = false; }, 1000);

  voiceInteractionMode = mode;
  waitToRespondMode = (mode === 'turnbased');
  startVoiceMode();
}

async function startVoiceMode() {
  const overlay = document.getElementById('voiceConnecting');
  const connectText = document.getElementById('voiceConnectText');
  if (overlay) overlay.classList.add('visible');
  if (connectText) connectText.textContent = 'Connecting to DJ\'s Edge Agent...';

  try {
    // 1. Token with user_id
    const tokenResp = await fetch('/api/voice/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ user_id: AGENT_USER_ID })
    });
    if (!tokenResp.ok) throw new Error('Failed to get voice token');
    const tokenData = await tokenResp.json();

    // 2. Peer connection
    rtcPC = new RTCPeerConnection();

    // 3. Audio output
    const audioEl = document.getElementById('rtcAudio');
    rtcPC.ontrack = event => {
      if (event.streams.length > 0) audioEl.srcObject = event.streams[0];
    };

    // 4. Mic
    rtcMicStream = await navigator.mediaDevices.getUserMedia({
      audio: {noiseSuppression:true, echoCancellation:true, autoGainControl:true, channelCount:1}
    });
    rtcPC.addTrack(rtcMicStream.getAudioTracks()[0]);

    // 5. Data channel
    rtcDC = rtcPC.createDataChannel('realtime-channel');

    // 6. Offer + SDP exchange
    const offer = await rtcPC.createOffer();
    await rtcPC.setLocalDescription(offer);

    const sdpResp = await fetch('/api/voice/sdp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sdp: offer.sdp, token: tokenData.token})
    });
    if (!sdpResp.ok) throw new Error('SDP exchange failed');
    const answerSdp = await sdpResp.text();
    await rtcPC.setRemoteDescription({type: 'answer', sdp: answerSdp});

    // 7. On data channel open — configure session
    rtcDC.onopen = () => {
      if (overlay) overlay.classList.remove('visible');

      // Configure VAD with mode settings
      rtcDC.send(JSON.stringify({
        type: 'session.update',
        session: {
          input_audio_transcription: {model: 'whisper-1'},
          turn_detection: {
            type: 'semantic_vad',
            create_response: true,
            interrupt_response: !waitToRespondMode,
            eagerness: currentEagerness
          }
        }
      }));

      voiceActive = true;
      updateVoiceUI(true);

      // Open transcript area
      document.getElementById('voiceTranscript').classList.add('open');

      // Set status
      const statusText = document.getElementById('voiceStatusText');
      if (statusText) statusText.textContent = waitToRespondMode
        ? 'Take Turns — listen, then speak'
        : 'Conversation mode. Just talk.';

      // Greeting — onboarding-aware
      const name = agentProfile ? agentProfile.display_name : 'DJ';
      const sport = currentSport ? currentSport.toUpperCase() : 'the slate';
      const hasCustomizations = agentProfile && agentProfile.matrices && Object.keys(agentProfile.matrices).some(s => {
        const m = agentProfile.matrices[s];
        return (m.overrides && Object.keys(m.overrides).length) || (m.custom_vars && m.custom_vars.length) || (m.excluded && m.excluded.length);
      });

      if (hasCustomizations) {
        rtcDC.send(JSON.stringify({
          type: 'response.create',
          response: {
            instructions: `Greet ${name} by name. You're their Edge Agent. Current sport is ${sport}. Mention they have custom weights saved. Ask what they want to do — adjust weights, analyze the slate their way, or explore props. 2-3 sentences, be sharp.`
          }
        }));
      } else {
        rtcDC.send(JSON.stringify({
          type: 'response.create',
          response: {
            instructions: `Greet ${name} by name. You're their personal Edge Agent. Tell them briefly: "We grade every game using a 20-variable weighted matrix — injuries, rest, sharp money, matchups. You can customize the weights to match how YOU see the game." Then ask: "Want me to walk you through the ${sport} variables so you can build your own grading sheet? Or I can show you what's on the slate tonight." Keep it to 3-4 sentences. Be welcoming but sharp.`
          }
        }));
      }
    };

    // 8. Handle all RTC events — gold standard
    rtcDC.onmessage = event => {
      const msg = JSON.parse(event.data);
      handleRTCEvent(msg);
    };

    rtcDC.onclose = () => endVoice();
    rtcPC.oniceconnectionstatechange = () => {
      if (rtcPC && (rtcPC.iceConnectionState === 'failed' || rtcPC.iceConnectionState === 'disconnected')) {
        endVoice();
        showAgentToast('Voice connection lost');
      }
    };

  } catch(e) {
    if (overlay) overlay.classList.remove('visible');
    showAgentToast('Voice error: ' + e.message);
    endVoice();
  }
}

function handleRTCEvent(msg) {
  const statusRow = document.getElementById('voiceStatusRow');
  const statusText = document.getElementById('voiceStatusText');
  const transcript = document.getElementById('voiceTranscript');

  switch (msg.type) {
    case 'input_audio_buffer.speech_started':
      setVoiceState('listening');
      aiTranscriptBuffer = '';
      aiTranscriptEl = null;
      break;

    case 'input_audio_buffer.speech_stopped':
      setVoiceState('thinking');
      break;

    case 'conversation.item.input_audio_transcription.completed':
      if (msg.transcript && msg.transcript.trim()) {
        addVoiceTranscript('user', msg.transcript.trim());
      }
      break;

    case 'response.output_audio_transcript.delta':
      // Build AI response word-by-word
      if (!aiTranscriptEl) {
        aiTranscriptBuffer = '';
        aiTranscriptEl = document.createElement('p');
        aiTranscriptEl.className = 'vt-agent';
        if (transcript) transcript.appendChild(aiTranscriptEl);
      }
      aiTranscriptBuffer += msg.delta;
      aiTranscriptEl.textContent = aiTranscriptBuffer;
      if (transcript) transcript.scrollTop = transcript.scrollHeight;
      break;

    case 'response.output_audio_transcript.done':
      aiTranscriptEl = null;
      aiTranscriptBuffer = '';
      break;

    case 'output_audio_buffer.started':
      setVoiceState('speaking');
      if (waitToRespondMode) muteRtcMic();
      break;

    case 'output_audio_buffer.stopped':
      setVoiceState('idle');
      if (waitToRespondMode) unmuteRtcMic();
      if (voiceActive && statusText) {
        statusText.textContent = waitToRespondMode
          ? 'Your turn \u2014 speak now'
          : 'Conversation mode. Just talk.';
      }
      break;

    case 'response.function_call_arguments.done':
      handleAgentFunctionCall(msg);
      break;

    case 'error':
      console.error('Realtime API error:', msg.error);
      showAgentToast('Voice error: ' + (msg.error?.message || 'Unknown'));
      break;
  }
}

function setVoiceState(state) {
  const statusRow = document.getElementById('voiceStatusRow');
  const statusText = document.getElementById('voiceStatusText');
  if (!statusRow) return;

  statusRow.className = 'voice-status-row active state-' + state;
  switch (state) {
    case 'listening':
      statusText.textContent = 'Listening...';
      break;
    case 'thinking':
      statusText.textContent = 'Thinking...';
      break;
    case 'speaking':
      statusText.textContent = 'Speaking...';
      break;
    case 'idle':
      statusText.textContent = waitToRespondMode
        ? 'Your turn \u2014 speak now'
        : 'Conversation mode. Just talk.';
      break;
  }
}

function addVoiceTranscript(role, text) {
  const transcript = document.getElementById('voiceTranscript');
  if (!transcript) return;
  const p = document.createElement('p');
  p.className = role === 'user' ? 'vt-user' : 'vt-agent';
  p.textContent = text;
  transcript.appendChild(p);
  transcript.scrollTop = transcript.scrollHeight;
}

async function handleAgentFunctionCall(msg) {
  const fnName = msg.name;
  let args = {};
  try { args = JSON.parse(msg.arguments || '{}'); } catch(e) {}
  const callId = msg.call_id;

  // Default sport to current if not specified
  if (!args.sport && currentSport) args.sport = currentSport;

  try {
    const resp = await fetch('/api/agent/' + AGENT_USER_ID + '/action', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: fnName, args: args })
    });
    const result = await resp.json();

    // Send result back to realtime session
    if (rtcDC && rtcDC.readyState === 'open') {
      rtcDC.send(JSON.stringify({
        type: 'conversation.item.create',
        item: { type: 'function_call_output', call_id: callId, output: JSON.stringify(result) }
      }));
      rtcDC.send(JSON.stringify({ type: 'response.create' }));
    }

    // Refresh matrix + UI
    if (result.success) {
      showAgentToast(result.message || 'Updated');
      const matrixResp = await fetch('/api/agent/' + AGENT_USER_ID + '/matrix/' + (args.sport || currentSport));
      if (matrixResp.ok) agentMatrix[args.sport || currentSport] = await matrixResp.json();
      if (currentSport) await loadSport(currentSport);
    }
  } catch(e) {
    showAgentToast('Action error: ' + e.message);
  }
}

function updateMicSensitivity(level) {
  currentEagerness = level;
  if (rtcDC && rtcDC.readyState === 'open') {
    rtcDC.send(JSON.stringify({
      type: 'session.update',
      session: {
        turn_detection: {
          type: 'semantic_vad',
          create_response: true,
          interrupt_response: !waitToRespondMode,
          eagerness: level
        }
      }
    }));
  }
}

function muteRtcMic() {
  if (rtcMicStream) rtcMicStream.getAudioTracks().forEach(t => { t.enabled = false; });
}
function unmuteRtcMic() {
  if (rtcMicStream) rtcMicStream.getAudioTracks().forEach(t => { t.enabled = true; });
}

function endVoice() {
  voiceActive = false;
  waitToRespondMode = false;
  voiceInteractionMode = 'freeflow';
  if (rtcDC) { try { rtcDC.close(); } catch(e){} rtcDC = null; }
  if (rtcPC) { try { rtcPC.close(); } catch(e){} rtcPC = null; }
  if (rtcMicStream) { rtcMicStream.getTracks().forEach(t => t.stop()); rtcMicStream = null; }
  const audioEl = document.getElementById('rtcAudio');
  if (audioEl && audioEl.srcObject) {
    audioEl.srcObject.getTracks().forEach(t => t.stop());
    audioEl.srcObject = null;
  }
  updateVoiceUI(false);
  document.getElementById('voiceConnecting').classList.remove('visible');
  document.getElementById('voiceTranscript').classList.remove('open');
}

function updateVoiceUI(active) {
  const btnConv = document.getElementById('btnConversation');
  const btnTurns = document.getElementById('btnTakeTurns');
  const btnEnd = document.getElementById('btnEndVoice');
  const micBtn = document.getElementById('voiceMicBtn');
  const statusRow = document.getElementById('voiceStatusRow');
  const micSens = document.getElementById('micSensitivity');

  if (active) {
    const activeBtn = voiceInteractionMode === 'turnbased' ? btnTurns : btnConv;
    if (activeBtn) activeBtn.classList.add('active');
    if (btnEnd) btnEnd.classList.add('visible');
    if (micBtn) micBtn.classList.add('listening');
    if (statusRow) statusRow.classList.add('active');
    if (micSens) micSens.classList.add('visible');
  } else {
    if (btnConv) btnConv.classList.remove('active');
    if (btnTurns) btnTurns.classList.remove('active');
    if (btnEnd) btnEnd.classList.remove('visible');
    if (micBtn) micBtn.classList.remove('listening');
    if (statusRow) { statusRow.classList.remove('active'); statusRow.className = 'voice-status-row'; }
    if (micSens) micSens.classList.remove('visible');
  }
}

// ===== EV CARD ANALYSIS =====
function createExpectedValue(btn, evKey) {
  var g = _djGameDataMap[evKey];
  if (!g) { alert('Game data not found'); return; }

  btn.disabled = true;
  btn.innerHTML = '&#9889; Analyzing...';
  btn.style.opacity = '0.6';

  var panel = btn.parentElement.querySelector('.ev-panel');
  var awayAbbr = (g.away || g.matchup.split(' @ ')[0] || '').split(' ').pop();
  var homeAbbr = (g.home || g.matchup.split(' @ ')[1] || '').split(' ').pop();

  var payload = {
    sport: (currentSport || 'nba').toLowerCase(),
    away_team: g.away || g.matchup.split(' @ ')[0] || '',
    home_team: g.home || g.matchup.split(' @ ')[1] || '',
    spread_away: g.away_spread || -(g.spread || 0),
    spread_home: g.spread || g.home_spread || 0,
    ml_away: g.away_ml || 0,
    ml_home: g.home_ml || 0,
    over_under: g.total || 0,
    matrix_score: g.grade || '--',
    signals: g.tags || [],
    chain_bonus: g.chain_bonus || 0,
    the_play: g.peter_zone || '',
    game_time: g.commence_time || g.time || ''
  };

  fetch('/api/ev/card', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(r) { return r.json(); })
  .then(function(ev) {
    renderEVPanel(panel, ev, g, awayAbbr, homeAbbr);
    btn.innerHTML = '&#9889; Refresh EV';
    btn.disabled = false;
    btn.style.opacity = '1';
  })
  .catch(function(err) {
    panel.style.display = 'block';
    panel.innerHTML = '<div style="padding:12px;color:#EF4444;font-size:12px;">EV engines timed out. Try again.</div>';
    btn.innerHTML = '&#9889; Create Expected Value';
    btn.disabled = false;
    btn.style.opacity = '1';
  });
}

function renderEVPanel(panel, ev, g, awayAbbr, homeAbbr) {
  panel.style.display = 'block';
  var matchup = awayAbbr + ' @ ' + homeAbbr;

  if (ev.error) {
    panel.innerHTML = '<div style="padding:12px;color:#EF4444;font-size:12px;">' + ev.error + '</div>';
    return;
  }

  if (ev.raw_text) {
    panel.innerHTML = '<div style="padding:12px;color:#B0BEC5;font-size:11px;white-space:pre-wrap;">' + ev.raw_text + '</div>';
    return;
  }

  var html = '<div style="background:rgba(212,160,23,0.06);border:1px solid rgba(212,160,23,0.2);border-radius:8px;padding:12px;margin-top:8px;">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
  html += '<span style="font-size:12px;font-weight:800;color:#D4A017;letter-spacing:0.5px;">&#9889; EV ANALYSIS</span>';
  html += '<span onclick="collapseEVPanel(this)" style="cursor:pointer;color:rgba(255,255,255,0.3);font-size:14px;padding:2px 6px;">&times;</span>';
  html += '</div>';

  // Spread Call
  if (ev.spread_call) {
    html += '<div style="margin-bottom:10px;">';
    html += '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:3px;">SPREAD CALL</div>';
    html += '<div style="font-size:12px;color:#fff;font-weight:600;">' + (ev.spread_call.pick || '') + '</div>';
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;">' + (ev.spread_call.reasoning || '') + '</div>';
    html += '</div>';
  }

  // Top Props
  if (ev.top_props && ev.top_props.length > 0) {
    html += '<div style="margin-bottom:10px;">';
    html += '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:3px;">TOP PROPS (Mathurin Test)</div>';
    ev.top_props.forEach(function(p) {
      var verdictColor = p.verdict === 'MISPRICED' ? '#10B981' : (p.verdict === 'CLOSE' ? '#FBB024' : '#B0BEC5');
      html += '<div style="font-size:11px;color:#fff;margin-bottom:4px;">';
      html += '<strong>' + (p.player || '') + '</strong> ' + (p.prop || '');
      html += ' <span style="color:' + verdictColor + ';font-weight:700;font-size:10px;">' + (p.verdict || '') + '</span>';
      if (p.l5_floor !== undefined && p.line !== undefined) {
        html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);">L5 floor: ' + p.l5_floor + ' | Line: ' + p.line + ' | Gap: ' + (p.gap > 0 ? '+' : '') + p.gap + '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:10px;">No mispriced props found on this slate.</div>';
  }

  // Book Discrepancy
  if (ev.book_discrepancy) {
    html += '<div style="margin-bottom:10px;">';
    html += '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:3px;">BOOK DISCREPANCY</div>';
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.5);">' + ev.book_discrepancy + '</div>';
    html += '</div>';
  }

  // Trap Check
  if (ev.trap_check) {
    html += '<div style="margin-bottom:10px;">';
    html += '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:3px;">TRAP CHECK</div>';
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.5);">' + ev.trap_check + '</div>';
    html += '</div>';
  }

  // Lock Suggestions
  if (ev.lock_suggestions && ev.lock_suggestions.length > 0) {
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">';
    ev.lock_suggestions.forEach(function(lock) {
      html += '<button onclick="event.stopPropagation();" style="padding:6px 12px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);border-radius:6px;color:#10B981;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;">Lock ' + (lock.selection || '') + '</button>';
    });
    html += '</div>';
  }

  // Engine stats
  if (ev._engine_data) {
    var ed = ev._engine_data;
    html += '<div style="font-size:9px;color:rgba(255,255,255,0.15);margin-top:8px;">Engines: ' + ed.screener_count + ' props screened, ' + ed.disc_count + ' discrepancies, ' + ed.gap_count + ' gap props</div>';
  }

  html += '</div>';
  panel.innerHTML = html;
}

function collapseEVPanel(closeBtn) {
  var panel = closeBtn.closest('.ev-panel');
  if (panel) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    var evBtn = panel.parentElement.querySelector('.ev-btn');
    if (evBtn) evBtn.innerHTML = '&#9889; Create Expected Value';
  }
}

init();
</script>
</body>
</html>
