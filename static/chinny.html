<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinny — NHL Edge</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0a0a0f;
    color:#fff;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    min-height:100vh;
}
a { color:inherit; text-decoration:none; }

/* ── HEADER ── */
.ch-header {
    padding:20px 24px 0;
    display:flex;
    align-items:center;
    justify-content:space-between;
}
.ch-title {
    font-size:22px;
    font-weight:900;
    color:#10B981;
}
.ch-subtitle {
    font-size:12px;
    color:rgba(255,255,255,0.35);
    font-weight:400;
}
.ch-back {
    font-size:12px;
    color:rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:6px;
    padding:6px 14px;
    cursor:pointer;
    transition:background 0.2s;
}
.ch-back:hover { background:rgba(255,255,255,0.1); }

/* ── TABS ── */
.ch-tabs {
    display:flex;
    gap:0;
    margin:16px 24px 0;
    border-bottom:1px solid rgba(255,255,255,0.08);
}
.ch-tab {
    padding:10px 24px;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.5px;
    color:rgba(255,255,255,0.4);
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:all 0.2s;
}
.ch-tab:hover { color:rgba(255,255,255,0.7); }
.ch-tab.active {
    color:#10B981;
    border-bottom-color:#10B981;
}

/* ── CONTENT AREA ── */
.ch-content {
    padding:16px 24px 40px;
}
.ch-panel { display:none; }
.ch-panel.active { display:block; }

/* ── STATS BAR ── */
.ch-stats {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:16px;
}
.ch-stat {
    border-radius:8px;
    padding:8px 14px;
}

/* ── GAME CARDS ── */
.ch-card {
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:16px;
    margin-bottom:14px;
}
.ch-card-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    padding-bottom:10px;
    border-bottom:1px solid rgba(255,255,255,0.06);
}
.ch-pipeline {
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:8px;
    scrollbar-width:thin;
    -webkit-overflow-scrolling:touch;
}
.ch-step {
    min-width:170px;
    flex-shrink:0;
    border-radius:10px;
    padding:10px;
}
.ch-step-label {
    font-size:9px;
    font-weight:800;
    letter-spacing:1px;
    margin-bottom:6px;
}

/* ── MATRIX TAB ── */
.ch-matrix-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}
@media (max-width:768px) {
    .ch-matrix-grid { grid-template-columns:1fr; }
    .ch-tabs { margin:16px 12px 0; }
    .ch-content { padding:12px 12px 40px; }
    .ch-header { padding:16px 12px 0; }
}
.ch-matrix-panel {
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:16px;
}
.ch-matrix-title {
    font-size:14px;
    font-weight:800;
    letter-spacing:0.5px;
    margin-bottom:12px;
    padding-bottom:8px;
    border-bottom:1px solid rgba(255,255,255,0.06);
}
.ch-var-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,0.03);
    gap:8px;
}
.ch-var-name {
    font-size:12px;
    color:rgba(255,255,255,0.7);
    font-weight:600;
    flex:1;
    min-width:0;
    text-transform:capitalize;
}
.ch-var-desc {
    font-size:10px;
    color:rgba(255,255,255,0.3);
    flex:2;
    min-width:0;
}
.ch-var-weight {
    font-size:14px;
    font-weight:800;
    width:36px;
    text-align:center;
    flex-shrink:0;
}
.ch-weight-input {
    width:52px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:6px;
    color:#fff;
    font-size:14px;
    font-weight:700;
    text-align:center;
    padding:4px 6px;
    flex-shrink:0;
    outline:none;
    transition:border-color 0.2s, background 0.2s;
}
.ch-weight-input:focus {
    border-color:#10B981;
}
.ch-weight-input.higher {
    border-color:#10B981;
    background:rgba(16,185,129,0.1);
    color:#10B981;
}
.ch-weight-input.lower {
    border-color:#ef4444;
    background:rgba(239,68,68,0.1);
    color:#ef4444;
}
.ch-weight-input.same {
    border-color:rgba(255,255,255,0.15);
    color:#fff;
}
.ch-total-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0 0;
    margin-top:6px;
    border-top:2px solid rgba(255,255,255,0.1);
}
.ch-save-btn {
    background:rgba(16,185,129,0.15);
    border:1px solid rgba(16,185,129,0.4);
    color:#10B981;
    font-size:14px;
    font-weight:800;
    padding:10px 28px;
    border-radius:8px;
    cursor:pointer;
    transition:all 0.2s;
    margin-top:16px;
    width:100%;
}
.ch-save-btn:hover {
    background:rgba(16,185,129,0.25);
}
.ch-save-btn:disabled {
    opacity:0.5;
    cursor:not-allowed;
}
.ch-save-status {
    font-size:12px;
    text-align:center;
    margin-top:8px;
    min-height:18px;
}

/* ── DETAIL EXPAND ── */
.ch-detail {
    display:none;
    margin-top:10px;
    border-top:1px solid rgba(255,255,255,0.06);
    padding-top:10px;
}
.ch-expand-hint {
    text-align:center;
    margin-top:6px;
    cursor:pointer;
}
.ch-expand-hint span {
    font-size:10px;
    color:rgba(255,255,255,0.25);
}

/* ── LOADING ── */
.ch-loading {
    color:rgba(255,255,255,0.3);
    font-style:italic;
    text-align:center;
    padding:40px;
}

/* Hide number input spinners */
.ch-weight-input::-webkit-outer-spin-button,
.ch-weight-input::-webkit-inner-spin-button {
    -webkit-appearance:none;
    margin:0;
}
.ch-weight-input[type=number] {
    -moz-appearance:textfield;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="ch-header">
    <div>
        <div class="ch-title">Chinny — NHL Edge</div>
        <div class="ch-subtitle">Hockey specialist agent</div>
    </div>
    <a href="/" class="ch-back">Back to Edge Crew</a>
</div>

<!-- TABS -->
<div class="ch-tabs">
    <div class="ch-tab active" onclick="switchTab('games')">NHL GAMES</div>
    <div class="ch-tab" onclick="switchTab('ncaab')">NCAAB</div>
    <div class="ch-tab" onclick="switchTab('matrix')">MY MATRIX</div>
    <div class="ch-tab" onclick="switchTab('board')">BOARD</div>
</div>

<!-- CONTENT -->
<div class="ch-content">

    <!-- TAB 1: NHL GAMES -->
    <div id="panel-games" class="ch-panel active">
        <div id="chStats" class="ch-stats"></div>
        <div id="chGames"><p class="ch-loading">Loading NHL pipeline data...</p></div>
    </div>

    <!-- TAB 2: NCAAB GAMES -->
    <div id="panel-ncaab" class="ch-panel">
        <div id="chNcaabStats" class="ch-stats"></div>
        <div id="chNcaabGames"><p class="ch-loading">Loading NCAAB pipeline data...</p></div>
    </div>

    <!-- TAB 3: MY MATRIX -->
    <div id="panel-matrix" class="ch-panel">
        <div id="chMatrix"><p class="ch-loading">Loading matrix data...</p></div>
    </div>

    <!-- TAB 4: BOARD -->
    <div id="panel-board" class="ch-panel">
        <div id="boardView" style="padding:16px;">
          <div id="boardContainer"></div>
          <div style="position:sticky;bottom:0;padding:12px 0;background:#0a0a0f;">
            <div style="display:flex;gap:8px;">
              <input id="boardInput" type="text" placeholder="Drop a message..." onkeydown="if(event.key==='Enter')postMessage()" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:10px 14px;color:#fff;font-size:13px;">
              <button onclick="postMessage()" style="background:#10B981;color:#000;border:none;border-radius:6px;padding:10px 18px;font-weight:800;font-size:12px;cursor:pointer;">POST</button>
            </div>
          </div>
        </div>
    </div>

</div>

<script>
/* ══════════════════════════════════════════
   CHINNY — NHL EDGE AGENT PAGE
   ══════════════════════════════════════════ */

var _nhlData = null;
var _officialMatrix = [];
var _chinnyMatrix = {};
var _matrixLoaded = false;

// ── TAB SWITCHING ──
var _ncaabLoaded = false;

function switchTab(tab) {
    document.querySelectorAll('.ch-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.ch-panel').forEach(function(p) { p.classList.remove('active'); });
    if (tab === 'games') {
        document.querySelector('.ch-tab:nth-child(1)').classList.add('active');
        document.getElementById('panel-games').classList.add('active');
    } else if (tab === 'ncaab') {
        document.querySelector('.ch-tab:nth-child(2)').classList.add('active');
        document.getElementById('panel-ncaab').classList.add('active');
        if (!_ncaabLoaded) loadNcaab();
    } else if (tab === 'matrix') {
        document.querySelector('.ch-tab:nth-child(3)').classList.add('active');
        document.getElementById('panel-matrix').classList.add('active');
        if (!_matrixLoaded) loadMatrix();
    } else if (tab === 'board') {
        document.querySelector('.ch-tab:nth-child(4)').classList.add('active');
        document.getElementById('panel-board').classList.add('active');
        loadBoard();
    }
}

function loadNcaab() {
    _ncaabLoaded = true;
    fetch('/api/profedge/ncaab')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error || !data.games || data.games.length === 0) {
                document.getElementById('chNcaabGames').innerHTML = '<p class="ch-loading">No NCAAB data. Run pipeline first.</p>';
                return;
            }
            // Reuse the same render functions but target NCAAB containers
            renderStatsTo(data, document.getElementById('chNcaabStats'));
            renderGamesTo(data.games, document.getElementById('chNcaabGames'), 'ncaab');
        })
        .catch(function(err) {
            document.getElementById('chNcaabGames').innerHTML = '<p style="color:#ef4444;text-align:center;padding:40px;">Error: ' + err.message + '</p>';
        });
}

// ── HELPERS ──
function gradeColor(grade) {
    if (!grade) return 'rgba(255,255,255,0.3)';
    if (grade.startsWith('A')) return '#10B981';
    if (grade === 'B+') return '#38BDF8';
    if (grade.startsWith('B')) return '#818cf8';
    if (grade.startsWith('C')) return '#d4a024';
    return '#ef4444';
}

function dimStyle(grade) {
    if (!grade) return 'opacity:0.4;';
    if (['C+','C','D','F'].indexOf(grade) !== -1) return 'opacity:0.45;';
    return '';
}

// ── STATS BAR ──
function renderStatsTo(data, bar) {
    var graded = data.graded || 0;
    var total = data.total || 0;
    var aPlus = 0, aGrade = 0, bPlus = 0;
    var pctSum = 0;
    (data.games || []).forEach(function(g) {
        if (!g.grade) return;
        var gr = g.grade.consensus_grade || '';
        if (gr === 'A+') aPlus++;
        else if (gr === 'A' || gr === 'A-') aGrade++;
        else if (gr === 'B+') bPlus++;
        var steps = 0;
        if (g.odds && (g.odds.spread_home || g.odds.total)) steps++;
        if (g.home_profile && g.home_profile.L5) steps++;
        if (g.grade && g.grade.profiles) {
            var pk = Object.keys(g.grade.profiles);
            if (pk.length > 0 && g.grade.profiles[pk[0]].variables) steps++;
            if (pk.length > 0 && g.grade.profiles[pk[0]].grade) steps++;
        }
        if (gr && gr !== '?' && gr !== 'N/A') steps++;
        pctSum += Math.round((steps / 5) * 100);
    });
    var avgPct = total > 0 ? Math.round(pctSum / total) : 0;
    var avgPctColor = avgPct === 100 ? '#10B981' : avgPct >= 60 ? '#F59E0B' : '#EF4444';
    bar.innerHTML =
        '<div class="ch-stat" style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);"><div style="font-size:10px;color:rgba(255,255,255,0.4);">Games</div><div style="font-size:18px;font-weight:800;color:#10B981;">' + total + '</div></div>' +
        '<div class="ch-stat" style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);"><div style="font-size:10px;color:rgba(255,255,255,0.4);">Graded</div><div style="font-size:18px;font-weight:800;color:#10B981;">' + graded + '</div></div>' +
        '<div class="ch-stat" style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);"><div style="font-size:10px;color:rgba(255,255,255,0.4);">A+</div><div style="font-size:18px;font-weight:800;color:#818cf8;">' + aPlus + '</div></div>' +
        '<div class="ch-stat" style="background:rgba(212,160,36,0.08);border:1px solid rgba(212,160,36,0.2);"><div style="font-size:10px;color:rgba(255,255,255,0.4);">A/A-</div><div style="font-size:18px;font-weight:800;color:#d4a024;">' + aGrade + '</div></div>' +
        '<div class="ch-stat" style="background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);"><div style="font-size:10px;color:rgba(255,255,255,0.4);">B+</div><div style="font-size:18px;font-weight:800;color:#38BDF8;">' + bPlus + '</div></div>' +
        '<div class="ch-stat" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);"><div style="font-size:10px;color:rgba(255,255,255,0.4);">Pipeline</div><div style="font-size:18px;font-weight:800;color:' + avgPctColor + ';">' + avgPct + '%</div></div>' +
        (data.matrix_count ? '<div class="ch-stat" style="background:rgba(212,160,36,0.08);border:1px solid rgba(212,160,36,0.2);"><div style="font-size:10px;color:rgba(255,255,255,0.4);">Matrix</div><div style="font-size:18px;font-weight:800;color:#d4a024;">' + data.matrix_count + ' vars</div></div>' : '') +
        (data.chain_count ? '<div class="ch-stat" style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);"><div style="font-size:10px;color:rgba(255,255,255,0.4);">Chains</div><div style="font-size:18px;font-weight:800;color:#10B981;">' + data.chain_count + '</div></div>' : '') +
        '<div class="ch-stat" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);"><div style="font-size:10px;color:rgba(255,255,255,0.4);">Date</div><div style="font-size:13px;font-weight:700;color:#fff;">' + (data.date || '?') + '</div></div>';
}

// ── RENDER GAME CARDS ──
function renderGamesTo(games, container, sport) {
    var _sport = sport || 'nhl';
    var html = '';
    games.forEach(function(g, idx) {
        var gr = g.grade;
        var grade = gr ? gr.consensus_grade : 'N/A';
        if (grade === '?') grade = 'N/A';
        var avg = gr ? gr.consensus_avg.toFixed(1) : '--';
        var pickSide = gr ? gr.pick_side : '';
        var pickTeam = pickSide === 'home' ? g.home : (pickSide === 'away' ? g.away : '');
        var dim = (grade === 'N/A') ? 'opacity:0.6;' : dimStyle(grade);
        var gColor = (grade === 'N/A') ? 'rgba(255,255,255,0.25)' : gradeColor(grade);

        // Percent complete
        var pctSteps = 0;
        if (g.odds && (g.odds.spread_home || g.odds.total)) pctSteps++;
        if (g.home_profile && g.home_profile.L5) pctSteps++;
        if (gr && gr.profiles) {
            var profKeys = Object.keys(gr.profiles);
            if (profKeys.length > 0 && gr.profiles[profKeys[0]].variables) pctSteps++;
            if (profKeys.length > 0 && gr.profiles[profKeys[0]].grade) pctSteps++;
        }
        if (gr && gr.consensus_grade && gr.consensus_grade !== '?' && gr.consensus_grade !== 'N/A') pctSteps++;
        var pctComplete = Math.round((pctSteps / 5) * 100);
        var pctColor = pctComplete === 100 ? '#10B981' : pctComplete >= 60 ? '#F59E0B' : '#EF4444';
        var pctRgb = pctComplete === 100 ? '16,185,129' : pctComplete >= 60 ? '245,158,11' : '239,68,68';

        // Time
        var timeStr = '';
        if (g.time) {
            try {
                var dt = new Date(g.time);
                timeStr = dt.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});
            } catch(e) { timeStr = g.time; }
        }

        html += '<div class="ch-card" style="' + dim + '">';

        // Matchup header
        html += '<div class="ch-card-header">';
        html += '<div style="font-size:16px;font-weight:800;color:#fff;">' + g.matchup + ' <span style="color:rgba(255,255,255,0.3);font-size:11px;font-weight:400;">' + timeStr + '</span></div>';
        html += '<div style="text-align:right;display:flex;align-items:center;gap:10px;">';
        html += '<span style="font-size:10px;font-weight:700;color:' + pctColor + ';background:rgba(' + pctRgb + ',0.12);padding:3px 8px;border-radius:10px;">' + pctComplete + '%</span>';
        html += '<span style="font-size:28px;font-weight:900;color:' + gColor + ';">' + grade + '</span>';
        html += '<span style="font-size:11px;color:rgba(255,255,255,0.4);">' + avg + '</span>';
        html += '</div></div>';

        // 5-step pipeline
        html += '<div class="ch-pipeline">';

        // STEP 1: DATA
        html += '<div class="ch-step" style="background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.2);">';
        html += '<div class="ch-step-label" style="color:#6366f1;">STEP 1 — DATA</div>';
        var odds = g.odds || {};
        var spH = odds.spread_home || odds.spread || '--';
        var ouVal = odds.total || odds.over_under || '--';
        var mlH = odds.ml_home || odds.home_ml || '--';
        var mlA = odds.ml_away || odds.away_ml || '--';
        html += '<div style="font-size:11px;color:rgba(255,255,255,0.6);line-height:1.6;">';
        var spreadLabel = _sport === 'nhl' ? 'PL' : 'Spread';
        html += spreadLabel + ': <span style="color:#fff;font-weight:700;">' + spH + '</span><br>';
        html += 'O/U: <span style="color:#fff;font-weight:700;">' + ouVal + '</span><br>';
        html += 'ML: <span style="color:#fff;font-weight:700;">' + mlH + ' / ' + mlA + '</span>';
        html += '</div></div>';

        // STEP 2: ENRICHMENT
        html += '<div class="ch-step" style="min-width:200px;background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.2);">';
        html += '<div class="ch-step-label" style="color:#38BDF8;">STEP 2 — ENRICHMENT</div>';
        ['away', 'home'].forEach(function(side) {
            var prof = g[side + '_profile'] || {};
            var abbrev = side === 'home' ? (g.home_abbrev || g.home) : (g.away_abbrev || g.away);
            var tag = side === 'home' ? 'HOME' : 'AWAY';
            html += '<div style="margin-bottom:4px;">';
            html += '<span style="font-size:10px;font-weight:700;color:#fff;">' + abbrev + '</span> <span style="font-size:9px;color:rgba(255,255,255,0.3);">' + tag + '</span><br>';
            var hasAny = false;
            if (prof.L5 && prof.L5 !== '0-0') { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">L5: ' + prof.L5 + ' | L10: ' + (prof.L10 || '--') + '</span><br>'; hasAny = true; }
            if (prof.ppg_L5) { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">GF/G: ' + prof.ppg_L5.toFixed(1) + ' | GA/G: ' + (prof.opp_ppg_L5 || 0).toFixed(1) + '</span><br>'; hasAny = true; }
            if (prof.save_pct) { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">SV%: ' + prof.save_pct + '</span><br>'; hasAny = true; }
            if (prof.goalie) { html += '<span style="font-size:10px;color:#38BDF8;">Goalie: ' + prof.goalie + '</span><br>'; hasAny = true; }
            if (prof.streak && prof.streak !== 'L0' && prof.streak !== 'W0') { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">Streak: ' + prof.streak + ' | Rest: ' + (prof.rest_days != null ? prof.rest_days + 'd' : '--') + '</span><br>'; hasAny = true; }
            else if (prof.rest_days != null) { html += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">Rest: ' + prof.rest_days + 'd</span><br>'; hasAny = true; }
            if (!hasAny) html += '<span style="font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;">Awaiting data</span><br>';
            var inj = (g.injuries && g.injuries[side]) || [];
            if (inj.length > 0) {
                var outCount = inj.filter(function(i){return i.status === 'OUT';}).length;
                html += '<span style="font-size:10px;color:#ef4444;">' + inj.length + ' injuries (' + outCount + ' OUT)</span>';
            }
            html += '</div>';
        });
        html += '</div>';

        // STEP 3: VARIABLES
        html += '<div class="ch-step" style="min-width:200px;background:rgba(212,160,36,0.06);border:1px solid rgba(212,160,36,0.2);">';
        html += '<div class="ch-step-label" style="color:#d4a024;">STEP 3 — VARIABLES</div>';
        if (gr && gr.profiles) {
            var firstProfile = gr.profiles[Object.keys(gr.profiles)[0]];
            if (firstProfile && firstProfile.variables) {
                var vars = firstProfile.variables;
                var varNames = Object.keys(vars);
                varNames.sort(function(a,b) { return (vars[b].score || 0) - (vars[a].score || 0); });
                var showVars = varNames.slice(0, 8);
                showVars.forEach(function(vname) {
                    var v = vars[vname];
                    var vs = v.score || 0;
                    var vc = vs >= 7 ? '#10B981' : (vs >= 5 ? '#d4a024' : '#ef4444');
                    html += '<div style="display:flex;justify-content:space-between;font-size:10px;padding:1px 0;">';
                    html += '<span style="color:rgba(255,255,255,0.5);">' + vname.replace(/_/g, ' ') + '</span>';
                    html += '<span style="color:' + vc + ';font-weight:700;">' + vs + '</span>';
                    html += '</div>';
                });
                if (varNames.length > 8) {
                    html += '<div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:2px;">+' + (varNames.length - 8) + ' more</div>';
                }
            } else {
                html += '<div style="font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;">No variables</div>';
            }
        } else {
            html += '<div style="font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;">Awaiting analysis</div>';
        }
        html += '</div>';

        // STEP 4: GRADERS
        html += '<div class="ch-step" style="min-width:220px;background:rgba(247,37,133,0.06);border:1px solid rgba(247,37,133,0.2);">';
        html += '<div class="ch-step-label" style="color:#F72585;">STEP 4 — GRADERS</div>';
        if (gr && gr.profiles) {
            var profileNames = Object.keys(gr.profiles);
            html += '<div style="display:grid;grid-template-columns:' + (profileNames.length > 1 ? '1fr 1fr' : '1fr') + ';gap:6px;">';
            profileNames.forEach(function(pname) {
                var p = gr.profiles[pname];
                var pc = pname === 'sintonia' ? '#F72585' : (pname === 'renzo' ? '#9B59B6' : (pname === 'peter' ? '#D4A017' : (pname === 'ai' ? '#00D4AA' : (pname === 'alyssa' ? '#41EAD4' : '#38BDF8'))));
                html += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px;text-align:center;">';
                html += '<div style="font-size:9px;font-weight:800;color:' + pc + ';letter-spacing:0.5px;text-transform:uppercase;">' + pname + '</div>';
                html += '<div style="font-size:24px;font-weight:900;color:' + gradeColor(p.grade) + ';line-height:1.2;">' + (p.grade || '?') + '</div>';
                html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);">' + (p.final || 0).toFixed(1) + '</div>';
                if (p.sizing) html += '<div style="font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px;">' + p.sizing + '</div>';
                html += '</div>';
            });
            html += '</div>';
            if (gr.peter_rules && gr.peter_rules.flags && gr.peter_rules.flags.length > 0) {
                html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;">';
                gr.peter_rules.flags.forEach(function(f) {
                    var fc = f.action === 'KILL' ? '#ef4444' : (f.action === 'BOOST' ? '#10B981' : '#d4a024');
                    html += '<span style="font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,0.04);border:1px solid ' + fc + ';color:' + fc + ';">' + f.action + '</span>';
                });
                html += '</div>';
            }
        } else {
            html += '<div style="font-size:24px;font-weight:900;color:rgba(255,255,255,0.15);text-align:center;padding:12px 0;">N/A</div>';
        }
        html += '</div>';

        // STEP 5: ENGINE
        html += '<div class="ch-step" style="min-width:180px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);text-align:center;display:flex;flex-direction:column;justify-content:center;">';
        html += '<div class="ch-step-label" style="color:#10B981;">STEP 5 — ENGINE</div>';
        html += '<div style="font-size:36px;font-weight:900;color:' + gColor + ';line-height:1;">' + grade + '</div>';
        html += '<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;">Score: ' + avg + '</div>';
        if (pickTeam && grade !== 'N/A') {
            var sizing = '';
            if (gr && gr.profiles && gr.profiles.sintonia) sizing = gr.profiles.sintonia.sizing || '';
            html += '<div style="margin-top:8px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#10B981;font-size:12px;font-weight:800;padding:6px 10px;border-radius:6px;">' + pickTeam + (sizing && sizing !== 'PASS' ? ' (' + sizing + ')' : '') + '</div>';
        }
        if (gr && gr.ev && gr.ev.ev_pct != null) {
            var evPct = gr.ev.ev_pct;
            var evColor = evPct > 0 ? '#10B981' : '#ef4444';
            html += '<div style="margin-top:4px;font-size:11px;font-weight:700;color:' + evColor + ';">EV: ' + (evPct > 0 ? '+' : '') + evPct.toFixed(1) + '%</div>';
        }
        if (g.race) {
            html += '<div style="margin-top:4px;font-size:10px;color:rgba(255,255,255,0.5);">Race: ' + g.race.home_score + '-' + g.race.away_score + '</div>';
            html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);">' + (g.race.confidence || '') + '</div>';
        }
        html += '<button onclick="event.stopPropagation();regradeGame(\'' + g.game_id + '\')" style="margin-top:8px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#10B981;font-size:10px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;">RE-GRADE</button>';
        html += '</div>';

        html += '</div>'; // end pipeline

        // Expandable detail
        html += '<div id="ch-detail-' + idx + '" class="ch-detail">';
        if (gr && gr.profiles) {
            html += '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
            Object.keys(gr.profiles).forEach(function(pname) {
                var p = gr.profiles[pname];
                var pc = pname === 'sintonia' ? '#F72585' : (pname === 'renzo' ? '#9B59B6' : (pname === 'peter' ? '#D4A017' : (pname === 'ai' ? '#00D4AA' : (pname === 'alyssa' ? '#41EAD4' : '#38BDF8'))));
                html += '<div style="flex:1;min-width:200px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px;">';
                html += '<div style="font-size:10px;color:' + pc + ';font-weight:700;text-transform:uppercase;margin-bottom:4px;">' + pname + ' — ALL VARIABLES</div>';
                if (p.variables) {
                    Object.keys(p.variables).forEach(function(vname) {
                        var v = p.variables[vname];
                        var vs = v.score || 0;
                        var vc = vs >= 7 ? '#10B981' : (vs >= 5 ? '#d4a024' : '#ef4444');
                        html += '<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.03);">';
                        html += '<span style="color:rgba(255,255,255,0.5);">' + vname.replace(/_/g, ' ') + '</span>';
                        html += '<span style="color:' + vc + ';font-weight:700;">' + vs + '/10</span>';
                        html += '</div>';
                    });
                }
                if (p.chains_fired && p.chains_fired.length > 0) {
                    html += '<div style="margin-top:4px;">';
                    p.chains_fired.forEach(function(c) {
                        html += '<span style="font-size:9px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10B981;padding:2px 5px;border-radius:3px;margin-right:3px;">&#9939; ' + c + '</span>';
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
            html += '</div>';
        }
        // Injuries detail
        html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">';
        ['away', 'home'].forEach(function(side) {
            var inj = (g.injuries && g.injuries[side]) || [];
            if (inj.length > 0) {
                var team = side === 'home' ? (g.home_abbrev || g.home) : (g.away_abbrev || g.away);
                html += '<div style="flex:1;min-width:200px;">';
                html += '<div style="font-size:10px;color:#ef4444;font-weight:700;margin-bottom:2px;">' + team + ' INJURIES</div>';
                inj.forEach(function(i) {
                    html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);">' + (i.status || '?') + ' — ' + i.player + ' (' + (i.pos || '?') + ')</div>';
                });
                html += '</div>';
            }
        });
        html += '</div>';
        html += '</div>'; // end detail

        html += '<div class="ch-expand-hint" onclick="toggleDetail(' + idx + ')"><span>tap for full breakdown</span></div>';
        html += '</div>'; // end card
    });

    container.innerHTML = html || '<p class="ch-loading">No NHL games found for today.</p>';
}

function toggleDetail(idx) {
    var el = document.getElementById('ch-detail-' + idx);
    if (el) el.style.display = el.style.display === 'none' || el.style.display === '' ? 'block' : 'none';
}

function regradeGame(gameId) {
    fetch('/api/profedge/nhl/regrade/' + gameId, { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function() { loadGames(); })
        .catch(function(e) { console.error('Regrade error:', e); });
}

// ── LOAD GAMES ──
function loadGames() {
    fetch('/api/profedge/nhl')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            _nhlData = data;
            _officialMatrix = data.matrix || [];
            renderStatsTo(data, document.getElementById('chStats'));
            renderGamesTo(data.games || [], document.getElementById('chGames'), 'nhl');
        })
        .catch(function(err) {
            document.getElementById('chGames').innerHTML = '<p style="color:#ef4444;text-align:center;padding:40px;">Error loading NHL data: ' + err.message + '</p>';
        });
}

// ── MATRIX TAB ──
function loadMatrix() {
    _matrixLoaded = true;
    var container = document.getElementById('chMatrix');

    // Load official matrix from NHL data (already fetched or fetch now)
    var loadOfficial = _officialMatrix.length > 0
        ? Promise.resolve(_officialMatrix)
        : fetch('/api/profedge/nhl').then(function(r) { return r.json(); }).then(function(d) { _officialMatrix = d.matrix || []; return _officialMatrix; });

    // Load Chinny's custom matrix
    var loadChinny = fetch('/api/agent/chinny/matrix/nhl')
        .then(function(r) { return r.json(); })
        .catch(function() { return {}; });

    Promise.all([loadOfficial, loadChinny]).then(function(results) {
        var official = results[0] || [];
        var chinnyData = results[1] || {};
        _chinnyMatrix = chinnyData.weights || {};

        renderMatrix(official, _chinnyMatrix, container);
    }).catch(function(err) {
        container.innerHTML = '<p style="color:#ef4444;text-align:center;padding:40px;">Error loading matrix: ' + err.message + '</p>';
    });
}

function renderMatrix(official, chinnyWeights, container) {
    var html = '<div class="ch-matrix-grid">';

    // ── OFFICIAL MATRIX (left) ──
    html += '<div class="ch-matrix-panel">';
    html += '<div class="ch-matrix-title" style="color:#F72585;">OFFICIAL NHL MATRIX <span style="font-size:11px;color:rgba(255,255,255,0.3);font-weight:400;">(' + official.length + ' variables)</span></div>';
    var officialTotal = 0;
    official.forEach(function(v) {
        officialTotal += (v.weight || 0);
        html += '<div class="ch-var-row">';
        html += '<div class="ch-var-name">' + (v.name || '').replace(/_/g, ' ') + '</div>';
        html += '<div class="ch-var-desc">' + (v.desc || '') + '</div>';
        html += '<div class="ch-var-weight" style="color:#F72585;">' + (v.weight || 0) + '</div>';
        html += '</div>';
    });
    html += '<div class="ch-total-row">';
    html += '<div style="font-size:13px;font-weight:800;color:rgba(255,255,255,0.6);">TOTAL WEIGHT</div>';
    html += '<div style="font-size:18px;font-weight:900;color:#F72585;">' + officialTotal + '</div>';
    html += '</div>';
    html += '</div>';

    // ── CHINNY'S MATRIX (right) ──
    html += '<div class="ch-matrix-panel" style="border-color:rgba(16,185,129,0.2);">';
    html += '<div class="ch-matrix-title" style="color:#10B981;">CHINNY\'S MATRIX <span style="font-size:11px;color:rgba(255,255,255,0.3);font-weight:400;">(editable)</span></div>';
    official.forEach(function(v) {
        var cw = chinnyWeights[v.name] != null ? chinnyWeights[v.name] : v.weight;
        var diff = cw - v.weight;
        var diffClass = diff > 0 ? 'higher' : (diff < 0 ? 'lower' : 'same');
        html += '<div class="ch-var-row">';
        html += '<div class="ch-var-name">' + (v.name || '').replace(/_/g, ' ') + '</div>';
        html += '<div class="ch-var-desc">' + (v.desc || '') + '</div>';
        html += '<input type="number" min="1" max="10" value="' + cw + '" class="ch-weight-input ' + diffClass + '" data-var="' + v.name + '" data-official="' + v.weight + '" onchange="onWeightChange(this)" oninput="onWeightChange(this)">';
        html += '</div>';
    });
    html += '<div class="ch-total-row">';
    html += '<div style="font-size:13px;font-weight:800;color:rgba(255,255,255,0.6);">TOTAL WEIGHT</div>';
    html += '<div id="chinnyTotal" style="font-size:18px;font-weight:900;color:#10B981;">--</div>';
    html += '</div>';
    html += '<button class="ch-save-btn" onclick="saveMatrix()">SAVE CHINNY\'S WEIGHTS</button>';
    html += '<div id="saveStatus" class="ch-save-status"></div>';
    html += '</div>';

    html += '</div>'; // end grid
    container.innerHTML = html;

    updateChinnyTotal();
}

function onWeightChange(el) {
    var val = parseInt(el.value) || 0;
    if (val < 1) { el.value = 1; val = 1; }
    if (val > 10) { el.value = 10; val = 10; }
    var official = parseInt(el.getAttribute('data-official')) || 0;
    var diff = val - official;
    el.className = 'ch-weight-input ' + (diff > 0 ? 'higher' : (diff < 0 ? 'lower' : 'same'));
    updateChinnyTotal();
}

function updateChinnyTotal() {
    var inputs = document.querySelectorAll('.ch-weight-input');
    var total = 0;
    inputs.forEach(function(inp) { total += parseInt(inp.value) || 0; });
    var el = document.getElementById('chinnyTotal');
    if (el) el.textContent = total;
}

function saveMatrix() {
    var inputs = document.querySelectorAll('.ch-weight-input');
    var weights = {};
    inputs.forEach(function(inp) {
        weights[inp.getAttribute('data-var')] = parseInt(inp.value) || 0;
    });

    var btn = document.querySelector('.ch-save-btn');
    var status = document.getElementById('saveStatus');
    btn.disabled = true;
    btn.textContent = 'SAVING...';
    status.innerHTML = '';

    fetch('/api/agent/chinny/matrix/nhl', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ weights: weights })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        btn.disabled = false;
        btn.textContent = 'SAVE CHINNY\'S WEIGHTS';
        status.innerHTML = '<span style="color:#10B981;">Saved successfully</span>';
        setTimeout(function() { status.innerHTML = ''; }, 3000);
    })
    .catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'SAVE CHINNY\'S WEIGHTS';
        status.innerHTML = '<span style="color:#ef4444;">Error: ' + err.message + '</span>';
    });
}

// ── BOARD ──
function loadBoard() {
  var container = document.getElementById('boardContainer');
  container.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);">Loading...</div>';
  fetch('/api/crew-board/chinny')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var posts = data.posts || [];
      if (!posts.length) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);">No messages yet.</div>';
        return;
      }
      var html = '';
      posts.forEach(function(p) {
        var pinIcon = p.pinned ? '📌 ' : '';
        var replies = (p.replies || []).map(function(r) {
          return '<div style="margin:6px 0 0 16px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px;border-left:2px solid #10B981;">' +
            '<div style="font-size:10px;color:rgba(255,255,255,0.35);">' + r.from + ' \u00b7 ' + r.timestamp + '</div>' +
            '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px;">' + r.message + '</div>' +
          '</div>';
        }).join('');
        html += '<div style="padding:12px 16px;margin:6px 0;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.06);' + (p.pinned ? 'border-left:3px solid #10B981;' : '') + '">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<div style="font-size:10px;color:rgba(255,255,255,0.35);">' + pinIcon + p.from + ' \u00b7 ' + p.timestamp + '</div>' +
            '<div style="display:flex;gap:8px;">' +
              '<span onclick="pinPost(\'' + p.id + '\')" style="cursor:pointer;font-size:10px;color:rgba(255,255,255,0.25);">' + (p.pinned ? 'unpin' : 'pin') + '</span>' +
              '<span onclick="deletePost(\'' + p.id + '\')" style="cursor:pointer;font-size:10px;color:rgba(255,100,100,0.4);">\u2715</span>' +
            '</div>' +
          '</div>' +
          '<div style="font-size:13px;color:rgba(255,255,255,0.8);margin-top:6px;line-height:1.5;">' + p.message + '</div>' +
          replies +
          '<div style="margin-top:8px;">' +
            '<span onclick="toggleReply(\'' + p.id + '\')" style="cursor:pointer;font-size:10px;color:#10B981;">reply</span>' +
            '<div id="reply-' + p.id + '" style="display:none;margin-top:6px;">' +
              '<input id="replyInput-' + p.id + '" type="text" placeholder="Reply..." style="width:calc(100% - 60px);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:6px 10px;color:#fff;font-size:12px;">' +
              '<button onclick="sendReply(\'' + p.id + '\')" style="margin-left:4px;background:#10B981;color:#000;border:none;border-radius:4px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;">Send</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      });
      container.innerHTML = html;
    });
}

function postMessage() {
  var input = document.getElementById('boardInput');
  var msg = input.value.trim();
  if (!msg) return;
  fetch('/api/crew-board/chinny', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ message: msg, from: 'Peter' })
  }).then(function() { input.value = ''; loadBoard(); });
}

function pinPost(id) {
  fetch('/api/crew-board/chinny/' + id + '/pin', { method: 'PATCH' }).then(function() { loadBoard(); });
}

function deletePost(id) {
  fetch('/api/crew-board/chinny/' + id, { method: 'DELETE' }).then(function() { loadBoard(); });
}

function toggleReply(id) {
  var el = document.getElementById('reply-' + id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function sendReply(id) {
  var input = document.getElementById('replyInput-' + id);
  var msg = input.value.trim();
  if (!msg) return;
  fetch('/api/crew-board/chinny/' + id + '/reply', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ reply: msg, from: 'Peter' })
  }).then(function() { input.value = ''; loadBoard(); });
}

// ── INIT ──
loadGames();
</script>
