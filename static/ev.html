<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<title>EV Agent — Edge Crew</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#0A0A0A;color:#fff;font-family:'Nunito',sans-serif;
    height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
}

/* Header */
.ev-header{
    padding:12px 16px;background:rgba(99,102,241,0.08);
    border-bottom:1px solid rgba(99,102,241,0.2);
    display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.ev-back{
    background:none;border:none;color:#818cf8;font-size:22px;cursor:pointer;padding:4px 8px;
}
.ev-header-dot{width:8px;height:8px;border-radius:50%;background:#818cf8;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.ev-header-title{color:#818cf8;font-weight:800;font-size:16px;flex:1;}
.ev-header-clear{background:none;border:none;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;font-weight:700;}

/* Messages */
.ev-messages{
    flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:16px;display:flex;flex-direction:column;gap:10px;min-height:0;
}
.ev-msg{
    max-width:85%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.5;
    word-wrap:break-word;animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.ev-msg.agent{background:rgba(99,102,241,0.12);color:#fff;align-self:flex-start;border:1px solid rgba(99,102,241,0.2);}
.ev-msg.user{background:rgba(255,255,255,0.1);color:#fff;align-self:flex-end;}
.ev-msg.system{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);align-self:center;font-size:12px;font-style:italic;}

/* Voice status */
.ev-voice-status{
    text-align:center;padding:8px;font-size:13px;color:#818cf8;
    display:none;flex-shrink:0;
}
.ev-voice-status.active{display:block;}
.ev-voice-status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#818cf8;margin-right:6px;animation:pulse 1s infinite;}

/* Voice controls */
.ev-voice-bar{
    display:flex;gap:8px;padding:10px 16px;flex-shrink:0;justify-content:center;
}
.ev-vbtn{
    padding:10px 20px;border-radius:10px;border:1px solid rgba(99,102,241,0.3);
    background:rgba(99,102,241,0.08);color:#818cf8;font-family:'Nunito',sans-serif;
    font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;
}
.ev-vbtn:hover,.ev-vbtn.active{background:rgba(99,102,241,0.2);border-color:#818cf8;}
.ev-vbtn.end{border-color:rgba(239,68,68,0.3);color:#EF4444;background:rgba(239,68,68,0.08);display:none;}
.ev-vbtn.end.active{display:inline-block;}

/* Input bar */
.ev-input-bar{
    display:flex;gap:8px;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));
    background:#0A0A0A;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.ev-input-bar input{
    flex:1;padding:12px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
    border-radius:12px;color:#fff;font-size:16px;font-family:'Nunito',sans-serif;outline:none;
    min-height:44px;
}
.ev-input-bar input:focus{border-color:rgba(99,102,241,0.4);}
.ev-input-bar input::placeholder{color:rgba(255,255,255,0.3);}
.ev-mic-btn{
    width:44px;height:44px;border-radius:10px;border:1px solid rgba(99,102,241,0.3);
    background:transparent;color:#818cf8;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:all 0.2s;
}
.ev-mic-btn.listening{background:rgba(99,102,241,0.2);border-color:#818cf8;animation:pulse-mic 1.5s infinite;}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.4);}50%{box-shadow:0 0 0 10px rgba(99,102,241,0);}}
.ev-send-btn{
    padding:12px 20px;border-radius:10px;border:none;
    background:#818cf8;color:#0A0A0A;font-weight:800;font-size:14px;
    font-family:'Nunito',sans-serif;cursor:pointer;min-height:44px;flex-shrink:0;
}

/* Quick prompts */
.ev-prompts{
    display:flex;gap:6px;padding:6px 16px;overflow-x:auto;flex-shrink:0;
    -webkit-overflow-scrolling:touch;
}
.ev-prompts::-webkit-scrollbar{display:none;}
.ev-qp{
    white-space:nowrap;padding:8px 14px;border-radius:20px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;cursor:pointer;
    font-family:'Nunito',sans-serif;flex-shrink:0;
}
.ev-qp:active{background:rgba(99,102,241,0.15);color:#818cf8;border-color:rgba(99,102,241,0.3);}

/* Connecting overlay */
.ev-connecting{
    position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;
    display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.ev-connecting.visible{display:flex;}
.ev-connecting-text{color:#818cf8;font-size:16px;font-weight:700;}
.ev-spinner{width:40px;height:40px;border:3px solid rgba(99,102,241,0.2);border-top-color:#818cf8;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- Connecting overlay -->
<div class="ev-connecting" id="evConnecting">
    <div class="ev-spinner"></div>
    <div class="ev-connecting-text" id="evConnectText">Connecting to EV...</div>
</div>

<!-- Header -->
<div class="ev-header">
    <button class="ev-back" onclick="window.location.href='/'">&larr;</button>
    <div class="ev-header-dot"></div>
    <div class="ev-header-title">EV — Expected Value</div>
    <button class="ev-header-clear" onclick="clearChat()">Clear</button>
</div>

<!-- Voice status -->
<div class="ev-voice-status" id="evVoiceStatus">
    <span class="dot"></span><span id="evStatusText">Listening...</span>
</div>

<!-- Messages -->
<div class="ev-messages" id="evMessages">
    <div class="ev-msg agent">What's the play? Ask me anything — best value tonight, break down a matchup, or lock a pick.</div>
</div>

<!-- Quick prompts -->
<div class="ev-prompts">
    <button class="ev-qp" onclick="quickPrompt('Best value tonight')">Best value tonight</button>
    <button class="ev-qp" onclick="quickPrompt('Any upset specials?')">Upset specials?</button>
    <button class="ev-qp" onclick="quickPrompt('Break down the next game')">Break down next</button>
    <button class="ev-qp" onclick="quickPrompt('Grade my results')">Grade results</button>
    <button class="ev-qp" onclick="quickPrompt('Bankroll check')">Bankroll</button>
</div>

<!-- Voice controls -->
<div class="ev-voice-bar">
    <button class="ev-vbtn" id="btnFreeflow" onclick="startVoice('freeflow')">Free Flow</button>
    <button class="ev-vbtn" id="btnTurns" onclick="startVoice('turnbased')">Take Turns</button>
    <button class="ev-vbtn end" id="btnEndVoice" onclick="endVoice()">End Voice</button>
</div>

<!-- Input -->
<div class="ev-input-bar">
    <button class="ev-mic-btn" id="micBtn" onclick="toggleVoice()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <input type="text" id="evInput" placeholder="Ask EV anything..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="ev-send-btn" onclick="sendMsg()">Send</button>
</div>

<!-- Hidden audio element for WebRTC -->
<audio id="evAudio" autoplay style="display:none;"></audio>

<script>
// === State ===
var rtcPC = null;
var rtcDC = null;
var rtcMicStream = null;
var voiceActive = false;
var voiceMode = 'freeflow';
var chatHistory = [];

// === Text Chat ===
function addMsg(role, text) {
    var el = document.createElement('div');
    el.className = 'ev-msg ' + role;
    el.innerHTML = text;
    document.getElementById('evMessages').appendChild(el);
    el.scrollIntoView({behavior: 'smooth', block: 'end'});
    return el;
}

function clearChat() {
    document.getElementById('evMessages').innerHTML = '';
    chatHistory = [];
    addMsg('agent', 'Cleared. What\'s next?');
}

function quickPrompt(text) {
    document.getElementById('evInput').value = text;
    sendMsg();
}

async function sendMsg() {
    var input = document.getElementById('evInput');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMsg('user', text);
    chatHistory.push({role: 'user', content: text});

    var thinking = addMsg('agent', '<em>Thinking...</em>');
    try {
        var resp = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text, history: chatHistory.slice(-10)})
        });
        var data = await resp.json();
        thinking.innerHTML = data.response || 'No response.';
        chatHistory.push({role: 'assistant', content: data.response});
    } catch(e) {
        thinking.innerHTML = 'Connection error. Try again.';
    }
}

// === WebRTC Voice ===
function toggleVoice() {
    if (voiceActive) {
        endVoice();
    } else {
        startVoice(voiceMode);
    }
}

async function startVoice(mode) {
    voiceMode = mode;
    var overlay = document.getElementById('evConnecting');
    overlay.classList.add('visible');

    try {
        // 1. Get ephemeral token
        var tokenResp = await fetch('/api/voice/token', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'}
        });
        if (!tokenResp.ok) {
            var err = await tokenResp.json().catch(function(){return {};});
            throw new Error(err.error || 'Failed to get voice token');
        }
        var tokenData = await tokenResp.json();

        // 2. Create peer connection
        rtcPC = new RTCPeerConnection();

        // 3. Setup audio output
        var audioEl = document.getElementById('evAudio');
        rtcPC.ontrack = function(event) {
            if (event.streams.length > 0) audioEl.srcObject = event.streams[0];
        };

        // 4. Get mic
        rtcMicStream = await navigator.mediaDevices.getUserMedia({
            audio: {noiseSuppression: true, echoCancellation: true, autoGainControl: true, channelCount: 1}
        });
        rtcPC.addTrack(rtcMicStream.getAudioTracks()[0]);

        // 5. Data channel for session control
        rtcDC = rtcPC.createDataChannel('realtime-channel');

        // 6. Create offer
        var offer = await rtcPC.createOffer();
        await rtcPC.setLocalDescription(offer);

        // 7. SDP exchange
        var sdpResp = await fetch('/api/voice/sdp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({sdp: offer.sdp, token: tokenData.token})
        });
        if (!sdpResp.ok) throw new Error('SDP exchange failed');
        var answerSdp = await sdpResp.text();
        await rtcPC.setRemoteDescription({type: 'answer', sdp: answerSdp});

        // 8. On data channel open — configure VAD
        rtcDC.onopen = function() {
            overlay.classList.remove('visible');

            var waitMode = (mode === 'turnbased');
            rtcDC.send(JSON.stringify({
                type: 'session.update',
                session: {
                    input_audio_transcription: {model: 'whisper-1'},
                    turn_detection: {
                        type: 'semantic_vad',
                        create_response: true,
                        interrupt_response: !waitMode,
                        eagerness: 'medium'
                    }
                }
            }));

            voiceActive = true;
            updateVoiceUI(true);

            // Initial greeting
            rtcDC.send(JSON.stringify({
                type: 'response.create',
                response: {
                    instructions: 'Greet the user. Say you\'re EV, ready to find edges. Ask what sport or matchup they want to look at. Keep it to 2 sentences. Be confident.'
                }
            }));
        };

        // 9. Handle incoming messages (transcription, etc)
        rtcDC.onmessage = function(event) {
            var msg = JSON.parse(event.data);

            // Show user's transcribed speech
            if (msg.type === 'conversation.item.input_audio_transcription.completed') {
                if (msg.transcript && msg.transcript.trim()) {
                    addMsg('user', msg.transcript.trim());
                }
            }

            // Show AI response transcript
            if (msg.type === 'response.audio_transcript.done') {
                if (msg.transcript && msg.transcript.trim()) {
                    addMsg('agent', msg.transcript.trim());
                }
            }
        };

        rtcDC.onclose = function() {
            endVoice();
        };

        rtcPC.onconnectionstatechange = function() {
            if (rtcPC && (rtcPC.connectionState === 'failed' || rtcPC.connectionState === 'disconnected')) {
                endVoice();
                addMsg('system', 'Voice disconnected.');
            }
        };

    } catch(e) {
        overlay.classList.remove('visible');
        addMsg('system', 'Voice error: ' + e.message);
        endVoice();
    }
}

function endVoice() {
    if (rtcPC) { try { rtcPC.close(); } catch(e){} rtcPC = null; }
    if (rtcDC) { try { rtcDC.close(); } catch(e){} rtcDC = null; }
    if (rtcMicStream) { rtcMicStream.getTracks().forEach(function(t){t.stop();}); rtcMicStream = null; }
    var audioEl = document.getElementById('evAudio');
    if (audioEl && audioEl.srcObject) {
        audioEl.srcObject.getTracks().forEach(function(t){t.stop();});
        audioEl.srcObject = null;
    }
    voiceActive = false;
    updateVoiceUI(false);
    document.getElementById('evConnecting').classList.remove('visible');
}

function updateVoiceUI(active) {
    var micBtn = document.getElementById('micBtn');
    var statusBar = document.getElementById('evVoiceStatus');
    var btnEnd = document.getElementById('btnEndVoice');
    var btnFreeflow = document.getElementById('btnFreeflow');
    var btnTurns = document.getElementById('btnTurns');

    if (active) {
        micBtn.classList.add('listening');
        statusBar.classList.add('active');
        btnEnd.classList.add('active');
        document.getElementById('evStatusText').textContent =
            voiceMode === 'freeflow' ? 'Free Flow — just talk' : 'Take Turns — listen, then speak';
        btnFreeflow.classList.toggle('active', voiceMode === 'freeflow');
        btnTurns.classList.toggle('active', voiceMode === 'turnbased');
    } else {
        micBtn.classList.remove('listening');
        statusBar.classList.remove('active');
        btnEnd.classList.remove('active');
        btnFreeflow.classList.remove('active');
        btnTurns.classList.remove('active');
    }
}
</script>
</body>
</html>
