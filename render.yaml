services:
  - type: web
    name: edge-crew
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: starter
    healthCheckPath: /health
    disk:
      name: edge-crew-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SHARPAPI_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: ODDS_API_KEY_PAID
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_MODEL
        sync: false
      - key: CREW_PIN_SALT
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      - key: ANALYSIS_THINKER
        sync: false
      - key: ANALYSIS_FORMATTER
        sync: false
      - key: ANALYSIS_MODE
        sync: false
