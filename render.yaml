    name: edge-crew
    runtime: docker
    plan: starter
    envVars:
      - key: SHARPAPI_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: ODDS_API_KEY_PAID
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_MODEL
        sync: false
      - key: CREW_PIN_SALT
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
